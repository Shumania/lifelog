<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life History">
  <title>Life History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #3b82f6; color: #fff; }
    .tab-inactive { background: #1e2130; color: #94a3b8; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; }
    .sticky-header { position: sticky; top: 0; background: #0f1117; z-index: 10; padding-top: env(safe-area-inset-top); }
    .bottom-pad { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
    .item-row { display: flex; gap: 6px; align-items: center; padding: 3px 0; border-bottom: 1px solid #1e2130; }
    .item-row:last-child { border-bottom: none; }
    .icon-wrap { width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; }
    .icon-spotify-cap  { background: #1e3a5f; }
    .icon-spotify-vas  { background: #1a3a2a; }
    .icon-apple-cap    { background: #3a1a2a; }
    .icon-apple-vas    { background: #2a2a1a; }
    .icon-qobuz        { background: #1e1a3a; }
    .icon-radio        { background: #1a2a2a; }
    .icon-kcrw         { background: #b91c1c; }
    .icon-kexp         { background: #15803d; }
    .icon-kcrw .st-lbl, .icon-kexp .st-lbl { font-size: 5.5px; font-weight: 900; letter-spacing: -0.3px; color: #fff; line-height: 1; }
    .icon-sonos        { background: #2a2020; }
    .icon-podcast      { background: #3b1f0f; }
    .item-line { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; line-height: 1.4; }
    .t { color: #e2e8f0; font-weight: 600; }
    .s { color: #64748b; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px 20px; color: #475569; }
    .explore-btn { background:none; border:none; cursor:pointer; font-size:11px; padding:2px 4px; opacity:0.3; transition:opacity 0.15s; flex-shrink:0; }
    .explore-btn:hover { opacity:0.8; }
    .explore-btn.exploring { opacity:1; animation: pulse 1s infinite; }
    .explore-btn.done { opacity:0.6; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .filter-btn { border-radius: 8px; padding: 5px 11px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .count-badge { font-size: 11px; opacity: 0.75; font-weight: 500; }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
    .dot-green  { background: #4ade80; }
    .dot-yellow { background: #facc15; }
    .dot-red    { background: #f87171; }
  </style>
</head>
<body>

<div class="sticky-header px-4 pb-2 pt-3">
  <div class="flex items-center justify-between mb-1">
    <div>
      <h1 class="text-lg font-bold text-white">Life History</h1>
      <p id="updated-at" class="text-xs text-slate-500 mt-0.5"></p>
    </div>
    <div id="load-indicator" class="spinner" style="display:none"></div>
  </div>
  <!-- Service status bar -->
  <div id="status-bar" class="flex gap-3 flex-wrap mb-2" style="font-size:11px;color:#475569;min-height:14px;"></div>
  <div class="flex gap-2 items-center">
    <button class="filter-btn tab-active" id="btn-all" onclick="setFilter('all')">All <span id="cnt-all" class="count-badge"></span></button>
    <button class="filter-btn tab-inactive" id="btn-music" onclick="setFilter('music')">🎵 Music <span id="cnt-music" class="count-badge"></span></button>
    <button class="filter-btn tab-inactive" id="btn-podcast" onclick="setFilter('podcast')">🎙 Podcasts <span id="cnt-podcast" class="count-badge"></span></button>
    <a href="controller.html" style="margin-left:auto;background:#1e2130;border:1px solid #2d3148;border-radius:8px;padding:5px 11px;font-size:13px;font-weight:600;color:#a78bfa;cursor:pointer;white-space:nowrap;text-decoration:none;">🎛 Control</a>
    <button id="sync-btn" onclick="syncNow()" style="background:#1e2130;border:1px solid #2d3148;border-radius:8px;padding:5px 11px;font-size:13px;font-weight:600;color:#60a5fa;cursor:pointer;white-space:nowrap;transition:all 0.15s;">↻ Sync</button>
  </div>
</div>

<div class="px-4 bottom-pad">
  <div id="feed" class="card px-3">
    <div class="empty-state">
      <div class="spinner mx-auto mb-3"></div>
      <p class="text-sm">Loading your history…</p>
    </div>
  </div>
  <p class="text-center text-xs text-slate-600 mt-3">Updated automatically · <a href="https://tasklet.ai" class="text-slate-500 underline">Tasklet</a></p>
</div>

<script>
let allData = [];
let filter = 'all';

function setFilter(f) {
  filter = f;
  ['all','music','podcast'].forEach(k => {
    document.getElementById('btn-' + k).className = 'filter-btn ' + (k === f ? 'tab-active' : 'tab-inactive');
  });
  renderFeed();
}

function updateCounts() {
  const music = allData.filter(i => i.type === 'music');
  const pods  = allData.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0);
  document.getElementById('cnt-all').textContent    = allData.length ? (music.length + pods.length) : '';
  document.getElementById('cnt-music').textContent   = music.length  ? music.length  : '';
  document.getElementById('cnt-podcast').textContent = pods.length   ? pods.length   : '';
}

function renderStatusBar(clients) {
  const bar = document.getElementById('status-bar');
  if (!clients || !clients.length) { bar.innerHTML = ''; return; }
  const now = Date.now();
  bar.innerHTML = clients.map(c => {
    const lastSeen = c.last_seen ? new Date(c.last_seen).getTime() : 0;
    const ageMin = lastSeen ? Math.round((now - lastSeen) / 60000) : null;
    const dotCls = ageMin === null ? 'dot-red' : ageMin < 10 ? 'dot-green' : ageMin < 30 ? 'dot-yellow' : 'dot-red';
    const label = c.client_id
      .replace('sonos_vashon', '🏝 Sonos')
      .replace('sonos_caphill', '🏙 Sonos')
      .replace('backup_', '💾 ');
    const age = ageMin === null ? 'offline' : (() => {
      if (ageMin < 1) return 'just now';
      if (ageMin < 60) return `${ageMin}m ago`;
      const hr = Math.floor(ageMin / 60);
      if (hr < 24) return `${hr}h ${ageMin % 60}m ago`;
      const days = Math.floor(hr / 24);
      return `${days}d ${hr % 24}h ago`;
    })();
    return `<span style="white-space:nowrap"><span class="status-dot ${dotCls}"></span>${escHtml(label)} <span style="color:#374151">${escHtml(age)}</span></span>`;
  }).join('');
}

function formatTime(isoStr) {
  const d   = new Date(isoStr);
  const now = new Date();
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const dDate   = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((nowDate - dDate) / 86400000);
  if (diffDays === 0)  return 'Today ' + timeStr;
  if (diffDays === 1)  return 'Yesterday ' + timeStr;
  const dateStr = d.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
    year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
  });
  return dateStr + ' ' + timeStr;
}

function getMusicIcon(item) {
  const src = item.source || '';
  const house = item.house || '';
  const isVashon = house === 'vashon';
  if (src === 'spotify_teenbloods' || src === 'sonos_spotify' && isVashon) {
    return { cls: 'icon-spotify-vas', emoji: '🏝️' };
  }
  if (src.startsWith('sonos_spotify') || src === 'spotify') {
    return { cls: 'icon-spotify-cap', emoji: '🎵' };
  }
  if (src.startsWith('sonos_apple')) {
    return { cls: isVashon ? 'icon-apple-vas' : 'icon-apple-cap', emoji: '🍎' };
  }
  if (src.startsWith('sonos_qobuz')) {
    return { cls: 'icon-qobuz', emoji: '🎼' };
  }
  if (src === 'sonos_kcrw') {
    return { cls: 'icon-kcrw', emoji: '<span class="st-lbl">KCRW</span>' };
  }
  if (src === 'sonos_kexp') {
    return { cls: 'icon-kexp', emoji: '<span class="st-lbl">KEXP</span>' };
  }
  if (src.startsWith('sonos_tunein') || src.startsWith('sonos_radio')) {
    return { cls: 'icon-radio', emoji: '📻' };
  }
  if (src.startsWith('sonos_')) {
    return { cls: isVashon ? 'icon-spotify-vas' : 'icon-sonos', emoji: isVashon ? '🏝️' : '🔊' };
  }
  return { cls: 'icon-spotify-cap', emoji: '🎵' };
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = allData.filter(i => {
    if (i.type === 'podcast' && !(i.duration_seconds > 0)) return false;
    if (filter !== 'all' && i.type !== filter) return false;
    return true;
  });

  if (filtered.length === 0) {
    feed.innerHTML = `<div class="empty-state"><p class="text-2xl mb-2">🎧</p><p class="text-sm">No ${filter === 'all' ? '' : filter + ' '}history yet</p></div>`;
    return;
  }

  feed.innerHTML = filtered.map(item => {
    const ts = formatTime(item.timestamp);
    if (item.type === 'music') {
      const { cls, emoji } = getMusicIcon(item);
      const parts = [item.artist, item.album].filter(Boolean);
      if (item.context) parts.push('📋 ' + item.context);
      if (item.rooms && item.rooms.length > 1) {
        parts.push('🔊 ' + item.rooms[0] + ' +' + (item.rooms.length - 1));
      } else if (item.room) {
        parts.push(item.room);
      }
      const sub = parts.map(escHtml).join(' · ');
      const exploreData = encodeURIComponent(JSON.stringify({title:item.title,artist:item.artist,album:item.album,source:item.source}));
      return `<div class="item-row">
        <div class="icon-wrap ${cls}">${emoji}</div>
        <div class="item-line"><span class="t">${escHtml(item.title)}</span><span class="s">${sub ? ' · ' + sub : ''} · ${ts}</span></div>
        <button class="explore-btn" onclick="exploreArtist(this,'${exploreData}')" title="Explore this artist">🔍</button>
      </div>`;
    } else {
      const sub = [item.show_name, item.listened_label].filter(Boolean).map(escHtml).join(' · ');
      return `<div class="item-row">
        <div class="icon-wrap icon-podcast">🎙</div>
        <div class="item-line"><span class="t">${escHtml(item.title)}</span><span class="s">${sub ? ' · ' + sub : ''} · ${ts}</span></div>
      </div>`;
    }
  }).join('');
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let archiveItems = [];
let archiveLoaded = false;

function mergeItems(headItems, archive) {
  if (!archive.length) return headItems;
  const headKeys = new Set(headItems.map(i =>
    (i.timestamp||'') + '|' + (i.title||'').toLowerCase() + '|' + (i.artist||i.show_name||'').toLowerCase()
  ));
  const older = archive.filter(i =>
    !headKeys.has((i.timestamp||'') + '|' + (i.title||'').toLowerCase() + '|' + (i.artist||i.show_name||'').toLowerCase())
  );
  return [...headItems, ...older];
}

async function loadData(alsoArchive) {
  document.getElementById('load-indicator').style.display = 'inline-block';
  try {
    const res = await fetch('data-head.json?t=' + Date.now());
    const json = await res.json();
    const headItems = json.items || [];
    allData = mergeItems(headItems, archiveItems);
    if (json.generated_at) {
      document.getElementById('updated-at').textContent = 'Updated ' + formatTime(json.generated_at);
    }
    renderStatusBar(json.client_status || json.clients || []);
    updateCounts();
    renderFeed();
  } catch(e) {
    document.getElementById('feed').innerHTML = `<div class="empty-state"><p class="text-2xl mb-2">⚠️</p><p class="text-sm">Could not load data</p></div>`;
  } finally {
    document.getElementById('load-indicator').style.display = 'none';
  }
  // Load full archive in background on first load or when requested
  if (alsoArchive || !archiveLoaded) {
    try {
      const r2 = await fetch('data.json?t=' + Date.now());
      const full = await r2.json();
      archiveItems = full.items || [];
      archiveLoaded = true;
      // Re-merge with fresh archive
      const headRes = allData.slice(0, 75); // current head
      allData = mergeItems(headRes, archiveItems);
      updateCounts();
      renderFeed();
    } catch(e) { /* archive is optional — head is enough */ }
  }
}

loadData(true);

async function exploreArtist(btn, encodedData) {
  const trackData = JSON.parse(decodeURIComponent(encodedData));
  btn.classList.add('exploring');
  btn.textContent = '⏳';
  try {
    await fetch('https://webhooks.tasklet.ai/v1/public/webhook/a_1gkkvt5afqwmjxbqmr6e?token=0da7fd530e6c2d366596d56e4fb702f3', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(trackData)
    });
    btn.textContent = '✓';
    btn.classList.remove('exploring');
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = '🔍'; btn.classList.remove('done'); }, 3000);
  } catch(e) {
    btn.textContent = '✗';
    btn.classList.remove('exploring');
    setTimeout(() => { btn.textContent = '🔍'; }, 3000);
  }
}

async function syncNow() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  try {
    await fetch('https://webhooks.tasklet.ai/v1/public/webhook/a_1gkkvt5afqwmjxbqmr6e?token=5fa7016c71845ffbb44d47b29d64655e', { method: 'POST', mode: 'no-cors' });
    btn.textContent = '✓ Syncing…';
    btn.style.color = '#4ade80';
    setTimeout(async () => {
      await loadData(true);
      btn.textContent = '↻ Sync';
      btn.style.color = '#60a5fa';
      btn.style.opacity = '1';
      btn.disabled = false;
    }, 35000);
  } catch(e) {
    btn.textContent = '↻ Sync';
    btn.style.color = '#60a5fa';
    btn.style.opacity = '1';
    btn.disabled = false;
  }
}
</script>
</body>
</html>

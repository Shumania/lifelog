function getLocation(item) {
  const src = item.source || '';
  if (item.house === 'vashon') return { cls: 'vashon', label: '🏝 Vashon' };
  if (item.house === 'caphill') return { cls: 'caphill', label: '🏠 Cap Hill' };
  if (item.house === 'roaming') return { cls: 'roaming', label: '📱 Roaming' };
  if (src.startsWith('sonos_')) return { cls: 'caphill', label: '🏠 Cap Hill' };
  return { cls: 'roaming', label: '📱 Roaming' };
}

function getSourceBadge(item) {
  const src = item.source || '';
  if (src.includes('spotify')) return 'Spotify';
  if (src.includes('apple')) return 'Apple Music';
  if (src.includes('qobuz')) return 'Qobuz';
  if (src.includes('kcrw')) return 'KCRW';
  if (src.includes('kexp')) return 'KEXP';
  if (src.includes('tunein') || src.includes('radio')) return 'Radio';
  return '';
}

function fmtTimeRange(startTs, endTs) {
  const s = fmtTime(startTs);
  if (!endTs) return s;
  const e = fmtTime(endTs);
  return s === e ? s : `${s} – ${e}`;
}

function renderRadioSession(item) {
  const loc = getLocation(item);
  const rooms = Array.isArray(item.rooms) ? item.rooms.join(', ') : (item.room || '');
  // Station logos removed — clutters visual scanning of history list
  const timeRange = fmtTimeRange(item.timestamp, item.end_time);
  const sid = item.session_id || '';
  const isExpanded = item.expanded && item.tracks && item.tracks.length > 0;

  // Action button: unexpanded → ↻ enrich; expanded → ▼ expand/collapse
  let actionBtn = '';
  if (isExpanded) {
    const wasOpen = getExpandedRadioSessions().has('rs-' + sid);
    const arrow = wasOpen ? '▲' : '▼';
    actionBtn = `<button class="radio-expand-btn" onclick="toggleRadioTracks('rs-${sid}')" title="Show tracks" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;padding:2px 8px;font-size:12px;margin-left:auto;flex-shrink:0;-webkit-tap-highlight-color:transparent;">${arrow} ${item.tracks.length} tracks</button>`;
  } else {
    actionBtn = `<button class="radio-enrich-btn" id="enrich-${sid}" onclick="enrichRadioSession('${sid}')" title="Fetch tracks from station" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;padding:2px 8px;font-size:12px;margin-left:auto;flex-shrink:0;-webkit-tap-highlight-color:transparent;">↻ Get tracks</button>`;
  }

  // Child tracks container (expanded sessions only, restore expand state from localStorage)
  let tracksHtml = '';
  if (isExpanded) {
    const wasExpanded = getExpandedRadioSessions().has('rs-' + sid);
    tracksHtml = `<div class="radio-tracks" id="rs-${sid}" style="display:${wasExpanded ? 'block' : 'none'};padding:4px 0 4px 36px;">`;
    for (const t of item.tracks) {
      const childSvc = item.source || 'sonos_radio';
      const playData = t.uri ? encodeURIComponent(JSON.stringify({uri:t.uri,title:t.title,artist:t.artist||'',album:t.album||'',service:childSvc})).replace(/'/g,'%27') : '';
      const exploreData = encodeURIComponent(JSON.stringify({title:t.title,artist:t.artist||'',album:t.album||'',source:childSvc,uri:t.uri||''})).replace(/'/g,'%27');
      tracksHtml += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;">
        ${t.album_image ? `<img src="${esc(t.album_image)}" style="width:28px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0;">` : '<div style="width:28px;height:28px;border-radius:4px;background:var(--surface);flex-shrink:0;"></div>'}
        <div style="min-width:0;flex:1;">
          <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.title)} · <span style="color:var(--text-dim);">${esc(t.artist)}</span></div>
          ${t.album && t.album !== 'KCRW' && t.album !== 'KEXP' ? `<div style="font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.album)}</div>` : ''}
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          ${playData ? `<button class="action-btn" onclick="directPlay('play','${playData}')" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--accent);cursor:pointer;padding:2px 6px;font-size:11px;" title="Play">▶</button>` : ''}
          ${playData ? `<button class="action-btn" onclick="directPlay('queue','${playData}')" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--accent);cursor:pointer;padding:2px 6px;font-size:11px;" title="Queue">+</button>` : ''}
          ${exploreButton(t.artist, exploreData)}
        </div>
      </div>`;
    }
    tracksHtml += '</div>';
  }

  return `<div class="history-item radio-session">
    <div class="hi-time-col"><div class="hi-time">${esc(timeRange)}</div></div>
    <div class="hi-info" style="display:flex;align-items:center;gap:10px;flex:1;">
      <div style="min-width:0;flex:1;">
        <div class="hi-line1">
          <span class="hi-track">📻 ${esc(item.title)}</span>
        </div>
        <div class="hi-line2">
          <span class="hi-location ${loc.cls}">${loc.label}</span>
          ${rooms ? '<span class="hi-rooms">' + esc(rooms) + '</span>' : ''}
          <span class="hi-source-badge" style="color:var(--text-dim);">Radio</span>
        </div>
      </div>
      ${actionBtn}
    </div>
    ${tracksHtml}
  </div>`;
}

function getExpandedRadioSessions() {
  try { return new Set(JSON.parse(localStorage.getItem('radioExpanded') || '[]')); } catch { return new Set(); }
}
function saveExpandedRadioSessions(set) {
  try { localStorage.setItem('radioExpanded', JSON.stringify([...set])); } catch {}
}
function toggleRadioTracks(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const btn = el.previousElementSibling?.querySelector('.radio-expand-btn') || el.closest('.radio-session')?.querySelector('.radio-expand-btn');
  const expanded = getExpandedRadioSessions();
  if (el.style.display === 'none') {
    el.style.display = 'block';
    if (btn) btn.textContent = btn.textContent.replace('▼', '▲');
    expanded.add(containerId);
  } else {
    el.style.display = 'none';
    if (btn) btn.textContent = btn.textContent.replace('▲', '▼');
    expanded.delete(containerId);
  }
  saveExpandedRadioSessions(expanded);
}

async function enrichRadioSession(sessionId) {
  const btn = document.getElementById('enrich-' + sessionId);
  if (btn) { btn.textContent = '⏳ Enriching…'; btn.disabled = true; btn.style.opacity = '0.6'; }
  try {
    await fetch(ENRICH_RADIO_WEBHOOK, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id: sessionId})});
    if (btn) { btn.textContent = '✓ Enriching…'; }
    // Poll for enriched data — CDN cache may lag
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      await loadData(false);
      // Check if session is now expanded in rendered data
      const expanded = allItems.find(i => i.type === 'radio_session' && String(i.session_id) === String(sessionId) && i.expanded);
      if (expanded || attempts >= 6) {
        clearInterval(poll);
        if (!expanded && btn) { btn.textContent = '↻ Get tracks'; btn.disabled = false; btn.style.opacity = '1'; }
      }
    }, 10000);
  } catch(e) {
    if (btn) { btn.textContent = '✗ Failed'; btn.disabled = false; btn.style.opacity = '1'; }
  }
}

function renderHistory() {
  const el = document.getElementById('music-list');
  const music = allItems.filter(i => i.type === 'music' || i.type === 'radio_session');
  if (music.length === 0) { el.innerHTML = '<div class="empty-state">🎧 No music history yet</div>'; return; }

  let html = '', lastDay = '';
  for (const item of music) {
    const dk = dayKey(item.timestamp);
    if (dk !== lastDay) {
      lastDay = dk;
      html += `<div class="day-header">${esc(dayLabel(item.timestamp))}</div>`;
    }

    // Radio session — special rendering
    if (item.type === 'radio_session') {
      html += renderRadioSession(item);
      continue;
    }

    const loc = getLocation(item);
    const badge = getSourceBadge(item);
    const rooms = Array.isArray(item.rooms) ? item.rooms.join(', ') : (item.room || '');
    // CRITICAL: encodeURIComponent does NOT encode single quotes — they break onclick='...' attributes.
    // Any track with an apostrophe (e.g. "School's Out") would silently fail without this .replace().
    const playData = encodeURIComponent(JSON.stringify({uri:item.uri||'',sonos_uri:item.sonos_uri||'',title:item.title,artist:item.artist||'',album:item.album||'',service:item.service||''})).replace(/'/g,'%27');
    const exploreData = encodeURIComponent(JSON.stringify({title:item.title,artist:item.artist,album:item.album,source:item.source,uri:item.uri||''})).replace(/'/g,'%27');
    const ctxId = 'ctx-' + (item.timestamp||'').replace(/\W/g,'');
    // Has album or context → show expand button
    const hasCtx = item.album || item.context_uri;

    html += `<div class="history-item">
      <div class="hi-time-col"><div class="hi-time">${fmtTime(item.timestamp)}</div></div>
      <div class="hi-info">
        <div class="hi-line1">
          <span class="hi-track">${esc(item.title)}</span>
          ${item.album ? '<span class="hi-sep">·</span><span class="hi-album">' + esc(item.album) + '</span>' : ''}
          ${item.artist ? '<span class="hi-sep">·</span><span class="hi-artist">' + esc(item.artist) + '</span>' : ''}
        </div>
        <div class="hi-line2">
          <span class="hi-location ${loc.cls}">${loc.label}</span>
          ${rooms ? '<span class="hi-rooms">' + esc(rooms) + '</span>' : ''}
          ${badge ? '<span class="hi-source-badge">' + esc(badge) + '</span>' : ''}
        </div>
      </div>
      <div class="hi-actions">
        <button class="action-btn" onclick="directPlay('play','${playData}')" title="Play">▶</button>
        <button class="action-btn" onclick="directPlay('queue','${playData}')" title="Queue">+</button>
        ${exploreButton(item.artist, exploreData)}
        ${hasCtx ? `<button class="action-btn ctx-toggle" onclick="toggleCtxPanel('${ctxId}',this,'${encodeURIComponent(JSON.stringify({uri:item.uri||'',album:item.album||'',artist:item.artist||'',title:item.title||'',context_type:item.context_type||'',context_uri:item.context_uri||'',service:item.service||item.source||'',sonos_uri:item.sonos_uri||''})).replace(/'/g,'%27')}')" title="Album &amp; Playlists">▾</button>` : ''}
      </div>
    </div>
    ${hasCtx ? `<div class="ctx-panel" id="${ctxId}"></div>` : ''}`;
  }
  el.innerHTML = html;
}

function renderPodcasts() {
  const el = document.getElementById('podcast-list');
  const pods = allItems.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0);
  if (pods.length === 0) { el.innerHTML = '<div class="empty-state">🎙 No podcasts yet</div>'; return; }

  let html = '', lastDay = '';
  for (const item of pods) {
    const dk = dayKey(item.timestamp);
    if (dk !== lastDay) {
      lastDay = dk;
      html += `<div class="day-header">${esc(dayLabel(item.timestamp))}</div>`;
    }
    const dur = item.duration_seconds ? Math.round(item.duration_seconds / 60) + ' min' : '';
    const pct = (item.progress_seconds && item.duration_seconds) ? Math.round(item.progress_seconds / item.duration_seconds * 100) : (item.percent_complete || 0);
    html += `<div class="podcast-item">
      <div class="podcast-icon">🎙</div>
      <div class="podcast-info">
        ${item.show_name ? '<div class="podcast-show">' + esc(item.show_name) + '</div>' : ''}
        <div class="podcast-title">${esc(item.title)}</div>
        <div class="podcast-meta">${fmtTime(item.timestamp)}${dur ? ' · ' + dur : ''}</div>
        ${pct > 0 ? '<div class="podcast-progress"><div class="podcast-progress-fill" style="width:' + pct + '%"></div></div>' : ''}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function updateCounts() {
  const music = allItems.filter(i => i.type === 'music').length;
  const pods = allItems.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0).length;
  document.getElementById('cnt-music').textContent = music || '';
  document.getElementById('cnt-podcasts').textContent = pods || '';
}

const _albumTracksCache = {};
function getExpandedAlbums() {
  try { return new Set(JSON.parse(localStorage.getItem('albumExpanded') || '[]')); } catch { return new Set(); }
}
function saveExpandedAlbums(set) {
  try { localStorage.setItem('albumExpanded', JSON.stringify([...set])); } catch {}
}

function renderSuggRow(s, explorationId) {
  const uri = (s.uri || '').replace(/'/g, "\\'");
  const lbl = (s.label || '').replace(/'/g, "\\'");
  const isAlbum = !!(s.uri && s.uri.startsWith('spotify:album:') && explorationId);
  const albumId = isAlbum ? s.uri.split(':').pop() : '';
  let h = '';
  if (isAlbum) h += '<div class="sugg-with-tracks">';
  h += `<div class="suggestion-item">
    <div class="suggestion-info">
      <div class="suggestion-title">${esc(s.label)}</div>
      ${s.note ? '<div class="suggestion-detail">' + esc(s.note) + '</div>' : ''}
    </div>
    <div class="sugg-actions">
      ${s.uri ? `<button class="sugg-btn sugg-btn-play" onclick="playDiscovery('play',decodeURIComponent('${uri}'),decodeURIComponent('${lbl}'))">▶</button>
      <button class="sugg-btn sugg-btn-queue" onclick="playDiscovery('queue',decodeURIComponent('${uri}'),decodeURIComponent('${lbl}'))">+</button>` : ''}
      ${isAlbum ? `<button class="sugg-btn sugg-btn-expand" onclick="toggleAlbumTracks(${explorationId},decodeURIComponent('${uri}'),this)">▾</button>` : ''}
    </div>
  </div>`;
  if (isAlbum) h += `<div class="album-tracks-panel" id="at-${explorationId}-${albumId}"></div></div>`;
  return h;
}

async function toggleAlbumTracks(explorationId, albumUri, btn) {
  const albumId = albumUri.split(':').pop();
  const panelId = 'at-' + explorationId + '-' + albumId;
  const panel = document.getElementById(panelId);
  if (!panel) return;

  const savedAlbums = getExpandedAlbums();
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    btn.classList.remove('open');
    btn.textContent = '▾';
    savedAlbums.delete(panelId);
    saveExpandedAlbums(savedAlbums);
    return;
  }

  btn.classList.add('open');
  btn.textContent = '▴';
  savedAlbums.add(panelId);
  saveExpandedAlbums(savedAlbums);

  // Already loaded content?
  if (panel.children.length > 0 && !panel.querySelector('.album-tracks-loading')) {
    panel.classList.add('show');
    return;
  }

  // Show loading state
  panel.innerHTML = '<div class="album-tracks-loading"><span class="spinner"></span> Loading tracks…</div>';
  panel.classList.add('show');

  let tracks;
  if (_albumTracksCache[explorationId]) {
    tracks = _albumTracksCache[explorationId][albumUri];
  } else {
    try {
      const resp = await fetch('album_tracks/' + explorationId + '.json?v=' + (Date.now()>>10));
      if (resp.ok) {
        _albumTracksCache[explorationId] = await resp.json();
        tracks = _albumTracksCache[explorationId][albumUri];
      }
    } catch(e) {
      console.log('[albumTracks] fetch error:', e);
    }
  }

  if (!tracks || tracks.length === 0) {
    panel.innerHTML = '<div class="album-tracks-loading" style="color:var(--text-dim);opacity:0.5">No track data yet</div>';
    return;
  }

  let html = '';
  for (const t of tracks) {
    const tName = t.name || t.t || '';
    const tUriVal = t.uri || t.u || '';
    // p2.41: encode pattern (see renderSuggRow) — double quotes in track names broke onclick
    const tUri = encodeURIComponent(tUriVal).replace(/'/g, '%27');
    const tLbl = encodeURIComponent(tName).replace(/'/g, '%27');
    const num = (t.d && t.d > 1 ? t.d + '-' : '') + t.n;
    html += `<div class="album-track-item">
      <span class="at-num">${num}</span>
      <span class="at-name">${esc(tName)}</span>
      <div class="sugg-actions">
        ${tUriVal ? `<button class="sugg-btn sugg-btn-play" onclick="playDiscovery('play','${tUri}','${tLbl}')">▶</button>
        <button class="sugg-btn sugg-btn-queue" onclick="playDiscovery('queue','${tUri}','${tLbl}')">+</button>` : ''}
      </div>
    </div>`;
  }
  panel.innerHTML = html;
}

function renderDiscovery() {
  const el = document.getElementById('discovery-list');
  if (!data || !data.play_commands || data.play_commands.length === 0) {
    el.innerHTML = '<div class="empty-state">🔍 No discoveries yet</div>';
    return;
  }
  const cmds = data.play_commands;
  // Stat line
  const lastDate = new Date(cmds[0].timestamp);
  const statLine = `${cmds.length} artists explored · last on ${lastDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} at ${fmtTime(cmds[0].timestamp)}`;
  let html = `<div class="discovery-stat">${esc(statLine)}</div>`;

  for (let i = 0; i < cmds.length; i++) {
    const cmd = cmds[i];
    const isOpen = i < 3;
    const d = new Date(cmd.timestamp);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    // Normalize suggestions: may be array or {items: [...], genre, context, ...}
    const rawSuggs = cmd.suggestions || [];
    const allSuggs = Array.isArray(rawSuggs) ? rawSuggs : (rawSuggs.items || []);
    const isClassical = !Array.isArray(rawSuggs) && rawSuggs.context === 'classical';
    const sourceTrack = allSuggs.find(s => s.type === 'source_track');
    const regularSuggs = allSuggs.filter(s => s.type !== 'source_track');
    const playableSuggs = regularSuggs.filter(s => s.type !== 'section_header' && s.type !== 'narrative');
    const suggCount = playableSuggs.length;

    // Use source track label for "from" text instead of "Exploring: Artist"
    const fromText = sourceTrack ? sourceTrack.label : cmd.title;

    html += `<div class="discovery-card${isOpen ? ' open' : ''}" id="disc-${i}">`;
    html += `<div class="disc-header" onclick="document.getElementById('disc-${i}').classList.toggle('open')">`;
    html += `<div class="disc-artist-badge">${esc(cmd.artist || cmd.title)}</div>`;
    html += `<div class="disc-hinfo">`;
    html += `<div class="disc-meta">from ${esc(fromText)} · ${dateStr}${suggCount ? ' · ' + suggCount + ' suggestions' : ''}</div>`;
    html += `</div><div class="disc-expand">›</div></div>`;

    // Body
    html += '<div class="disc-body">';

    // Source track — the launch point
    if (sourceTrack) {
      const stUri = (sourceTrack.uri || '').replace(/'/g, "\\'");
      const stLbl = (sourceTrack.label || '').replace(/'/g, "\\'");
      html += `<div class="disc-source-track">
        <div class="disc-source-icon">🎵</div>
        <div class="disc-source-info">
          <span class="disc-source-label">Started from</span>
          <span class="disc-source-title">${esc(sourceTrack.label)}</span>
        </div>
        <div class="sugg-actions">
          ${sourceTrack.uri ? `<button class="sugg-btn sugg-btn-play" onclick="playDiscovery('play',decodeURIComponent('${stUri}'),decodeURIComponent('${stLbl}'))">▶</button>
          <button class="sugg-btn sugg-btn-queue" onclick="playDiscovery('queue',decodeURIComponent('${stUri}'),decodeURIComponent('${stLbl}'))">+</button>` : ''}
        </div>
      </div>`;
    }

    if (cmd.narrative) {
      html += `<div class="disc-narrative">${formatNarrative(cmd.narrative)}</div>`;
    }

    if (regularSuggs.length > 0) {
      // Classical cards: use section_header/narrative types for structured axes
      // Standard cards: infer section from label emoji prefix
      if (isClassical) {
        // Split into core (visible) and overflow (behind •••)
        const coreSuggs = regularSuggs.filter(s => !s.overflow);
        const overflowSuggs = regularSuggs.filter(s => s.overflow);
        html += renderClassicalSuggestions(coreSuggs, cmd);
        if (overflowSuggs.length > 0) {
          html += `<div class="disc-overflow-toggle" onclick="this.nextElementSibling.classList.toggle('show');this.textContent=this.textContent==='•••'?'▲':'•••'">•••</div>`;
          html += `<div class="disc-overflow-body">`;
          html += renderClassicalSuggestions(overflowSuggs, cmd);
          html += `</div>`;
        }
      } else {
        let currentSection = '';
        for (const s of regularSuggs) {
          // Section headers
          if (s.type === 'section_header') {
            html += `<div class="suggestion-section-label">${esc(s.label)}</div>`;
            currentSection = s.label;
            continue;
          }
          // Auto-detect section from label prefix if no explicit headers
          if (!currentSection || s.type === 'source_album') {
            const section = s.label && s.label.startsWith('🎛') ? 'Related Artists' :
                            s.label && s.label.startsWith('🤝') ? 'Related Artists' :
                            s.label && s.label.startsWith('📻') ? 'Related Artists' :
                            'By ' + esc(cmd.artist || cmd.title);
            if (section !== currentSection) {
              currentSection = section;
              html += `<div class="suggestion-section-label">${section}</div>`;
            }
          }
          html += renderSuggRow(s, cmd.exploration_id);
        }
      }
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
  // Restore previously expanded album track panels
  const savedAlbums = getExpandedAlbums();
  for (const panelId of savedAlbums) {
    const panel = document.getElementById(panelId);
    if (!panel) { savedAlbums.delete(panelId); continue; }
    const btn = panel.previousElementSibling?.querySelector('.sugg-btn-expand')
             || panel.closest('.sugg-with-tracks')?.querySelector('.sugg-btn-expand');
    if (btn) {
      // Extract explorationId and albumUri from panelId: at-{explorationId}-{albumId}
      const parts = panelId.replace(/^at-/, '').split('-');
      const explorationId = parseInt(parts[0], 10);
      const albumId = parts.slice(1).join('-');
      // Fire the toggle to load and expand
      toggleAlbumTracks(explorationId, 'spotify:album:' + albumId, btn);
    }
  }
  saveExpandedAlbums(savedAlbums);
}

function renderClassicalSuggestions(suggs, cmd) {
  let html = '';
  for (const s of suggs) {
    if (s.type === 'section_header') {
      html += `<div class="suggestion-section-label">${esc(s.label)}</div>`;
    } else if (s.type === 'narrative') {
      html += `<div class="disc-narrative">${formatNarrative(s.text || '')}</div>`;
    } else {
      html += renderSuggRow(s, cmd.exploration_id);
    }
  }
  return html;
}

function formatNarrative(text) {
  // Bold **text** and italic *text*
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ══════════════════════════════════════════════════════════════════════════════
// DIRECT PLAY / QUEUE / EXPLORE
// ══════════════════════════════════════════════════════════════════════════════
let _lastDirectPlayTime = 0;
async function directPlay(action, encodedData) {
  const now = Date.now();
  if (now - _lastDirectPlayTime < 600) { console.log('[directPlay] throttled'); return; }
  _lastDirectPlayTime = now;
  const info = JSON.parse(decodeURIComponent(encodedData));
  let uri = info.uri;
  console.log('[directPlay]', action, 'house=' + house, 'rooms=' + JSON.stringify(selectedRooms[house]), 'uri=' + (uri||'none'), 'title=' + (info.title||'?'), 'cmdId=' + (commanderId||'null'));

  // Determine play target: if the user is on a Sonos tab (caphill/vashon) with rooms selected,
  // ALWAYS use the Sonos path. The service handles Spotify URIs via ShareLinkPlugin.
  // Only use Spotify Connect (roaming path) when on the roaming tab.

  // --- SONOS PATH (Cap Hill / Vashon) ---
  if (house !== 'roaming') {
    const rawRooms = (selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms();
    const rooms = filterOfflineRooms(rawRooms);
    if (!rooms.length) { showToast('All selected rooms are offline', true); return; }

    // [DESIGN NOTE] play_next handles ALL services (Spotify, Qobuz, Apple Music).
    // Service-side: Spotify URIs use ShareLinkPlugin, raw Sonos URIs use add_uri_to_queue.
    // Queue is preserved in all cases — play_uri (destructive) is no longer used from UI.
    // Priority: spotify URI > playable sonos URI > Spotify search fallback.
    // x-sonos-vli: URIs are virtual library items — NOT directly playable (UPnP 804).
    const sonosUri = (info.sonos_uri && !info.sonos_uri.startsWith('x-sonos-vli:')) ? info.sonos_uri : '';
    const playUri = uri || sonosUri;
    if (!playUri) {
      // No Spotify URI or playable Sonos URI — resolve via client-side Spotify search first,
      // then send play_next with the resolved URI. This bypasses Sonos's Spotify service auth
      // (which can expire independently). Falls back to service-side search_and_play if no PKCE token.
      const q = [info.artist, info.title].filter(Boolean).join(' ');
      if (!q) { showToast('No track info to search', true); return; }
      if (hasSpotifyAuth()) {
        console.log('[directPlay] No playable URI — resolving via client-side Spotify search');
        showToast('Searching...');
        try {
          const r = await spotifyApi('GET', '/search?type=track&limit=1&q=' + encodeURIComponent(q));
          const resolvedUri = r?.tracks?.items?.[0]?.uri;
          if (resolvedUri) {
            uri = resolvedUri;
            // Fall through to play_next with the resolved URI below
            console.log('[directPlay] Resolved URI:', resolvedUri);
          } else {
            showToast('Not found on Spotify', true); return;
          }
        } catch(e) {
          console.log('[directPlay] Client search failed, falling back to service search');
          const ok = await postNtfy({ action: 'search_and_play', query: q, service: 'Spotify', search_type: 'tracks', rooms, target_client_id: commanderId });
          if (ok) showToast('✓ Searching & playing: ' + (info.title || '') + ' → ' + rooms.join(', '));
          return;
        }
      } else {
        console.log('[directPlay] No PKCE auth — falling back to search_and_play on service');
        const ok = await postNtfy({ action: 'search_and_play', query: q, service: 'Spotify', search_type: 'tracks', rooms, target_client_id: commanderId });
        if (ok) showToast('✓ Searching & playing: ' + (info.title || '') + ' → ' + rooms.join(', '));
        return;
      }
    }
    const finalUri = playUri || uri;
    const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_next';
    const ok = await postNtfy({ action: ntfyAction, uri: finalUri, title: info.title || '', artist: info.artist || '', album: info.album || '', rooms, target_client_id: commanderId });
    if (ok) showToast('✓ ' + (action === 'queue' ? 'Queued' : 'Playing') + ': ' + (info.title || '') + ' → ' + rooms.join(', '));
    return;
  }

  // --- ROAMING PATH (Spotify Connect) ---
  // For Roaming, need a Spotify URI — search if we don't have one
  if (!uri) {
    const token = await getSpotifyToken();
    if (!token) { showToast('Open Controller to connect Spotify', true); return; }
    showToast('Searching...');
    try {
      const q = [info.artist, info.title].filter(Boolean).join(' ');
      const r = await spotifyApi('GET', '/search?type=track&limit=1&q=' + encodeURIComponent(q));
      uri = r?.tracks?.items?.[0]?.uri;
      if (!uri) { showToast('Not found on Spotify', true); return; }
    } catch(e) { showToast('Search failed', true); return; }
  }
  if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
  const dp = spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : '';
  try {
    if (action === 'queue') {
      await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
      showToast('✓ Queued: ' + (info.title || ''));
    } else {
      await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
      await new Promise(r => setTimeout(r, 300));
      await spotifyApi('POST', '/me/player/next');
      showToast('✓ Playing: ' + (info.title || ''));
    }
    setTimeout(fetchSpotifyNowPlaying, 1000);
  } catch(e) { showToast('✗ ' + e.message, true); }
}

// ══════════════════════════════════════════════════════════════════════════════
// CONTEXT PANEL — Album & Playlist expand (Option C)
// ══════════════════════════════════════════════════════════════════════════════
let _playlistIndex = null; // lazy-loaded: { uri: [{name, playlist_uri}] }
let _playlistIndexLoading = false;

async function loadPlaylistIndex() {
  if (_playlistIndex) return _playlistIndex;
  if (_playlistIndexLoading) {
    // Wait for in-flight load
    while (_playlistIndexLoading) await new Promise(r => setTimeout(r, 100));
    return _playlistIndex;
  }
  _playlistIndexLoading = true;
  try {
    const r = await fetch('https://shumania.github.io/lifelog/playlist_track_index.json?v=' + (Date.now()>>16));
    if (r.ok) _playlistIndex = await r.json();
  } catch(e) { console.error('Failed to load playlist index', e); }
  _playlistIndexLoading = false;
  return _playlistIndex;
}

function toggleCtxPanel(panelId, btn, encodedInfo) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  // Close all other panels first
  document.querySelectorAll('.ctx-panel.open').forEach(p => {
    if (p.id !== panelId) {
      p.classList.remove('open');
      // Reset the toggle button
      const prevBtn = p.previousElementSibling?.querySelector('.ctx-toggle');
      if (prevBtn) { prevBtn.classList.remove('open'); prevBtn.textContent = '▾'; }
    }
  });
  if (isOpen) {
    panel.classList.remove('open');
    btn.classList.remove('open');
    btn.textContent = '▾';
  } else {
    panel.classList.add('open');
    btn.classList.add('open');
    btn.textContent = '▴';
    populateCtxPanel(panelId, JSON.parse(decodeURIComponent(encodedInfo)));
  }
}

async function populateCtxPanel(panelId, info) {
  const panel = document.getElementById(panelId);
  if (!panel) return;

  // Build rows: album first, then playlists
  let rows = '';

  // --- Album row ---
  if (info.album) {
    let albumUri = '';
    // Use context_uri if it's an album
    if (info.context_type === 'album' && info.context_uri) {
      albumUri = info.context_uri;
    }
    const albumData = encodeURIComponent(JSON.stringify({
      context_uri: albumUri,
      title: info.title,
      artist: info.artist,
      album: info.album,
      service: info.service,
      sonos_uri: info.sonos_uri || ''
    })).replace(/'/g, '%27');

    rows += `<div class="ctx-row">
      <span class="ctx-icon">💿</span>
      <span class="ctx-label"><span class="ctx-type">Album</span>${esc(info.album)}</span>
      <span class="ctx-actions">
        <button class="action-btn" onclick="playContext('play','${albumData}')" title="Play Album">▶</button>
        <button class="action-btn" onclick="playContext('queue','${albumData}')" title="Queue Album">+</button>
      </span>
    </div>`;
  }

  // --- Context playlist row (from tagged data) ---
  if (info.context_type === 'playlist' && info.context_uri) {
    const plName = await lookupPlaylistName(info.context_uri) || 'Playlist';
    const plData = encodeURIComponent(JSON.stringify({
      context_uri: info.context_uri,
      title: info.title,
      artist: info.artist,
      album: info.album || '',
      service: info.service,
      playlist_name: plName,
      sonos_uri: ''
    })).replace(/'/g, '%27');
    rows += `<div class="ctx-row">
      <span class="ctx-icon">📋</span>
      <span class="ctx-label"><span class="ctx-type">Playlist</span>${esc(plName)}</span>
      <span class="ctx-actions">
        <button class="action-btn" onclick="playContext('play','${plData}')" title="Play Playlist">▶</button>
        <button class="action-btn" onclick="playContext('queue','${plData}')" title="Queue Playlist">+</button>
      </span>
    </div>`;
  }

  // --- Additional playlists from track index ---
  if (info.uri) {
    const loadingId = panelId + '-pl-loading';
    if (!_playlistIndex) {
      rows += `<div class="ctx-loading" id="${loadingId}">Loading playlists…</div>`;
    }
    panel.innerHTML = rows;

    // Lazy-load playlist index
    const idx = await loadPlaylistIndex();
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    if (idx && idx[info.uri]) {
      const playlists = idx[info.uri];
      let plRows = '';
      for (const pl of playlists) {
        // Skip if already shown as context playlist
        if (info.context_type === 'playlist' && info.context_uri === pl.playlist_uri) continue;
        const hasRealUri = pl.playlist_uri && !pl.playlist_uri.startsWith('archive:');
        if (hasRealUri) {
          const plData = encodeURIComponent(JSON.stringify({
            context_uri: pl.playlist_uri,
            title: info.title,
            artist: info.artist,
            album: info.album || '',
            service: info.service,
            playlist_name: pl.name,
            sonos_uri: ''
          })).replace(/'/g, '%27');
          plRows += `<div class="ctx-row">
            <span class="ctx-icon">📋</span>
            <span class="ctx-label"><span class="ctx-type">Playlist</span>${esc(pl.name)}</span>
            <span class="ctx-actions">
              <button class="action-btn" onclick="playContext('play','${plData}')" title="Play Playlist">▶</button>
              <button class="action-btn" onclick="playContext('queue','${plData}')" title="Queue Playlist">+</button>
            </span>
          </div>`;
        } else {
          // Archive playlist — no real URI yet, display only
          plRows += `<div class="ctx-row">
            <span class="ctx-icon">📋</span>
            <span class="ctx-label"><span class="ctx-type">Playlist</span>${esc(pl.name)}</span>
          </div>`;
        }
      }
      panel.innerHTML += plRows;
    }
  } else {
    panel.innerHTML = rows;
  }

  // If no rows at all, show a hint
  if (!panel.innerHTML.trim()) {
    panel.innerHTML = '<div class="ctx-loading">No album or playlist info available</div>';
  }
}

let _playlistNameCache = {}; // playlist_uri → name

async function lookupPlaylistName(playlistUri) {
  if (_playlistNameCache[playlistUri]) return _playlistNameCache[playlistUri];
  // Build name cache from index if loaded
  const idx = _playlistIndex || await loadPlaylistIndex();
  if (idx) {
    for (const trackUri in idx) {
      for (const pl of idx[trackUri]) {
        _playlistNameCache[pl.playlist_uri] = pl.name;
      }
    }
    if (_playlistNameCache[playlistUri]) return _playlistNameCache[playlistUri];
  }
  // Fallback: Spotify API
  const match = playlistUri.match(/spotify:playlist:(\w+)/);
  if (match && hasSpotifyAuth()) {
    try {
      const r = await spotifyApi('GET', '/playlists/' + match[1] + '?fields=name');
      if (r?.name) { _playlistNameCache[playlistUri] = r.name; return r.name; }
    } catch(e) {}
  }
  return null;
}

async function playContext(action, encodedData) {
  const info = JSON.parse(decodeURIComponent(encodedData));
  let contextUri = info.context_uri;
  const svc = (info.service || '').toLowerCase();
  const sonosUri = (info.sonos_uri || '').toLowerCase();
  console.log('[playContext]', action, 'svc=' + svc, 'album=' + info.album, 'context_uri=' + (contextUri || '(none)'), 'sonos_uri=' + (info.sonos_uri || '(none)'));

  // --- QOBUZ / APPLE MUSIC ALBUM PATH (Sonos only) ---
  // These services don't have Spotify-style context URIs. Use play_album action
  // which searches the music service natively and queues the full album.
  // Detect by service name OR by sonos_uri pattern (sid=31 = Qobuz, sid=204 = Apple Music)
  const isQobuz = svc.includes('qobuz') || sonosUri.includes('sid=31');
  const isApple = svc.includes('apple') || sonosUri.includes('sid=204');
  if ((isQobuz || isApple) && info.album && house !== 'roaming') {
    const rooms = filterOfflineRooms((selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms());
    if (!rooms.length) { showToast('All selected rooms are offline', true); return; }
    const service = isQobuz ? 'Qobuz' : 'Apple Music';
    console.log('[playContext] → play_album path, service=' + service, 'album=' + info.album, 'artist=' + info.artist);
    const label = info.album;
    showToast('Searching ' + service + '…');
    const payload = {
      action: 'play_album',
      title: info.album,
      artist: info.artist || '',
      service: service,
      rooms,
      target_client_id: commanderId
    };
    if (action === 'queue') payload.queue_only = true;
    const ok = await postNtfy(payload);
    if (ok) showToast('✓ ' + (action === 'queue' ? 'Queuing' : 'Playing') + ' album: ' + label + ' → ' + rooms.join(', '));
    return;
  }

  // If no context_uri, search for album on Spotify
  if (!contextUri && info.album) {
    if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
    showToast('Searching album…');
    try {
      const q = 'album:' + info.album + (info.artist ? ' artist:' + info.artist : '');
      const r = await spotifyApi('GET', '/search?type=album&limit=1&q=' + encodeURIComponent(q));
      contextUri = r?.albums?.items?.[0]?.uri;
      if (!contextUri) { showToast('Album not found on Spotify', true); return; }
    } catch(e) { showToast('Search failed', true); return; }
  }

  if (!contextUri) { showToast('No URI available', true); return; }

  const label = info.playlist_name || info.album || 'context';

  // --- SONOS PATH ---
  if (house !== 'roaming') {
    const rooms = filterOfflineRooms((selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms());
    if (!rooms.length) { showToast('All selected rooms are offline', true); return; }
    const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_next';
    await postNtfy({ action: ntfyAction, uri: contextUri, title: label, rooms, target_client_id: commanderId });
    showToast('✓ ' + (action === 'queue' ? 'Queued' : 'Playing') + ': ' + label + ' → ' + rooms.join(', '));
    return;
  }

  // --- ROAMING PATH (Spotify Connect) ---
  if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
  await _ensureDeviceAwake();
  const dpQ = spotifySelectedDeviceId ? '?device_id=' + spotifySelectedDeviceId : '';
  try {
    const body = { context_uri: contextUri };
    await spotifyApi('PUT', '/me/player/play' + dpQ, body);
    showToast('✓ Playing: ' + label);
    setTimeout(fetchSpotifyNowPlaying, 1000);
  } catch(e) {
    // Device might have gone offline — retry once without device_id
    if (e.message && e.message.toLowerCase().includes('no active device') && spotifySelectedDeviceId) {
      console.log('[playContext] No active device — retrying without device_id');
      try {
        await spotifyApi('PUT', '/me/player/play', { context_uri: contextUri });
        showToast('✓ Playing: ' + label);
        setTimeout(fetchSpotifyNowPlaying, 1000);
        return;
      } catch(e2) { showToast('✗ Player command failed: ' + e2.message, true); return; }
    }
    showToast('✗ Player command failed: ' + e.message, true);
  }
}

let _lastDiscoveryPlay = 0;
async function playDiscovery(action, uri, label) {
  if (!uri) { showToast('No URI', true); return; }
  // Throttle: prevent rapid taps (600ms)
  const now = Date.now();
  if (now - _lastDiscoveryPlay < 600) { console.log('[playDiscovery] throttled'); return; }
  _lastDiscoveryPlay = now;

  if (house === 'roaming') {
    if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
    await _ensureDeviceAwake();
    try {
      if (action === 'queue' && uri.includes(':track:')) {
        const dp = spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : '';
        await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
        showToast('✓ Queued: ' + label);
      } else {
        const dpQ = spotifySelectedDeviceId ? '?device_id=' + spotifySelectedDeviceId : '';
        const body = uri.includes(':track:') ? { uris: [uri] } : { context_uri: uri };
        await spotifyApi('PUT', '/me/player/play' + dpQ, body);
        showToast('✓ Playing: ' + label);
      }
      setTimeout(fetchSpotifyNowPlaying, 1000);
    } catch(e) {
      // Device might have gone fully offline — retry once without device_id (plays on any active device)
      if (e.message && e.message.toLowerCase().includes('device not found') && spotifySelectedDeviceId) {
        console.log('[playDiscovery] Device not found — retrying without device_id');
        try {
          if (action === 'queue' && uri.includes(':track:')) {
            await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri));
          } else {
            const body = uri.includes(':track:') ? { uris: [uri] } : { context_uri: uri };
            await spotifyApi('PUT', '/me/player/play', body);
          }
          showToast('✓ ' + (action === 'queue' ? 'Queued' : 'Playing') + ': ' + label);
          setTimeout(fetchSpotifyNowPlaying, 1000);
          return;
        } catch(e2) { showToast('✗ ' + e2.message, true); return; }
      }
      showToast('✗ ' + e.message, true);
    }
    return;
  }

  // Sonos
  const rooms = filterOfflineRooms((selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms());
  if (!rooms.length) { showToast('All selected rooms are offline', true); return; }
  // DESIGN NOTE: play_next is non-destructive (queue-safe). play_spotify_uri destroys queue.
  const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_next';
  const ok = await postNtfy({ action: ntfyAction, uri, title: label, rooms, target_client_id: commanderId });
  if (ok) showToast('✓ ' + (action === 'queue' ? 'Queued' : 'Playing') + ': ' + label + ' → ' + house + ':' + rooms.join(', '));
}

// Find existing exploration card for an artist. Returns card index or -1.
// Word-boundary matching: "Bill Evans Trio" matches explored "Bill Evans" but "Milton Nascimento" does NOT match "Nas"
function findExploredCard(artist) {
  if (!artist || !data || !data.explored_artists) return -1;
  const a = artist.toLowerCase().trim();
  // Exact match first
  if (data.explored_artists[a] !== undefined) return data.explored_artists[a];
  // Partial: word-boundary match — explored name must appear as complete word(s) in artist, or vice versa
  for (const [name, idx] of Object.entries(data.explored_artists)) {
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (new RegExp('\\b' + escaped + '\\b').test(a)) return idx;
    const escapedA = a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (new RegExp('\\b' + escapedA + '\\b').test(name)) return idx;
  }
  return -1;
}

function navigateToExploration(cardIndex) {

// ══════════════════════════════════════════════════════════════════════════════
// SSE (Real-time from ntfy)
// ══════════════════════════════════════════════════════════════════════════════
function connectSSE() {
  if (_sseSource) { try { _sseSource.close(); } catch(e) {} }
  const sseAuth = NTFY_TOKEN ? '&auth=Bearer%20' + NTFY_TOKEN : '';
  _sseSource = new EventSource(NTFY_UI_SSE + '?since=16m' + sseAuth);
  _sseLastMsg = Date.now();
  _sseSource.addEventListener('message', (e) => {
    _sseLastMsg = Date.now();
    try {
      const outer = JSON.parse(e.data);
      if (!outer.message) return;
      const msg = JSON.parse(outer.message);
      // Infer house from msg.house OR ntfy topic name
      let sseHouse = msg.house || null;
      if (!sseHouse && outer.topic) {
        if (outer.topic.includes('caphill')) sseHouse = 'caphill';
        else if (outer.topic.includes('vashon')) sseHouse = 'vashon';
      }

      // Helper: retire a track from Now Playing into history list
      function retireTrackToHistory(track, h) {
        if (!track || !track.title || allItems.length === 0) return;
        // Don't retire radio tracks with garbled metadata — enriched data comes via ingest
        const tUri = (track.uri || '').toLowerCase();
        const tSvc = (track.service || '').toLowerCase();
        if (tUri.includes('kcrw') || tUri.includes('kexp') || tSvc.includes('tunein') || tSvc.includes('radio')) return;
        const endedItem = {
          type: 'music', title: track.title, artist: track.artist||'', album: track.album||'',
          source: track.service ? 'sonos_' + track.service.replace('sonos_','') : 'sonos',
          timestamp: new Date().toISOString(),
          domain: (track.rooms||[]).join(', '), house: h||house,
          uri: track.uri||'', sonos_uri: track.uri||'', _fromSSE: true
        };
        // Dedup: don't prepend if top item is same track within last 2 min
        const top = allItems[0];
        if (!(top && top.title === endedItem.title && top.artist === endedItem.artist &&
              Math.abs(new Date(top.timestamp) - new Date(endedItem.timestamp)) < 120000)) {
          allItems.unshift(endedItem);
          renderHistory();
        }
      }

      // v1.70 bundled SSE: messages have "events" array (new) or "event" string (old)
      const events = msg.events || (msg.event ? [msg.event] : []);

      // --- Handle now_playing ---
      if (events.includes('now_playing')) {
        if (_trackEndedTimer) { clearTimeout(_trackEndedTimer); _trackEndedTimer = null; }
        if (sseHouse && _sseNowPlaying[sseHouse] && !_sseNowPlaying[sseHouse]._fromStatus) {
          retireTrackToHistory(_sseNowPlaying[sseHouse], sseHouse);
        }
        _sseNowPlayingGlobal = { title: msg.title, artist: msg.artist, album: msg.album, rooms: [...new Set(msg.rooms||[])], house: sseHouse, service: msg.service||'', uri: msg.uri||'', ts: Date.now() };
        if (sseHouse) {
          _sseNowPlaying[sseHouse] = { title: msg.title, artist: msg.artist, album: msg.album, rooms: [...new Set(msg.rooms||[])], service: msg.service||'', uri: msg.uri||'', ts: Date.now() };
          if (sseHouse === house) {
            renderNowPlayingSonos(house);
            if (msg.rooms && msg.rooms.length > 0 && !_userManualRoomSelect[house]) {
              selectedRooms[house] = [...msg.rooms];
              localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms[house]));
              renderRooms(house);
            }
          }
        }
        if (house === 'roaming') renderNowPlayingRoaming();
      }

      // --- Handle stopped ---
      if (events.includes('stopped') || events.includes('track_ended')) {
        if (sseHouse && _sseNowPlaying[sseHouse] && !_sseNowPlaying[sseHouse]._fromStatus) {
          retireTrackToHistory(_sseNowPlaying[sseHouse], sseHouse);
        }
        if (_trackEndedTimer) clearTimeout(_trackEndedTimer);
        _trackEndedTimer = setTimeout(() => {
          _trackEndedTimer = null;
          _sseNowPlayingGlobal = null;
          if (sseHouse) { delete _sseNowPlaying[sseHouse]; if (sseHouse === house) renderNowPlayingSonos(house); }
          if (house === 'roaming') renderNowPlayingRoaming();
        }, 3000);
      }

      // --- Always process state fields (every bundled message is a full snapshot) ---
      if (msg.play_modes !== undefined) { _playModes = msg.play_modes; updateMuteRepeatButtons(); }
      if (msg.mute_states !== undefined) { _muteStates = msg.mute_states; updateMuteRepeatButtons(); }
      if (sseHouse && msg.rooms_playing) {
        // Track all visible rooms for offline detection
        if (msg.rooms_all) { _roomsAll[sseHouse] = [...msg.rooms_all]; }
        // Auto-switch tab if music starts in another house
        if (!_tabManualOverride && msg.rooms_playing.length > 0 && sseHouse !== house) {
          console.log('[auto-tab] SSE: switching to', sseHouse, '(speakers started)');
          setHouse(sseHouse);
        }
        if (sseHouse === house) {
          _roomsPlaying = [...msg.rooms_playing];
          _roomsPaused = msg.rooms_paused ? [...msg.rooms_paused] : [];
          if (!_userManualRoomSelect[house] && msg.rooms_playing.length > 0) {
            selectedRooms[house] = [...msg.rooms_playing];
            localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms[house]));
          } else if (!_userManualRoomSelect[house] && msg.rooms_playing.length === 0) {
            // Don't clear rooms if now_playing just set them in this same message (snapshot race)
            if (events.includes('now_playing') && msg.rooms && msg.rooms.length > 0) {
              console.log('[rooms] SSE: skipping rooms_playing=[] clear — now_playing has rooms:', msg.rooms);
            } else {
              // Nothing playing — keep paused rooms selected so user can resume
              const pausedFallback = (msg.rooms_paused && msg.rooms_paused.length > 0) ? [...msg.rooms_paused] : [];
              selectedRooms[house] = pausedFallback;
              localStorage.setItem('ll_rooms_' + house, JSON.stringify(pausedFallback));
              if (pausedFallback.length > 0) console.log('[rooms] SSE: keeping paused rooms selected:', pausedFallback);
            }
          }
          renderRooms(house);
          // v1.86 fix: re-render mute/repeat after rooms_playing is set
          // (mute_states processed above may have run before _roomsPlaying was updated)
          updateMuteRepeatButtons();
        }
        // Defensive: if all rooms stopped (not just paused) and no explicit stopped event, clear now-playing
        const hasPausedRooms = msg.rooms_paused && msg.rooms_paused.length > 0;
        if (msg.rooms_playing.length === 0 && _sseNowPlaying[sseHouse] && !events.includes('now_playing')) {
          if (hasPausedRooms) {
            // Rooms are paused, not stopped — keep now-playing visible for resume
            console.log('[now-playing] Keeping paused track visible:', _sseNowPlaying[sseHouse].title);
            if (sseHouse === house) renderNowPlayingSonos(house);
          } else if (!events.includes('stopped') && !events.includes('track_ended')) {
            // Truly stopped — retire and clear
            if (!_sseNowPlaying[sseHouse]._fromStatus) {
              retireTrackToHistory(_sseNowPlaying[sseHouse], sseHouse);
            }
            delete _sseNowPlaying[sseHouse];
            if (_sseNowPlayingGlobal && _sseNowPlayingGlobal.house === sseHouse) {
              _sseNowPlayingGlobal = null;
            }
            if (sseHouse === house) renderNowPlayingSonos(house);
            if (house === 'roaming') renderNowPlayingRoaming();
          }
        }
      }

      // --- Opportunistic now-playing from now_playing_tracks (status/snapshot) ---
      if (msg.now_playing_tracks && msg.now_playing_tracks.length > 0 && !events.includes('now_playing')) {
        const t = msg.now_playing_tracks[0];
        const h = sseHouse || house;
        if (!_sseNowPlaying[h]) {
          _sseNowPlaying[h] = { title: t.title||'', artist: t.artist||'', album: t.album||'',
            rooms: [...new Set(msg.now_playing_tracks.map(x=>x.rooms||[]).flat())], uri: t.uri||'', ts: Date.now(), _fromStatus: true };
          if (h === house) renderNowPlayingSonos(house);
        }
        if (!_sseNowPlayingGlobal) {
          _sseNowPlayingGlobal = { ..._sseNowPlaying[h], house: h };
          if (house === 'roaming') renderNowPlayingRoaming();
        }
      } else if ((!msg.now_playing_tracks || msg.now_playing_tracks.length === 0) && events.includes('status_update')) {
        // Status update says nothing playing — clear _fromStatus entries (they were seeded from a previous snapshot)
        const h = sseHouse || house;
        if (_sseNowPlaying[h] && _sseNowPlaying[h]._fromStatus) {
          delete _sseNowPlaying[h];
          if (_sseNowPlayingGlobal && _sseNowPlayingGlobal.house === h) _sseNowPlayingGlobal = null;
          if (h === house) renderNowPlayingSonos(house);
          if (house === 'roaming') renderNowPlayingRoaming();
        }
      }

      // --- Update status dot ---
      if (msg.client_id && data && data.client_status) {
        const c = data.client_status.find(s => s.client_id === msg.client_id);
        if (c) {
          c.last_seen = new Date().toISOString();
          if (msg.version) c.version = msg.version;
          // Patch sonos_commander from live SSE — data-head.json may be stale
          if (msg.sonos_commander !== undefined) c.sonos_commander = msg.sonos_commander ? 1 : 0;
          // If this client has sonos modules, mark it as commander (it's sending status_updates)
          if (events.includes('status_update') && !c.sonos_commander) { c.sonos_commander = 1; }
          updateCommander();
        }
        renderStatusBar();
      }
    } catch(err) {}
  });
}

// SSE watchdog + reconnect
setInterval(() => { if (Date.now() - _sseLastMsg > 120000) connectSSE(); }, 30000);
// Status bar freshness re-render (colors drift as time passes)
setInterval(() => { renderStatusBar(); }, 60000);

// Stale Now Playing watchdog — clear if >10 min since last update (missed stopped event safety net)
setInterval(() => {
  const STALE_MS = 600000; // 10 min
  for (const h of Object.keys(_sseNowPlaying)) {
    if (Date.now() - (_sseNowPlaying[h].ts || 0) > STALE_MS) {
      console.log(`[stale-watchdog] Clearing stale now_playing for ${h} (age: ${Math.round((Date.now() - _sseNowPlaying[h].ts) / 60000)}m)`);
      delete _sseNowPlaying[h];
      if (_sseNowPlayingGlobal && _sseNowPlayingGlobal.house === h) _sseNowPlayingGlobal = null;
      if (h === house) renderNowPlayingSonos(house);
      if (house === 'roaming') renderNowPlayingRoaming();
    }
  }
}, 60000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    connectSSE();
    loadData(false);  // v1.65: refresh data-head.json on page foreground (mobile Safari kills setInterval)
    if (house === 'roaming' && hasSpotifyAuth()) { fetchSpotifyDevices(); fetchSpotifyNowPlaying(); }
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// PLAYLISTS TAB
// ══════════════════════════════════════════════════════════════════════════════
let _playlists = [];
let _plTrackCache = {};  // id → track array
let _plTrackLoading = new Set();
let _plTrackError = new Set();
let _plOpenIds = new Set();
let _plLastListened = {};  // playlist_id → ISO timestamp of last listen

const PL_METADATA_URL = 'https://shumania.github.io/lifelog/playlist_metadata.json';
const PL_TRACKS_BASE  = 'https://shumania.github.io/lifelog/playlist_tracks/';

async function loadPlaylistData() {
  try {
    const r = await fetch(PL_METADATA_URL + '?t=' + (Date.now()>>16));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _playlists = await r.json();
    computePlaylistLastListened();
    renderPlaylists();
  } catch(e) {
    console.error('[playlists] Failed to load metadata:', e);
    document.getElementById('playlist-list').innerHTML = '<div class="empty-state">⚠️ Could not load playlists</div>';
  }
}

function computePlaylistLastListened() {
  _plLastListened = {};
  for (const item of allItems) {
    if (!item.context_uri) continue;
    const m = item.context_uri.match(/spotify:playlist:([a-zA-Z0-9]+)/);
    if (!m) continue;
    const plId = m[1];
    const ts = item.timestamp || '';
    if (!_plLastListened[plId] || ts > _plLastListened[plId]) {
      _plLastListened[plId] = ts;
    }
  }
}

async function loadPlTracks(id) {
  _plTrackLoading.add(id);
  _plTrackError.delete(id);
  renderPlaylists();
  try {
    const r = await fetch(PL_TRACKS_BASE + id + '.json?t=' + (Date.now()>>16));
    if (!r.ok) throw new Error(r.status);
    const tracks = await r.json();
    tracks.sort((a,b) => a.position - b.position);
    _plTrackCache[id] = tracks;
  } catch(e) {
    console.error('[playlists] Failed to load tracks for', id, e);
    _plTrackError.add(id);
  }
  _plTrackLoading.delete(id);
  renderPlaylists();
}

function togglePlCard(id) {
  if (_plOpenIds.has(id)) {
    _plOpenIds.delete(id);
  } else {
    _plOpenIds.add(id);
    if (!_plTrackCache[id] && !_plTrackLoading.has(id)) loadPlTracks(id);
  }
  renderPlaylists();
}

function fmtPlDur(ms) {
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return m + ':' + String(s).padStart(2,'0');
}

function playPlTrack(action, trackIdx, playlistId) {
  const tracks = _plTrackCache[playlistId];
  if (!tracks || !tracks[trackIdx]) return;
  const t = tracks[trackIdx];
  const uri = t.track_uri || '';
  const label = t.track_name + ' \u2014 ' + t.artists.map(a=>a.name).join(', ');
  playDiscovery(action, uri, label);
}

function playPlContext(action, playlistId) {
  const p = _playlists.find(x => x.id === playlistId);
  if (!p) return;
  const data = encodeURIComponent(JSON.stringify({
    context_uri: 'spotify:playlist:' + p.id, playlist_name: p.name
  })).replace(/'/g, '%27');
  playContext(action, data);
}

function renderPlaylists() {
  const el = document.getElementById('playlist-list');
  const searchEl = document.getElementById('pl-search');
  const sortEl = document.getElementById('pl-sort');
  const statEl = document.getElementById('pl-stat');

  if (!_playlists.length) {
    el.innerHTML = '<div class="empty-state"><div class="spinner"></div><p style="margin-top:12px;font-size:13px;">Loading playlists\u2026</p></div>';
    return;
  }

  if (allItems.length > 0 && Object.keys(_plLastListened).length === 0) {
    computePlaylistLastListened();
  }

  const q = (searchEl ? searchEl.value : '').toLowerCase();
  const sortKey = sortEl ? sortEl.value : 'alpha';

  let filtered = _playlists.filter(function(p) {
    return p.name.toLowerCase().includes(q) || (p.owner && p.owner.toLowerCase().includes(q));
  });

  filtered.sort(function(a, b) {
    if (sortKey === 'alpha') return a.name.localeCompare(b.name);
    if (sortKey === 'recent') {
      var aT = _plLastListened[a.id] || '';
      var bT = _plLastListened[b.id] || '';
      if (aT && !bT) return -1;
      if (!aT && bT) return 1;
      return bT.localeCompare(aT);
    }
    if (sortKey === 'created') return (b.created_approx || '').localeCompare(a.created_approx || '');
    return 0;
  });

  var totalTracks = _playlists.reduce(function(s, p) { return s + (p.tracks_total || 0); }, 0);
  if (statEl) statEl.textContent = filtered.length + '/' + _playlists.length + ' \u00b7 ' + totalTracks.toLocaleString() + ' tracks';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching playlists</div>';
    return;
  }

  var parts = [];
  for (var fi = 0; fi < filtered.length; fi++) {
    var p = filtered[fi];
    var isOpen = _plOpenIds.has(p.id);
    var isShared = p.owner && p.owner !== 'Andrew Shuman';

    var meta = (p.tracks_total || 0) + ' tracks';
    if (p.created_approx) {
      var d = new Date(p.created_approx);
      meta += ' \u00b7 ' + d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }
    var lastTs = _plLastListened[p.id];
    if (lastTs && sortKey === 'recent') {
      meta += ' \u00b7 last played ' + fmtRelative(new Date(lastTs));
    }
    var ownerBadge = isShared ? ' <span class="pc-owner-badge">' + esc(p.owner) + '</span>' : '';

    var artHtml = p.image_url
      ? '<img class="pc-art" src="' + esc(p.image_url) + '" alt="">'
      : '<div class="pc-art-placeholder">\u266b</div>';

    var card = '<div class="playlist-card' + (isOpen ? ' open' : '') + '" id="pl-' + p.id + '">';
    card += '<div class="pc-header" onclick="togglePlCard(\'' + p.id + '\')">';
    card += artHtml;
    card += '<div class="pc-info"><div class="pc-name">' + esc(p.name) + '</div>';
    card += '<div class="pc-meta">' + meta + ownerBadge + '</div></div>';
    card += '<div class="pc-actions">';
    card += '<button class="pc-btn" onclick="event.stopPropagation();playPlContext(\'play\',\'' + p.id + '\')" title="Play">\u25b6</button>';
    card += '<button class="pc-btn queue" onclick="event.stopPropagation();playPlContext(\'queue\',\'' + p.id + '\')" title="Queue">+</button>';
    card += '</div>';
    card += '<span class="pc-expand">\u203a</span>';
    card += '</div>';

    card += '<div class="pc-body">';
    if (_plTrackLoading.has(p.id)) {
      card += '<div class="track-loading"><span style="display:inline-block;width:14px;height:14px;border:2px solid var(--accent2);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite"></span> Loading tracks\u2026</div>';
    } else if (_plTrackError.has(p.id)) {
      card += '<div class="track-loading" style="cursor:pointer" onclick="loadPlTracks(\'' + p.id + '\')"><span style="opacity:0.6">Failed to load tracks \u2014 </span><span style="color:var(--accent2);text-decoration:underline">tap to retry</span></div>';
    } else if (_plTrackCache[p.id]) {
      var tracks = _plTrackCache[p.id];
      for (var ti = 0; ti < tracks.length; ti++) {
        var t = tracks[ti];
        var artistStr = t.artists.map(function(a) { return a.name; }).join(', ');
        var artImg = t.album_image_url
          ? '<img class="tr-art" src="' + esc(t.album_image_url) + '" alt="">'
          : '<div style="width:32px;height:32px;border-radius:4px;background:var(--surface);flex-shrink:0"></div>';
        card += '<div class="track-row">';
        card += '<span class="tr-num">' + (t.position + 1) + '</span>';
        card += artImg;
        card += '<div class="tr-info"><div class="tr-name">' + esc(t.track_name) + '</div>';
        card += '<div class="tr-detail">' + esc(artistStr) + ' \u00b7 ' + esc(t.album_name || '') + '</div></div>';
        card += '<span class="tr-duration">' + fmtPlDur(t.duration_ms) + '</span>';
        card += '<div class="tr-actions">';
        card += '<button class="tr-btn" onclick="playPlTrack(\'play\',' + ti + ',\'' + p.id + '\')" title="Play">\u25b6</button>';
        card += '<button class="tr-btn queue" onclick="playPlTrack(\'queue\',' + ti + ',\'' + p.id + '\')" title="Queue">+</button>';
        card += '</div></div>';
      }
    }
    card += '</div></div>';
    parts.push(card);
  }

  el.innerHTML = parts.join('');
}


// ══════════════════════════════════════════════════════════════════════════════
// DEEP LINK HANDLER (from controller.html)
// ══════════════════════════════════════════════════════════════════════════════
function handleDeepLink() {
  const p = new URLSearchParams(location.search);
  const action = p.get('action');
  const uri = p.get('uri');
  const label = p.get('label') || '';
  if (!action || !uri) return;
  const dlHouse = p.get('house');
  if (dlHouse && dlHouse !== house) setHouse(dlHouse);
  history.replaceState({}, '', location.pathname);

  // Auto-execute
  setTimeout(async () => {
    if (house === 'roaming') {
      if (action === 'queue') await playDiscovery('queue', uri, label);
      else await playDiscovery('play', uri, label);
    } else {
      const rooms = (selectedRooms[house]||[]).length > 0 ? selectedRooms[house] : inferActiveRooms();
      if (!rooms.length) { showToast('No rooms', true); return; }
      const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_next';
      const ok = await postNtfy({ action: ntfyAction, uri, title: decodeURIComponent(label), rooms, target_client_id: commanderId });
      if (ok) showToast('✓ ' + decodeURIComponent(label) + ' → ' + rooms.join(', '));
    }
  }, 500);
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
(async () => {
  // Handle Spotify OAuth callback FIRST (before anything else)
  const didAuth = await handleSpotifyCallback();
  setHouse(house);
  connectSSE();
  await loadData(true);
  if (!didAuth) handleDeepLink();
  // Auto-refresh head every 60s
  setInterval(() => loadData(false), 60000);
})();
</script>

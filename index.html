<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Listening Log">
<title>Listening Log</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #131829;
    --surface2: #1a2035;
    --border: #232940;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --tab-active: #4ade80;
    --tab-inactive: #8892a8;
    --playing: #4ade80;
    --spotify: #1db954;
    --qobuz: #4285f4;
    --radio: #f59e0b;
    --apple: #fc3c44;
    --caphill: #4ade80;
    --vashon: #60a5fa;
    --roaming: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  /* ========== TOP SECTION ========== */
  .top-section { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .top-header { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top, 12px) + 4px) 16px 0; }
  .top-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .status-dots { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-dot.green { background: var(--accent); }
  .status-dot.yellow { background: #eab308; }
  .status-dot.red { background: #f87171; }

  .house-tabs { display: flex; gap: 0; padding: 10px 16px 0; }
  .house-tab {
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); border-bottom: none;
    border-radius: 8px 8px 0 0; background: transparent;
    color: var(--tab-inactive); transition: all 0.15s;
  }
  .house-tab.active { background: var(--surface2); color: var(--tab-active); border-color: var(--tab-active); border-bottom: 1px solid var(--surface2); }
  .house-tab:not(.active):hover { color: var(--text); background: var(--surface2); }

  .house-panel { background: var(--surface2); border-top: 1px solid var(--border); padding: 12px 16px 14px; }
  .house-panel[hidden] { display: none; }

  .now-playing {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: rgba(74, 222, 128, 0.06);
    border: 1px solid rgba(74, 222, 128, 0.15); border-radius: 10px;
    margin-bottom: 12px;
  }
  .np-indicator {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--playing); flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .np-info { flex: 1; min-width: 0; }
  .np-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
  .np-track { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-stale { background: rgba(255,255,255,0.03); border-color: var(--border); }
  .np-stale .np-indicator { background: #6b7280; animation: none; }
  .np-stale .np-label { color: var(--text-dim); }
  .np-explore {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(96,165,250,0.3);
    background: rgba(96,165,250,0.08); color: var(--accent2); font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  .np-explore:hover { background: rgba(96,165,250,0.15); }
  .np-explore:active { transform: scale(0.92); }
  .np-explore.exploring { animation: pulse 1s infinite; }

  .controls-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ctrl-btn:hover { background: var(--surface2); border-color: var(--text-dim); }
  .ctrl-btn:active { transform: scale(0.95); }
  .volume-group { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .mute-btn { width: 36px; height: 36px; padding: 0; }
  .mute-btn svg { width: 20px; height: 20px; fill: var(--text); }
  .mute-btn.muted svg { fill: #ef4444; }
  .repeat-btn { width: 36px; height: 36px; font-size: 16px; opacity: 0.4; }
  .repeat-btn.active { opacity: 1; color: var(--accent); }
  .vol-label { font-size: 11px; color: var(--text-dim); min-width: 28px; text-align: center; }

  .room-selector { display: flex; flex-wrap: wrap; gap: 6px; }
  .room-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .room-chip.active { background: rgba(74,222,128,0.12); color: var(--accent); border-color: var(--accent); }
  .room-chip.playing::after { content: ' ▶'; font-size: 10px; }
  .room-chip.paused::after { content: ' ⏸'; font-size: 10px; opacity: 0.6; }
  .room-chip.offline { opacity: 0.35; text-decoration: line-through; }
  .room-chip.offline.active { opacity: 0.5; }
  .room-chip:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }
  .sync-rooms-btn {
    margin-top: 8px; padding: 6px 16px; border-radius: 16px;
    border: 1px solid var(--accent); background: rgba(74,222,128,0.10);
    color: var(--accent); font-size: 12px; cursor: pointer;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .sync-rooms-btn:hover { background: rgba(74,222,128,0.22); }
  .sync-rooms-btn:active { transform: scale(0.97); }
  .sync-rooms-btn.disabled { opacity: 0.45; cursor: default; border-color: var(--text-muted); color: var(--text-muted); background: transparent; }
  .sync-rooms-btn.disabled:hover { background: transparent; }
  .sync-rooms-btn.syncing { opacity: 0.6; pointer-events: none; }

  .device-list { display: flex; flex-direction: column; gap: 6px; }
  .device-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .device-item.active { border-color: var(--spotify); background: rgba(29,185,84,0.08); }
  .device-item:active { transform: scale(0.98); }
  .device-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .device-item.active .device-dot { background: var(--spotify); }
  .device-name { flex: 1; }
  .device-type { font-size: 11px; color: var(--text-dim); }

  .spotify-connect-btn {
    display: block; width: 100%; padding: 12px; border-radius: 10px;
    background: var(--spotify); color: #fff; font-size: 14px; font-weight: 700;
    border: none; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .spotify-connect-btn:active { opacity: 0.8; }
  .spotify-disconnect-btn {
    font-size: 11px; color: #f87171; background: none; border: none;
    cursor: pointer; padding: 4px 0; margin-top: 8px;
  }

  /* ========== BOTTOM SECTION ========== */
  .bottom-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .content-tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 0 16px; flex-shrink: 0;
  }
  .content-tab {
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--tab-inactive); border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .content-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .content-tab:hover:not(.active) { color: var(--text); }

  .sub-tabs {
    display: flex; gap: 4px; padding: 6px 16px; align-items: center;
    background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
    justify-content: flex-end;
  }
  .sub-tab {
    padding: 0; font-size: 12px; font-weight: 400;
    cursor: pointer; color: var(--text-dim);
    background: transparent; transition: color 0.15s; opacity: 0.5;
  }
  .sub-tab.active { color: var(--text); opacity: 1; font-weight: 500; }
  .sub-tab:hover:not(.active) { color: var(--text); opacity: 0.7; }
  .sub-tab .count { font-weight: 400; opacity: 0.5; margin-left: 2px; font-size: 11px; }
  .sub-tab-sep { color: var(--text-dim); opacity: 0.3; font-size: 12px; padding: 0 2px; }

  .content-panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content-panel[hidden] { display: none; }

  /* History items */
  .history-list { padding: 4px 0; }
  .history-item {
    display: flex; align-items: flex-start; gap: 0;
    padding: 6px 10px 6px 0;
    border-bottom: 1px solid rgba(35, 41, 64, 0.6);
  }
  .history-item:active { background: var(--surface2); }

  .hi-time-col { width: 50px; flex-shrink: 0; text-align: right; padding: 3px 8px 0 6px; }
  .hi-time { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .hi-info { flex: 1; min-width: 0; padding-left: 4px; }
  .hi-line1 {
    display: flex; align-items: baseline; gap: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 13px; line-height: 1.4;
  }
  .hi-track { font-weight: 600; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; }
  .hi-sep { color: var(--border); margin: 0 5px; flex-shrink: 0; }
  .hi-album { color: #7b88a8; font-style: italic; flex-shrink: 2; overflow: hidden; text-overflow: ellipsis; }
  .hi-artist { color: var(--text-dim); flex-shrink: 3; overflow: hidden; text-overflow: ellipsis; }

  .hi-line2 { display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 11px; }
  .hi-location {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600;
    padding: 1px 7px; border-radius: 8px; flex-shrink: 0;
  }
  .hi-location.caphill { color: var(--caphill); background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.15); }
  .hi-location.vashon { color: var(--vashon); background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.15); }
  .hi-location.roaming { color: var(--roaming); background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.15); }
  .hi-rooms { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-source-badge {
    font-size: 9px; color: var(--text-dim); opacity: 0.7;
    padding: 0 4px; border-radius: 4px; background: rgba(255,255,255,0.04); flex-shrink: 0;
  }
  .hi-actions { display: flex; gap: 2px; flex-shrink: 0; padding-top: 1px; }
  .action-btn {
    width: 26px; height: 26px; border-radius: 7px; border: none;
    background: transparent; color: var(--accent); font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: background 0.1s;
  }
  .action-btn:hover { background: var(--surface2); }
  .action-btn.explore { color: var(--accent2); }
  .action-btn.exploring { animation: pulse 1s infinite; }
  .action-btn.ctx-toggle { color: var(--text-dim); font-size: 9px; }
  .action-btn.ctx-toggle.open { color: var(--accent); }
  .ctx-panel {
    display: none; padding: 4px 0 4px 40px;
    border-top: 1px solid var(--border);
  }
  .ctx-panel.open { display: block; }
  .ctx-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    font-size: 12px; color: var(--text);
  }
  .ctx-row .ctx-icon { font-size: 13px; flex-shrink: 0; width: 18px; text-align: center; }
  .ctx-row .ctx-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ctx-row .ctx-label .ctx-type { color: var(--text-dim); margin-right: 4px; }
  .ctx-row .ctx-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .ctx-loading { font-size: 11px; color: var(--text-dim); padding: 4px 0; }

  .day-header {
    padding: 10px 16px 6px; font-size: 12px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
    background: var(--bg); position: sticky; top: 0; z-index: 5;
  }

  .history-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .sync-btn {
    font-size: 14px; padding: 10px 20px; border-radius: 20px;
    border: 1px solid var(--accent); background: rgba(100,108,255,0.12);
    color: var(--accent); cursor: pointer; transition: all 0.15s;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .sync-btn:hover { background: rgba(100,108,255,0.25); color: #fff; }
  .sync-btn:active { transform: scale(0.96); }
  .sync-btn.syncing { opacity: 0.5; pointer-events: none; }
  .updated-label { font-size: 12px; color: var(--text-dim); }

  /* Podcasts */
  .podcast-item {
    display: flex; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid rgba(35, 41, 64, 0.6);
  }
  .podcast-icon {
    width: 44px; height: 44px; border-radius: 8px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .podcast-info { flex: 1; min-width: 0; }
  .podcast-show { font-size: 11px; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .podcast-title { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .podcast-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .podcast-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .podcast-progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; }

  /* ========== DISCOVERY ========== */
  .discovery-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .discovery-stat { padding: 4px 0 8px; font-size: 12px; color: var(--text-dim); }
  .discovery-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.15s;
  }
  .discovery-card:hover { border-color: var(--text-dim); }
  .disc-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .disc-artist-badge {
    font-size: 15px; font-weight: 700; color: var(--accent);
    white-space: nowrap; flex-shrink: 0; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
  }
  .disc-hinfo { flex: 1; min-width: 0; }
  .disc-title { font-size: 15px; font-weight: 600; }
  .disc-meta { font-size: 12px; color: var(--text-dim); }
  .disc-expand { margin-left: auto; color: var(--text-dim); font-size: 14px; transition: transform 0.2s; }

  .disc-body { padding: 0 16px 14px; display: none; }
  .discovery-card.open .disc-body { display: block; }
  .discovery-card.open .disc-expand { transform: rotate(90deg); }

  .disc-source-track {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 10px;
    background: rgba(30,215,96,0.08); border-radius: 8px; border: 1px solid rgba(30,215,96,0.15);
  }
  .disc-source-icon { font-size: 14px; flex-shrink: 0; }
  .disc-source-info { flex: 1; min-width: 0; }
  .disc-source-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); display: block; }
  .disc-source-title { font-size: 13px; font-weight: 500; color: var(--text); }

  .disc-narrative { font-size: 13px; color: var(--text-dim); line-height: 1.55; margin-bottom: 12px; }
  .disc-narrative strong { color: var(--text); font-weight: 600; }
  .disc-narrative em { font-style: italic; }

  .suggestion-section-label {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 0 4px; border-top: 1px solid var(--border); margin-top: 4px;
  }
  .suggestion-section-label:first-of-type { margin-top: 0; border-top: none; }
  .disc-overflow-toggle {
    text-align: center; padding: 8px; color: var(--text-dim); cursor: pointer;
    font-size: 16px; letter-spacing: 4px; user-select: none;
    border-top: 1px solid var(--border); margin-top: 8px;
  }
  .disc-overflow-toggle:hover { color: var(--text); }
  .disc-overflow-body { display: none; }
  .disc-overflow-body.show { display: block; }

  .suggestion-item {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 0; border-top: 1px solid rgba(35,41,64,0.5);
  }
  .suggestion-info { flex: 1; min-width: 0; }
  .suggestion-title { font-size: 13px; font-weight: 500; }
  .suggestion-detail { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-top: 2px; }

  .sugg-actions { display: flex; gap: 2px; flex-shrink: 0; margin-left: auto; }
  .sugg-btn {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px;
    cursor: pointer; border: none; transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sugg-btn:active { opacity: 0.7; }
  .sugg-btn-play { background: #2563eb; color: #fff; }
  .sugg-btn-queue { background: #374151; color: #93c5fd; border: 1px solid #4b5563; }
  .sugg-btn-expand { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); font-size: 9px; }
  .sugg-btn-expand.open { color: var(--accent2); border-color: var(--accent2); }
  .sugg-with-tracks { border-bottom: 1px solid rgba(35,41,64,0.3); }
  .album-tracks-panel { display: none; padding: 0 0 4px 16px; }
  .album-tracks-panel.show { display: block; }
  .album-track-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0; font-size: 12px;
  }
  .at-num { width: 20px; text-align: right; font-size: 11px; color: var(--text-dim); opacity: 0.6; flex-shrink: 0; }
  .at-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); }
  .album-tracks-loading { padding: 8px 0; font-size: 12px; color: var(--text-dim); }

  /* Empty/loading states */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 50%; transform: translateX(-50%);
    background: rgba(26,58,26,0.95); border: 1px solid var(--accent);
    color: var(--accent); border-radius: 10px; padding: 10px 20px;
    font-size: 14px; font-weight: 600; z-index: 100;
    transition: opacity 0.4s; white-space: nowrap; pointer-events: none;
  }
  .toast.error { background: rgba(58,26,26,0.95); border-color: #f87171; color: #f87171; }

  /* Sonos hint card */
  .sonos-hint {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
  }
  .sonos-hint a { color: var(--accent2); text-decoration: none; }
  .sonos-hint a:hover { text-decoration: underline; }

  /* ========== PLAYLISTS TAB ========== */
  .playlist-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .playlist-search {
    flex: 1; padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 13px; outline: none; min-width: 0;
  }
  .playlist-search:focus { border-color: var(--accent); }
  .playlist-search::placeholder { color: var(--text-dim); }
  .sort-select {
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 12px; cursor: pointer; outline: none;
  }
  .playlist-stat { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .playlist-list {
    padding: 12px 16px; display: flex; flex-direction: column;
    gap: 8px; overflow-y: auto; flex: 1;
  }
  .playlist-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.15s; flex-shrink: 0;
  }
  .playlist-card:hover { border-color: var(--text-dim); }
  .playlist-card.open { border-color: rgba(74, 222, 128, 0.3); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtTime(iso) {
  const d = new Date(iso);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'p' : 'a';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ampm;
}

function fmtAge(ms) {
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  return Math.floor(hr / 24) + 'd ago';
}

function fmtRelative(d) {
  const diff = Date.now() - d.getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return sec < 5 ? 'just now' : sec + 's ago';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ' + (min % 60) + 'm ago';
  return Math.floor(hr / 24) + 'd ago';
}

function fmtMs(ms) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
  return m + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

function dayLabel(iso) {
  const d = new Date(iso);
  const now = new Date();
  const dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((nowDate - dDate) / 86400000);
  const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
  const monthDay = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff === 0) return 'Today · ' + dayName + ' ' + monthDay;
  if (diff === 1) return 'Yesterday · ' + dayName + ' ' + monthDay;
  return dayName + ' ' + monthDay;
}

function dayKey(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();

// SPOTIFY PKCE AUTH (self-contained — no controller.html needed)
// ══════════════════════════════════════════════════════════════════════════════
function generateRandomString(len) {
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const values = crypto.getRandomValues(new Uint8Array(len));
  return values.reduce((acc, x) => acc + possible[x % possible.length], '');
}
async function sha256(plain) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
}
function base64urlEncode(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function spotifyAuth() {
  const verifier = generateRandomString(64);
  const challenge = base64urlEncode(await sha256(verifier));
  localStorage.setItem('spotify_pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: SP_CLIENT_ID,
    response_type: 'code',
    redirect_uri: SP_REDIRECT,
    scope: 'user-modify-playback-state user-read-playback-state user-read-recently-played streaming',
    code_challenge_method: 'S256',
    code_challenge: challenge,
    state: 'roaming_auth'
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function handleSpotifyCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code || state !== 'roaming_auth') return false;

  const verifier = localStorage.getItem('spotify_pkce_verifier');
  if (!verifier) return false;

  try {
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SP_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: SP_REDIRECT,
        code_verifier: verifier
      })
    });
    const d = await r.json();
    if (d.access_token) {
      localStorage.setItem('spotify_access_token', d.access_token);
      localStorage.setItem('spotify_refresh_token', d.refresh_token);
      localStorage.setItem('spotify_token_expiry', String(Date.now() + d.expires_in * 1000));
      localStorage.removeItem('spotify_pkce_verifier');
      history.replaceState({}, '', window.location.pathname);
      setHouse('roaming');
      showToast('Spotify connected!');
      return true;
    }
  } catch(e) { console.error('Spotify auth error:', e); }
  return false;
}

function hasSpotifyAuth() { return !!localStorage.getItem('spotify_refresh_token'); }

async function getSpotifyToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) {
    const rt = localStorage.getItem('spotify_refresh_token');
    if (!rt) return null;
    try {
      const r = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({ client_id: SP_CLIENT_ID, grant_type: 'refresh_token', refresh_token: rt })
      });
      const d = await r.json();
      if (d.access_token) {
        localStorage.setItem('spotify_access_token', d.access_token);
        if (d.refresh_token) localStorage.setItem('spotify_refresh_token', d.refresh_token);
        localStorage.setItem('spotify_token_expiry', String(Date.now() + d.expires_in * 1000));
      } else return null;
    } catch(e) { return null; }
  }
  return localStorage.getItem('spotify_access_token');
}

async function spotifyApi(method, path, body) {
  const token = await getSpotifyToken();
  if (!token) return null;
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token } };
  if (body !== undefined && body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const _doFetch = async (attempt) => {
    const r = await fetch('https://api.spotify.com/v1' + path, opts);
    if (r.status === 401) {
      localStorage.removeItem('spotify_token_expiry');
      const retry = await getSpotifyToken();
      if (retry) return spotifyApi(method, path, body);
      return null;
    }
    // Retry transient server errors (502/503) once after a short delay
    if ((r.status === 502 || r.status === 503) && attempt < 2) {
      console.log('[spotifyApi] ' + r.status + ' on attempt ' + attempt + ', retrying...');
      await new Promise(resolve => setTimeout(resolve, 800));
      return _doFetch(attempt + 1);
    }
    if (r.status === 204 || r.status === 202) return {};
    if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error?.message || 'HTTP ' + r.status); }
    const text = await r.text();
    try { return text ? JSON.parse(text) : {}; } catch(e) { return {}; }
  };
  return _doFetch(1);
}

// ══════════════════════════════════════════════════════════════════════════════
// HOUSE SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
function setHouse(h, isUserClick) {
  house = h;
  if (isUserClick) _tabManualOverride = true;
  localStorage.setItem('ll_house', h);
  document.querySelectorAll('.house-tab').forEach(t => t.classList.toggle('active', t.dataset.house === h));
  document.querySelectorAll('.house-panel').forEach(p => p.hidden = true);
  document.getElementById('panel-' + h).hidden = false;
  updateCommander();
  if (h === 'roaming') {
    renderRoamingPanel();
    startSpotifyPolling();
  } else {
    stopSpotifyPolling();
    renderRooms(h);
    renderNowPlayingSonos(h);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOM SELECTION (Sonos)
// ══════════════════════════════════════════════════════════════════════════════
function inferActiveRooms(h) {
  h = h || house;
  // If live state already confirmed nothing is playing, don't re-infer stale rooms
  if (_initialRoomSeedDone[h] && (!_roomsPlaying || _roomsPlaying.length === 0)) return [];
  // From data rooms_playing (per-client metadata)
  if (data && data.client_status) {
    for (const c of data.client_status) {
      if (c.house !== h || !c.sonos_commander) continue;
      try {
        const meta = typeof c.metadata === 'string' ? JSON.parse(c.metadata) : c.metadata;
        if (meta && Array.isArray(meta.rooms_playing) && meta.rooms_playing.length > 0) return [...meta.rooms_playing];
      } catch(e) {}
    }
  }
  // From recent history
  if (allItems.length > 0) {
    const cutoff = Date.now() - 120 * 60000;
    for (const item of allItems) {
      if (item.house !== h) continue;
      const ts = new Date(item.timestamp).getTime();
      if (ts < cutoff) break;
      if (Array.isArray(item.rooms) && item.rooms.length > 0) return [...item.rooms];
      if (item.room) return item.room.split(', ').map(r => r.trim()).filter(Boolean);
    }
  }
  return [];
}

function renderRooms(h) {
  h = h || house;
  const container = document.getElementById('rooms-' + h);
  if (!container) return;
  const all = ROOMS_LIST[h] || [];
  const sel = selectedRooms[h] || [];
  const liveRooms = inferActiveRooms(h);
  // Auto-set rooms if user hasn't manually selected
  if (!_userManualRoomSelect[h] && liveRooms.length > 0) {
    selectedRooms[h] = [...liveRooms];
    localStorage.setItem('ll_rooms_' + h, JSON.stringify(selectedRooms[h]));
  }
  const curSel = selectedRooms[h] || [];
  const visibleRooms = _roomsAll[h] || [];
  const hasVisibility = visibleRooms.length > 0;  // only mark offline if we have data
  container.innerHTML = all.map(room => {
    const isActive = curSel.includes(room);
    const isPlaying = liveRooms.includes(room);
    const isPaused = !isPlaying && _roomsPaused.includes(room);
    const isOffline = hasVisibility && !visibleRooms.includes(room);
    return `<div class="room-chip${isActive ? ' active' : ''}${isPlaying ? ' playing' : ''}${isPaused ? ' paused' : ''}${isOffline ? ' offline' : ''}" onclick="toggleRoom('${esc(h)}','${esc(room.replace(/'/g,"\\'"))}')">${esc(room)}</div>`;
  }).join('');
  updateSyncButton(h);
}

function toggleRoom(h, room) {
  _userManualRoomSelect[h] = true;
  _tabManualOverride = true;  // v2.06: selecting a room implies tab commitment
  const sel = selectedRooms[h] || [];
  const idx = sel.indexOf(room);
  if (idx < 0) sel.push(room); else sel.splice(idx, 1);
  selectedRooms[h] = sel;
  localStorage.setItem('ll_rooms_' + h, JSON.stringify(sel));
  renderRooms(h);
  // Show/hide sync button based on whether selection differs from live group
  updateSyncButton(h);
}

function updateSyncButton(h) {
  if (h === 'roaming') return;
  const btn = document.getElementById('sync-btn-' + h);
  if (!btn) return;
  const sel = new Set(selectedRooms[h] || []);
  const live = new Set(_roomsPlaying || []);
  // Enable button if selection differs from what's actually playing
  const differs = sel.size !== live.size || [...sel].some(r => !live.has(r)) || [...live].some(r => !sel.has(r));
  if (differs) {
    btn.classList.remove('disabled');
    btn.textContent = 'Sync Speakers';
  } else {
    btn.classList.add('disabled');
    btn.textContent = '✓ Speakers synced';
  }
}

async function syncRooms(h) {
  if (h === 'roaming') return;
  const btn = document.getElementById('sync-btn-' + h);
  const sel = selectedRooms[h] || [];
  console.log('[syncRooms] h=' + h, 'sel=' + JSON.stringify(sel), '_roomsPlaying=' + JSON.stringify(_roomsPlaying), 'commanderId=' + commanderId);
  if (btn && btn.classList.contains('disabled')) {
    console.log('[syncRooms] Button disabled — selection matches live state');
    showToast('Selection matches current speakers');
    return;
  }
  if (sel.length === 0) { showToast('No speakers selected', true); return; }
  // Filter offline rooms
  const rooms = filterOfflineRooms([...sel], h);
  if (rooms.length === 0) { showToast('All selected rooms are offline', true); return; }
  // Resolve commander for this specific house (not the global tab-dependent one)
  let cmdrForH = (data && data.client_status) ? data.client_status.find(c => c.house === h && c.sonos_commander) : null;
  // Fallback: recent client for this house (data-head.json may have stale sonos_commander=0)
  if (!cmdrForH && data && data.client_status) {
    cmdrForH = data.client_status.find(c => c.house === h && c.last_seen &&
      (Date.now() - new Date(c.last_seen).getTime()) < 600000);
  }
  const cmdrId = cmdrForH ? cmdrForH.client_id : null;
  if (!cmdrId) { showToast('No commander online for ' + h, true); console.error('[syncRooms] No commanderId for house=' + h); return; }
  if (btn) { btn.classList.add('syncing'); btn.textContent = 'Syncing…'; }
  showToast(`🔊 Syncing ${rooms.length} speaker${rooms.length > 1 ? 's' : ''}…`);
  console.log('[syncRooms] Sending sync_rooms:', rooms, 'commander:', cmdrId);
  const ok = await postNtfy({ action: 'sync_rooms', rooms: rooms, target_client_id: cmdrId, t_requested: new Date().toISOString() });
  if (btn) { btn.classList.remove('syncing'); }
  if (ok) {
    // Optimistically update _roomsPlaying so the button reflects new state
    _roomsPlaying = [...rooms];
    showToast(`✓ Speakers synced`);
    updateSyncButton(h);
  } else {
    if (btn) btn.textContent = 'Sync Speakers';
    showToast('✗ Sync failed', true);
  }
}

function updateCommander() {
  if (house === 'roaming' || !data || !data.client_status) { commanderId = null; return; }
  const cmdr = data.client_status.find(c => c.house === house && c.sonos_commander);
  if (cmdr) { commanderId = cmdr.client_id; return; }
  // Fallback: if no sonos_commander flag set but a client exists for this house
  // with a recent last_seen (within 10 min), assume it's the commander.
  // data-head.json may have stale sonos_commander=0.
  const fallback = data.client_status.find(c => c.house === house && c.last_seen &&
    (Date.now() - new Date(c.last_seen).getTime()) < 600000);
  commanderId = fallback ? fallback.client_id : null;
  if (fallback) console.log('[updateCommander] fallback commander for ' + house + ': ' + fallback.client_id);
}

// ══════════════════════════════════════════════════════════════════════════════
// TRANSPORT CONTROLS
// ══════════════════════════════════════════════════════════════════════════════
const SONOS_MAP = { play: 'resume', prev: 'previous' };
let _lastCmdTime = 0;

function filterOfflineRooms(rooms, h) {
  h = h || house;
  const visible = _roomsAll[h] || [];
  if (visible.length === 0) return rooms;  // no visibility data — pass through
  const online = rooms.filter(r => visible.includes(r));
  const dropped = rooms.filter(r => !visible.includes(r));
  if (dropped.length > 0) {
    console.log('[rooms] Filtered offline:', dropped);
    showToast('⚠️ ' + dropped.join(', ') + ' offline — skipped');
  }
  return online;
}

async function sendCmd(action) {
  const now = Date.now();
  if (now - _lastCmdTime < 400) return;  // throttle rapid taps
  _lastCmdTime = now;
  if (house === 'roaming') { await spotifyCmd(action); return; }
  const sonosAction = SONOS_MAP[action] || action;
  const rawRooms = (selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms();
  const rooms = filterOfflineRooms(rawRooms);
  if (!rooms.length) { showToast('All selected rooms are offline', true); return; }
  // Optimistic UI for mute/repeat (these are silent — no SSE confirmation comes back)
  if (action === 'toggle_mute') {
    const room = rooms[0];
    _muteStates[room] = !_muteStates[room];
    updateMuteRepeatButtons();
  } else if (action === 'cycle_repeat') {
    const room = rooms[0];
    const cur = _playModes[room] || 'NORMAL';
    const cycle = { NORMAL:'REPEAT_ALL', REPEAT_ALL:'REPEAT_ONE', REPEAT_ONE:'NORMAL',
                    SHUFFLE:'SHUFFLE', SHUFFLE_NOREPEAT:'SHUFFLE', SHUFFLE_REPEAT_ONE:'SHUFFLE_NOREPEAT' };
    _playModes[room] = cycle[cur] || 'NORMAL';
    updateMuteRepeatButtons();
  }
  // Optimistic toast for volume
  if (action === 'volume_up') showToast('🔊 Volume up · ' + rooms.length + ' speaker' + (rooms.length > 1 ? 's' : ''));
  if (action === 'volume_down') showToast('🔉 Volume down · ' + rooms.length + ' speaker' + (rooms.length > 1 ? 's' : ''));
  const payload = { action: sonosAction, rooms, target_client_id: commanderId, t_requested: new Date().toISOString() };
  await postNtfy(payload);
}

let _lastNtfyTime = 0;

async function postNtfy(payload) {
  const topic = NTFY[house];
  if (!topic) { showToast('No ntfy topic for ' + house, true); return false; }
  // Global ntfy throttle: prevent any two POSTs within 300ms
  const now = Date.now();
  if (now - _lastNtfyTime < 300) { console.log('[postNtfy] global throttle, skipping:', payload.action); showToast('⚡ Too fast — try again', true); return false; }
  _lastNtfyTime = now;
  if (!payload.t_requested) payload.t_requested = new Date().toISOString();
  payload.source_house = house;
  const body = JSON.stringify(payload);
  console.log('[postNtfy] → ' + topic + ' house=' + house + ' body=' + body.substring(0, 200));
  try {
    const hdrs = NTFY_TOKEN ? { 'Authorization': 'Bearer ' + NTFY_TOKEN } : {};
    const r = await fetch(topic, { method: 'POST', body, headers: hdrs });
    console.log('[postNtfy] ntfy status=' + r.status);
    showToast('→ ' + house + ' [' + r.status + ']');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return true;
  } catch(e) {
    console.error('[postNtfy] FAILED:', e);
    showToast('✗ Send failed: ' + e.message, true);
    return false;
  }
}

// Spotify transport
async function _ensureDeviceAwake() {
  // If no device selected, refresh device list and auto-pick the phone (or first available)
  if (!spotifySelectedDeviceId) {
    await fetchSpotifyDevices();
    if (!spotifySelectedDeviceId && spotifyDevices.length > 0) {
      const phone = spotifyDevices.find(d => PHONE_TYPES.has(d.type));
      const pick = phone || spotifyDevices.find(d => d.is_active) || spotifyDevices[0];
      spotifySelectedDeviceId = pick.id;
      localStorage.setItem('ll_spotify_device', pick.id);
      console.log('[_ensureDeviceAwake] auto-selected device:', pick.name);
    }
  }
  if (!spotifySelectedDeviceId) return;
  const cached = _deviceCache[spotifySelectedDeviceId];
  if (cached && cached.stale) {
    showToast('Waking device...');
    try { await spotifyApi('PUT', '/me/player', { device_ids: [spotifySelectedDeviceId], play: false }); } catch(e) {}
    await new Promise(r => setTimeout(r, 500));
  }
}

async function spotifyCmd(action) {
  if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
  await _ensureDeviceAwake();
  const dp = spotifySelectedDeviceId ? '?device_id=' + spotifySelectedDeviceId : '';
  try {
    switch(action) {
      case 'play': await spotifyApi('PUT', '/me/player/play' + dp); break;
      case 'pause': await spotifyApi('PUT', '/me/player/pause' + dp); break;
      case 'next': await spotifyApi('POST', '/me/player/next' + dp); break;
      case 'prev': await spotifyApi('POST', '/me/player/previous' + dp); break;
      case 'volume_up': case 'volume_down': {
        const cur = spotifyDevices.find(d => d.is_active)?.volume_percent || 50;
        const vol = Math.max(0, Math.min(100, cur + (action === 'volume_up' ? 10 : -10)));
        await spotifyApi('PUT', '/me/player/volume?volume_percent=' + vol + (spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : ''));
        showToast((action === 'volume_up' ? '🔊' : '🔉') + ' Volume ' + vol + '%');
        break;
      }
      case 'toggle_mute': {
        // Spotify doesn't have native mute — toggle between current vol and 0
        const active = spotifyDevices.find(d => d.is_active);
        const curVol = active?.volume_percent ?? 50;
        if (curVol > 0) {
          window._spotifyPreMuteVol = curVol;
          await spotifyApi('PUT', '/me/player/volume?volume_percent=0' + (spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : ''));
        } else {
          const restore = window._spotifyPreMuteVol || 50;
          await spotifyApi('PUT', '/me/player/volume?volume_percent=' + restore + (spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : ''));
        }
        break;
      }
      case 'cycle_repeat': {
        // Fetch current state, cycle: off -> context -> track -> off
        const state = await spotifyApi('GET', '/me/player');
        const cur = state?.repeat_state || 'off';
        const next = cur === 'off' ? 'context' : cur === 'context' ? 'track' : 'off';
        await spotifyApi('PUT', '/me/player/repeat?state=' + next + (spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : ''));
        const btn = document.getElementById('repeat-btn-roaming');
        if (btn) {
          btn.textContent = next === 'track' ? '🔂' : next === 'context' ? '🔁' : '➖';
          btn.classList.toggle('active', next !== 'off');
        }
        break;
      }
    }
    if (!['volume_up','volume_down'].includes(action)) showToast('✓ ' + action);
    setTimeout(fetchSpotifyNowPlaying, 500);
  } catch(e) {
    showToast(e.message?.includes('429') ? 'Slow down! Try again' : '✗ ' + e.message, true);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SPOTIFY DEVICES & NOW PLAYING (Roaming)
// ══════════════════════════════════════════════════════════════════════════════
const PHONE_TYPES = new Set(['Smartphone', 'Tablet']);
function deviceIcon(type) {
  return { Computer:'💻', Smartphone:'📱', Speaker:'🔊', TV:'📺', AVR:'🎛️', Tablet:'📱', Automobile:'🚗' }[type] || '🎵';
}

async function fetchSpotifyDevices() {
  try {
    const d = await spotifyApi('GET', '/me/player/devices');
    if (!d || !d.devices) return;
    const now = Date.now();
    const liveIds = new Set();
    for (const dev of d.devices) {
      liveIds.add(dev.id);
      _deviceCache[dev.id] = { device: dev, lastSeen: now, stale: false };
      if (PHONE_TYPES.has(dev.type)) {
        _lastKnownPhone = { device: {...dev}, lastSeen: now };
        try { localStorage.setItem('ll_last_phone', JSON.stringify(_lastKnownPhone)); } catch(e) {}
      }
    }
    for (const [id, entry] of Object.entries(_deviceCache)) {
      if (!liveIds.has(id)) {
        entry.stale = true;
        if (!PHONE_TYPES.has(entry.device.type) && now - entry.lastSeen > 120000) delete _deviceCache[id];
      }
    }
    if (_lastKnownPhone && !_deviceCache[_lastKnownPhone.device.id]) {
      _deviceCache[_lastKnownPhone.device.id] = { device: _lastKnownPhone.device, lastSeen: _lastKnownPhone.lastSeen, stale: true };
    }
    spotifyDevices = Object.values(_deviceCache).sort((a,b) => a.stale === b.stale ? 0 : a.stale ? 1 : -1).map(e => ({...e.device, _stale: e.stale}));
    const active = spotifyDevices.find(x => x.is_active && !x._stale);
    // p2.41: honor manual selection pin — don't let the poll revert a just-tapped device
    if (active && !_manualPinActive()) { spotifySelectedDeviceId = active.id; localStorage.setItem('ll_spotify_device', active.id); }
    else if (!spotifySelectedDeviceId || !spotifyDevices.find(x => x.id === spotifySelectedDeviceId)) {
      spotifySelectedDeviceId = spotifyDevices[0]?.id || null;
    }
    if (house === 'roaming') renderSpotifyDevices();
  } catch(e) {}
}

async function fetchSpotifyNowPlaying() {
  try {
    const d = await spotifyApi('GET', '/me/player?additional_types=track,episode');
    if (!d || !d.item) { spotifyNowPlaying = null; }
    else {
      spotifyNowPlaying = {
        title: d.item.name,
        artist: d.item.type === 'track' ? (d.item.artists||[]).map(a=>a.name).join(', ') : (d.item.show?.name||''),
        album: d.item.type === 'track' ? (d.item.album?.name||'') : '',
        device: d.device?.name || '',
        progress_ms: d.progress_ms || 0, duration_ms: d.item.duration_ms || 0,
        is_playing: d.is_playing, uri: d.item.uri
      };
      if (d.device?.id && !_manualPinActive()) { spotifySelectedDeviceId = d.device.id; localStorage.setItem('ll_spotify_device', d.device.id); }
    }
  } catch(e) { spotifyNowPlaying = null; }
  if (house === 'roaming') renderNowPlayingRoaming();
}

function startSpotifyPolling() {
  stopSpotifyPolling();
  if (!hasSpotifyAuth()) return;
  fetchSpotifyDevices(); fetchSpotifyNowPlaying();
  let burst = 0;
  const bt = setInterval(() => { if (++burst >= 3) { clearInterval(bt); return; } fetchSpotifyDevices(); }, 2000);
  _spotifyDevicePollTimer = setInterval(fetchSpotifyDevices, 15000);
  _spotifyNpPollTimer = setInterval(fetchSpotifyNowPlaying, 5000);
}
function stopSpotifyPolling() {
  if (_spotifyDevicePollTimer) { clearInterval(_spotifyDevicePollTimer); _spotifyDevicePollTimer = null; }
  if (_spotifyNpPollTimer) { clearInterval(_spotifyNpPollTimer); _spotifyNpPollTimer = null; }
}

function renderSpotifyDevices() {
  const el = document.getElementById('roaming-devices');
  if (!el) return;
  if (!hasSpotifyAuth()) {
    el.innerHTML = '<button class="spotify-connect-btn" onclick="spotifyAuth()">🎵 Connect with Spotify</button><p style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center;">Authenticates directly with Spotify</p>';
    return;
  }
  let html = '<div class="device-list">';
  if (spotifyDevices.length === 0) {
    html += '<p style="font-size:12px;color:var(--text-dim);padding:8px 0;">No devices found. Open Spotify on a device.</p>';
  } else {
    html += spotifyDevices.map(d => {
      const sel = d.id === spotifySelectedDeviceId;
      const stale = d._stale;
      return `<div class="device-item${sel ? ' active' : ''}" onclick="selectSpotifyDevice('${d.id}')" style="${stale?'opacity:0.5':''}">
        <div class="device-dot"></div>
        <div class="device-name">${esc(d.name)}${d.is_active && !stale ? ' <span style="color:var(--accent);font-size:10px;">● active</span>':''}${stale?' <span style="font-size:10px;">💤</span>':''}</div>
        <div class="device-type">${deviceIcon(d.type)} ${d.volume_percent != null ? d.volume_percent + '%' : ''}</div>
      </div>`;
    }).join('');
  }
  html += '</div>';
  html += '<button class="spotify-disconnect-btn" onclick="disconnectSpotify()">Disconnect Spotify</button>';
  el.innerHTML = html;
}

// p2.41 (U-M1): tapping a device now actively TRANSFERS playback to it via
// PUT /me/player, instead of only saving the ID locally (which did nothing
// user-visible). A 60s pin (_manualDeviceSelectAt, declared with globals) stops
// the polls from reverting the manual choice before Spotify's API reflects it.
async function selectSpotifyDevice(id) {
  spotifySelectedDeviceId = id;
  localStorage.setItem('ll_spotify_device', id);
  _manualDeviceSelectAt = Date.now();
  renderSpotifyDevices();
  try {
    await spotifyApi('PUT', '/me/player', { device_ids: [id], play: false });
    const dev = spotifyDevices.find(x => x.id === id);
    showToast('✓ Transferred to ' + (dev ? dev.name : 'device'));
    setTimeout(fetchSpotifyNowPlaying, 1500);
  } catch(e) {
    console.warn('[selectSpotifyDevice] transfer failed:', e && e.message);
    showToast('Transfer failed — is Spotify open on that device?', true);
  }
}

function disconnectSpotify() {
  ['spotify_access_token','spotify_refresh_token','spotify_token_expiry','spotify_pkce_verifier'].forEach(k => localStorage.removeItem(k));
  spotifyDevices = []; spotifySelectedDeviceId = null; spotifyNowPlaying = null;
  stopSpotifyPolling();
  renderRoamingPanel();
  showToast('Spotify disconnected');
}

function renderRoamingPanel() {
  renderNowPlayingRoaming();
  renderSpotifyDevices();
}

// ══════════════════════════════════════════════════════════════════════════════
// NOW PLAYING
// ══════════════════════════════════════════════════════════════════════════════
function getRepeatBadge() {
  // Check _playModes for any active repeat mode
  for (const [room, mode] of Object.entries(_playModes)) {
    if (mode === 'REPEAT_ONE' || mode === 'SHUFFLE_REPEAT_ONE') return '🔂';
    if (mode === 'REPEAT_ALL' || mode === 'SHUFFLE') return '🔁';
  }
  return '';
}

function setMuteIcon(btn, isMuted) {
  btn.innerHTML = isMuted ? _MUTE_SVG_MUTED : _MUTE_SVG_UNMUTED;
  btn.classList.toggle('muted', isMuted);
}

function _getActiveRoom(h) {
  // 1. Currently playing room
  if (_roomsPlaying && _roomsPlaying.length > 0) return _roomsPlaying[0];
  // 2. Selected rooms (room tiles user tapped — persisted in localStorage)
  const sel = selectedRooms[h];
  if (sel && sel.length > 0) return sel[0];
  // 3. Now-playing SSE data (last track's room)
  const sse = _sseNowPlaying[h];
  if (sse && sse.rooms && sse.rooms.length > 0) return sse.rooms[0];
  // 4. First room with any mute state reported
  const rooms = Object.keys(_muteStates);
  if (rooms.length > 0) return rooms[0];
  return null;
}

function updateMuteRepeatButtons() {
  // Update mute buttons for each house panel
  for (const h of ['caphill', 'vashon', 'roaming']) {
    const muteBtn = document.getElementById('mute-btn-' + h);
    if (muteBtn && h !== 'roaming') {
      const activeRoom = _getActiveRoom(h);
      const isMuted = activeRoom ? !!_muteStates[activeRoom] : false;
      setMuteIcon(muteBtn, isMuted);
    }
    const repeatBtn = document.getElementById('repeat-btn-' + h);
    if (repeatBtn && h !== 'roaming') {
      const activeRoom = _getActiveRoom(h);
      const mode = activeRoom ? (_playModes[activeRoom] || 'NORMAL') : 'NORMAL';
      const isRepeatOne = mode === 'REPEAT_ONE' || mode === 'SHUFFLE_REPEAT_ONE';
      const isRepeatAll = mode === 'REPEAT_ALL' || mode === 'SHUFFLE';
      const isActive = isRepeatOne || isRepeatAll;
      repeatBtn.textContent = isRepeatOne ? '🔂' : (isRepeatAll ? '🔁' : '➖');
      repeatBtn.classList.toggle('active', isActive);
    }
  }
}

function renderNowPlayingSonos(h) {
  const el = document.getElementById('np-' + h);
  if (!el) return;
  const sse = _sseNowPlaying[h];
  const isLive = sse && (Date.now() - sse.ts) < 600000;

  // Find latest history item for this house; fall back to any house if house-specific is stale
  let latestItem = null;
  let latestItemCrossHouse = false;
  if (allItems.length > 0) {
    latestItem = allItems.find(i => i.house === h && i.type === 'music');
    // If no house-specific item, or it's very old (>24h), fall back to most recent across all houses
    const houseAge = latestItem ? Date.now() - new Date(latestItem.timestamp).getTime() : Infinity;
    if (houseAge > 24 * 3600000) {
      const anyRecent = allItems.find(i => i.type === 'music');
      if (anyRecent) {
        const anyAge = Date.now() - new Date(anyRecent.timestamp).getTime();
        if (anyAge < houseAge) {
          latestItem = anyRecent;
          latestItemCrossHouse = true;
        }
      }
    }
  }

  let title = '—', artist = '—', label = 'No recent activity', isPlaying = false;
  let rooms = '';

  // Check published now_playing from data.json (bridge between SSE and history)
  const dataNp = data && data.now_playing && data.now_playing.house === h ? data.now_playing : null;
  const dataNpAge = dataNp ? Date.now() - new Date(dataNp.timestamp || dataNp.ts || 0).getTime() : Infinity;

  // Map service codes to display names
  function svcLabel(svc) {
    if (!svc) return '';
    const m = { 'sonos_spotify':'Spotify', 'sonos_apple_music':'Apple Music', 'sonos_qobuz':'Qobuz',
      'sonos_kcrw':'KCRW', 'sonos_kexp':'KEXP', 'sonos_tunein':'Radio', 'spotify':'Spotify' };
    return m[svc] || svc.replace('sonos_','');
  }
  // Detect KCRW from URI or service field
  function isKCRW(obj) {
    if (!obj) return false;
    const uri = (obj.uri || '').toLowerCase();
    const svc = (obj.service || obj.source || '').toLowerCase();
    return uri.includes('kcrw') || svc.includes('kcrw');
  }
  function isKEXP(obj) {
    if (!obj) return false;
    const uri = (obj.uri || '').toLowerCase();
    const svc = (obj.service || obj.source || '').toLowerCase();
    return uri.includes('kexp') || svc.includes('kexp');
  }
  let svc = '';
  let isRadioPlaceholder = false;

  // Detect garbage Sonos transport state strings (use global version)
  // isGarbageTitle is defined at global scope

  // Helper: detect radio station from any source object (SSE, dataNp, latestItem)
  function detectRadioStation(obj) {
    if (!obj) return null;
    if (isKEXP(obj)) return { title: 'KEXP', artist: 'Live from Seattle', svc: 'KEXP' };
    if (isKCRW(obj)) return { title: 'KCRW Eclectic 24', artist: 'Live from Santa Monica', svc: 'KCRW' };
    return null;
  }

  if (isLive) {
    const radio = detectRadioStation(sse);
    if (radio || isGarbageTitle(sse.title)) {
      if (radio) { title = radio.title; artist = radio.artist; svc = radio.svc; isRadioPlaceholder = true; }
      else { title = '—'; artist = ''; svc = ''; } // garbage but not radio — blank
    } else {
      title = sse.title || '—';
      artist = [sse.artist, sse.album].filter(Boolean).join(' · ');
      svc = svcLabel(sse.service);
    }
    label = 'Now Playing';
    isPlaying = true;
    rooms = [...new Set(sse.rooms || [])].join(', ');
  } else if (dataNp && dataNpAge < 30 * 60000) {
    const radio = detectRadioStation(dataNp);
    if (radio || isGarbageTitle(dataNp.title)) {
      if (radio) { title = radio.title; artist = radio.artist; svc = radio.svc; isRadioPlaceholder = true; }
      else { title = '—'; artist = ''; svc = ''; }
    } else {
      title = dataNp.title || '—';
      artist = [dataNp.artist, dataNp.album].filter(Boolean).join(' · ');
    }
    if (dataNpAge < 5 * 60000) { label = 'Now Playing'; isPlaying = true; }
    else { label = 'Played ' + fmtAge(dataNpAge); }
    rooms = [...new Set(Array.isArray(dataNp.rooms) ? dataNp.rooms : (dataNp.room ? [dataNp.room] : []))].join(', ');
    if (!isRadioPlaceholder) svc = svcLabel(dataNp.service || dataNp.source);
  } else if (latestItem) {
    const rawTitle = latestItem.title || '—';
    const radio = detectRadioStation(latestItem);
    if (radio || isGarbageTitle(rawTitle)) {
      if (radio) { title = radio.title; artist = radio.artist; svc = radio.svc; isRadioPlaceholder = true; }
      else { title = '—'; artist = ''; svc = ''; }
    } else {
      title = rawTitle;
      artist = [latestItem.artist, latestItem.album].filter(Boolean).join(' · ');
    }
    const age = Date.now() - new Date(latestItem.timestamp).getTime();
    if (age < 30 * 60000) { label = 'Played ' + fmtAge(age); isPlaying = false; }
    else { label = 'Last played · ' + fmtAge(age); isPlaying = false; }
    // Show origin house badge when falling back to cross-house play
    if (latestItemCrossHouse && latestItem.house) {
      const houseLabel = latestItem.house === 'roaming' ? '📱 Roaming' : latestItem.house === 'vashon' ? '🏖️ Vashon' : '🏠 Cap Hill';
      svc = houseLabel + (svcLabel(latestItem.source) ? ' · ' + svcLabel(latestItem.source) : '');
    } else if (!isRadioPlaceholder) { svc = svcLabel(latestItem.source); }
    rooms = [...new Set(Array.isArray(latestItem.rooms) ? latestItem.rooms : (latestItem.room ? [latestItem.room] : []))].join(', ');
  }

  const repeatBadge = isPlaying ? getRepeatBadge() : '';
  el.className = 'now-playing' + (isPlaying ? '' : ' np-stale');

  // Radio placeholder rendering with station logo
  if (isRadioPlaceholder) {
    const logoUrl = svc === 'KCRW'
      ? 'https://www.kcrw.com/favicon.ico'
      : 'https://www.kexp.org/favicon.ico';
    el.innerHTML = `
      <div class="np-indicator"></div>
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
        <img src="${logoUrl}" alt="${esc(svc)}" style="width:36px;height:36px;border-radius:6px;object-fit:contain;background:#1a1a2e;flex-shrink:0;"
             onerror="this.style.display='none'">
        <div class="np-info" style="flex:1;min-width:0;">
          <div class="np-label">${esc(label)}${rooms ? ' · ' + esc(rooms) : ''}${repeatBadge ? ' · ' + repeatBadge : ''}</div>
          <div class="np-track" style="color:var(--accent2);">📻 ${esc(title)}</div>
          <div class="np-artist">${esc(artist)}</div>
        </div>
      </div>`;
    return;
  }

  // Build explore button data from whatever source gave us the track
  const exploreData = (title && title !== '—') ? encodeURIComponent(JSON.stringify({
    title, artist: (sse && isLive ? sse.artist : (dataNp ? dataNp.artist : (latestItem ? latestItem.artist : ''))),
    album: (sse && isLive ? sse.album : (dataNp ? dataNp.album : (latestItem ? latestItem.album : ''))),
    source: svc || '', uri: ''
  })).replace(/'/g,'%27') : '';
  const npArtist = (sse && isLive ? sse.artist : (dataNp ? dataNp.artist : (latestItem ? latestItem.artist : '')));
  const npCardIdx = findExploredCard(npArtist);
  const exploreBtn = (title && title !== '—') ? (npCardIdx >= 0
    ? `<button class="np-explore" onclick="navigateToExploration(${npCardIdx})" title="View exploration">📖</button>`
    : `<button class="np-explore" onclick="exploreArtist(this,'${exploreData}')" title="Explore artist">🔍</button>`) : '';
  el.innerHTML = `
    <div class="np-indicator"></div>
    <div class="np-info">
      <div class="np-label">${esc(label)}${rooms ? ' · ' + esc(rooms) : ''}${svc ? ' · ' + esc(svc) : ''}${repeatBadge ? ' · ' + repeatBadge : ''}</div>
      <div class="np-track">${esc(title)}</div>
      <div class="np-artist">${esc(artist)}</div>
    </div>${exploreBtn}`;
}

function renderStatusBar() {
  const bar = document.getElementById('status-bar');
  if (!data || !data.client_status) { bar.innerHTML = ''; return; }
  const now = Date.now();
  const names = { lifelog_shumaframe: 'ShumaFrame', lifelog_mind: 'Mind', lifelog_shumangreypro: 'GreyPro' };
  // Dedup: skip bare-name entries if a lifelog_ prefixed version exists
  const cids = new Set(data.client_status.map(c => c.client_id));
  const filtered = data.client_status.filter(c => {
    if (!c.client_id.startsWith('lifelog_') && cids.has('lifelog_' + c.client_id.toLowerCase())) return false;
    return true;
  });
  bar.innerHTML = filtered.map(c => {
    const age = c.last_seen ? Math.round((now - new Date(c.last_seen).getTime()) / 60000) : null;
    const color = age === null ? '#f87171' : age < 10 ? 'var(--accent)' : age < 30 ? '#eab308' : '#f87171';
    const label = names[c.client_id] || c.client_id;
    const ver = c.version ? ` v${c.version}` : '';
    return `<span style="white-space:nowrap;color:${color};font-weight:600;font-size:11px">${esc(label)}<span style="font-weight:400;opacity:0.7">${esc(ver)}</span></span>`;
  }).join('') + ` <span style="white-space:nowrap;font-size:10px;opacity:0.45;font-weight:400">${esc(PAGE_VERSION)}</span>` + ' <span onclick="hardRefresh()" style="cursor:pointer;font-size:13px;opacity:0.6;vertical-align:middle" title="Hard refresh">🔄</span>';
}

function hardRefresh() {
  showToast('Refreshing speakers…');
  // Force Sonos re-discovery so rooms_playing reflects current topology
  postNtfy({ action: 'refresh' }).catch(() => {});
  // Preserve current tab across reload
  localStorage.setItem('ll_refresh_tab', house);
  // Give the service a moment to re-discover, then reload
  setTimeout(() => {
    const url = new URL(location.href);
    url.searchParams.set('_cb', Date.now());
    location.replace(url.toString());
  }, 2000);
}

// DATA LOADING
// ══════════════════════════════════════════════════════════════════════════════
function mergeItems(head, archive) {
  if (!archive.length) return head;
  const keys = new Set(head.map(i => (i.timestamp||'') + '|' + (i.title||'').toLowerCase()));
  return [...head, ...archive.filter(i => !keys.has((i.timestamp||'') + '|' + (i.title||'').toLowerCase()))];
}

// --- State file merge (cross-device freshness) ---
// DESIGN NOTE: state-{house}.json is pushed by the service after each track change.
// Contains now_playing + last 30 tracks. Browser merges these on top of data-head.json
// so cold loads on any device show near-real-time state (within CDN cache lag ~5-10min).
async function fetchStateFiles() {
  const results = {};
  await Promise.all(Object.entries(STATE_URLS).map(async ([h, url]) => {
    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (r.ok) results[h] = await r.json();
    } catch(e) {}
  }));
  return results;
}

// Global garbage-title filter (ZPSTR_* transport states, empty titles)
function isGarbageTitle(t) { return !t || /^ZPSTR_/i.test(t); }

function mergeStateIntoItems(items, stateFiles) {
  // Build dedup set from existing items (timestamp+title, case-insensitive)
  const existingKeys = new Set(items.map(i => (i.timestamp||'') + '|' + (i.title||'').toLowerCase()));
  const newItems = [];

  for (const [h, state] of Object.entries(stateFiles)) {
    if (!state || !state.recent_tracks) continue;
    for (const t of state.recent_tracks) {
      // Filter junk: ZPSTR_* transport states, empty titles, TuneIn radio raw tracks
      const title = (t.title || '').trim();
      if (!title || title.startsWith('ZPSTR_') || isGarbageTitle(title)) continue;
      // Skip raw TuneIn radio tracks — they're handled by radio_session items in data-head
      const tUri = (t.uri || '').toLowerCase();
      if ((t.service || '').includes('tunein') && (tUri.includes('kcrw.com') || tUri.includes('kexp') || tUri.includes('streamguys'))) continue;
      const key = (t.timestamp||'') + '|' + title.toLowerCase();
      if (existingKeys.has(key)) continue;
      existingKeys.add(key);
      newItems.push({
        type: 'music',
        title: t.title || '',
        artist: t.artist || '',
        album: t.album || '',
        source: t.service || 'sonos',
        timestamp: t.timestamp,
        domain: t.rooms || '',
        house: h,
        uri: t.uri || '',
        sonos_uri: t.uri || '',
        _fromState: true
      });
    }
  }

  if (newItems.length === 0) return items;
  // Merge and sort by timestamp descending
  const merged = [...items, ...newItems];
  merged.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  return merged;
}

function applyStateNowPlaying(stateFiles) {
  // Use freshest state file now_playing to seed SSE now-playing (if SSE hasn't overridden)
  for (const [h, state] of Object.entries(stateFiles)) {
    if (!state) continue;
    const stateTs = new Date(state.last_updated || 0).getTime();
    const sseTs = _sseNowPlaying[h]?.ts || 0;
    // State is fresher than current SSE data
    if (stateTs > sseTs) {
      if (state.now_playing && (Date.now() - stateTs) < 600000) {
        // Active now_playing — seed SSE
        const np = state.now_playing;
        _sseNowPlaying[h] = {
          title: np.title || '', artist: np.artist || '', album: np.album || '',
          rooms: [...new Set(np.rooms || [])], service: np.service || '',
          uri: np.uri || '', ts: stateTs, _fromState: true
        };
        if (!_sseNowPlayingGlobal || stateTs > (_sseNowPlayingGlobal.ts || 0)) {
          _sseNowPlayingGlobal = { ..._sseNowPlaying[h], house: h };
        }
      } else if (!state.now_playing) {
        // State says nothing playing — clear stale SSE data for this house
        delete _sseNowPlaying[h];
        if (_sseNowPlayingGlobal && _sseNowPlayingGlobal.house === h) {
          _sseNowPlayingGlobal = null;
        }
      }
    }
    // Seed rooms_all for offline detection
    if (state.rooms_all) { _roomsAll[h] = [...state.rooms_all]; }
    // Also seed rooms_playing + rooms_paused if state is fresher (for ALL houses, not just current tab)
    if (state.rooms_playing && state.rooms_playing.length > 0) {
      // Always update _roomsPlaying (reality) regardless of manual selection
      if (h === house && stateTs > sseTs) { _roomsPlaying = [...state.rooms_playing]; _roomsPaused = state.rooms_paused ? [...state.rooms_paused] : []; }
      // Only auto-set selectedRooms if user hasn't manually chosen
      if (stateTs > sseTs && !_userManualRoomSelect[h]) {
        selectedRooms[h] = [...state.rooms_playing];
        localStorage.setItem('ll_rooms_' + h, JSON.stringify(selectedRooms[h]));
      }
      // Re-evaluate sync button since live state may have changed
      updateSyncButton(h);
    } else if (state.rooms_playing && state.rooms_playing.length === 0 && stateTs > sseTs) {
      // State says no rooms playing — clear (only update globals for current house)
      if (h === house) { _roomsPlaying = []; _roomsPaused = state.rooms_paused ? [...state.rooms_paused] : []; }
      // Clear stale auto-selected rooms on page load when nothing is playing
      if (!_userManualRoomSelect[h] && !_initialRoomSeedDone[h]) {
        _initialRoomSeedDone[h] = true;
        // Only keep paused rooms as selected (they're recent); clear everything else
        const pausedRooms = (state.rooms_paused && state.rooms_paused.length > 0) ? [...state.rooms_paused] : [];
        if (pausedRooms.length > 0) {
          console.log('[rooms] Seeding', h, 'rooms from paused state:', pausedRooms);
          selectedRooms[h] = pausedRooms;
        } else {
          console.log('[rooms] Nothing playing/paused for', h, '— clearing stale room selection');
          selectedRooms[h] = [];
        }
        localStorage.setItem('ll_rooms_' + h, JSON.stringify(selectedRooms[h]));
      }
    }
  }
}

// Auto-select tab based on which house has active speakers
function autoSelectTab(stateFiles) {
  if (_tabManualOverride) return;  // user tapped a tab — don't fight them
  const active = [];
  for (const [h, state] of Object.entries(stateFiles)) {
    if (state && state.rooms_playing && state.rooms_playing.length > 0) active.push(h);
  }
  if (active.length === 1 && active[0] !== house) {
    console.log('[auto-tab] Switching to', active[0], '(active speakers detected)');
    setHouse(active[0]);
    return;
  }
  if (active.length > 0) return;  // both active or current house active — keep it

  // Both idle — check rooms_paused as tiebreaker (house with paused speakers = recently active)
  const pausedCounts = {};
  for (const [h, state] of Object.entries(stateFiles)) {
    pausedCounts[h] = (state && state.rooms_paused) ? state.rooms_paused.length : 0;
  }
  const houses = ['caphill', 'vashon'].filter(h => pausedCounts[h] !== undefined);
  if (houses.length === 2 && pausedCounts[houses[0]] !== pausedCounts[houses[1]]) {
    const winner = pausedCounts[houses[0]] > pausedCounts[houses[1]] ? houses[0] : houses[1];
    if (winner !== house) {
      console.log('[auto-tab] Switching to', winner, '(more paused rooms:', pausedCounts[winner], 'vs', pausedCounts[winner === houses[0] ? houses[1] : houses[0]], ')');
      setHouse(winner);
      return;
    }
  }

  // Fallback: most recently seen sonos_commander client (from data-head.json client_status)
  if (data && data.client_status) {
    const commanders = data.client_status.filter(c => c.sonos_commander);
    if (commanders.length >= 2) {
      commanders.sort((a, b) => (b.last_seen || '').localeCompare(a.last_seen || ''));
      const newest = commanders[0];
      const diff = new Date(newest.last_seen).getTime() - new Date(commanders[1].last_seen).getTime();
      if (diff > 30 * 60000 && newest.house !== house) {
        console.log('[auto-tab] Switching to', newest.house, '(most recently seen commander:', newest.client_id, ', diff:', Math.round(diff/60000), 'min)');
        setHouse(newest.house);
        return;
      }
    }
  }

  // Fallback: most recently updated state file = active machine location
  const timestamps = {};
  for (const [h, state] of Object.entries(stateFiles)) {
    timestamps[h] = state?.last_updated ? new Date(state.last_updated).getTime() : 0;
  }
  if (timestamps.caphill && timestamps.vashon && timestamps.caphill !== timestamps.vashon) {
    const winner = timestamps.vashon > timestamps.caphill ? 'vashon' : 'caphill';
    const diff = Math.abs(timestamps.vashon - timestamps.caphill);
    if (diff > 30 * 60000 && winner !== house) {
      console.log('[auto-tab] Switching to', winner, '(more recently updated state file, diff:', Math.round(diff/60000), 'min)');
      setHouse(winner);
      return;
    }
  }

  // Final fallback: most recent non-roaming listening history
  if (allItems.length > 0) {
    const recent = allItems.find(i => i.house && i.house !== 'roaming');
    if (recent && recent.house !== house) {
      console.log('[auto-tab] Switching to', recent.house, '(most recent listening)');
      setHouse(recent.house);
    }
  }
}

async function loadData(loadArchive) {
  try {
    // Fetch data-head.json, state files, and versions.json in parallel
    const [headResp, stateFiles, versionsResp] = await Promise.all([
      fetch(DATA_HEAD_URL + '?t=' + Date.now()).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
      fetchStateFiles(),
      fetch('https://shumania.github.io/lifelog/versions.json?t=' + Date.now()).then(r => r.ok ? r.json() : null).catch(() => null)
    ]);
    data = headResp;
    // Patch client_status from versions.json (always fresher than data-head.json)
    if (versionsResp && data.client_status) {
      if (versionsResp.service_version) {
        for (const c of data.client_status) {
          if (c.version) c.version = versionsResp.service_version;
        }
      }
      // Patch sonos_commander and house from versions.json clients map
      if (versionsResp.clients) {
        for (const c of data.client_status) {
          const vc = versionsResp.clients[c.client_id];
          if (vc) {
            if (vc.sonos_commander !== undefined) c.sonos_commander = vc.sonos_commander ? 1 : 0;
            if (vc.house) c.house = vc.house;
          }
        }
      }
      console.log('[loadData] Patched client_status from versions.json:', JSON.stringify(versionsResp));
    }
    let headItems = data.items || [];
    // Merge state file tracks into head items
    headItems = mergeStateIntoItems(headItems, stateFiles);
    allItems = mergeItems(headItems, archiveItems);
    // Auto-select tab based on active speakers
    autoSelectTab(stateFiles);
    // Apply state now_playing (before renderAll so Now Playing bar is correct)
    applyStateNowPlaying(stateFiles);
    renderAll();
  } catch(e) {
    console.warn('[loadData] head fetch failed, keeping previous data:', e.message);
    // Only show error if we have NO previous data at all
    if (!data && !allItems.length) {
      document.getElementById('music-list').innerHTML = '<div class="empty-state">⚠️ Could not load data</div>';
    }
  }

  if (loadArchive || !archiveLoaded) {
    try {
      const r2 = await fetch(DATA_FULL_URL + '?t=' + Date.now());
      const full = await r2.json();
      archiveItems = full.items || [];
      archiveLoaded = true;
      const headItems = data ? (data.items || []) : [];
      // p2.41: also merge current allItems — the old code rebuilt from raw head+archive
      // only, silently dropping fresher tracks merged in after a Sync (they vanished
      // from History until the next full publish).
      allItems = mergeItems(mergeItems(headItems, allItems), archiveItems);
      renderHistory();
      updateCounts();
    } catch(e) {
      console.warn('[loadData] archive fetch failed:', e && e.message);
    }
  }
}

function renderAll() {
  renderStatusBar();
  updateCommander();
  // Seed _roomsPlaying from data
  _roomsPlaying = inferActiveRooms(house) || [];
  renderRooms(house);
  if (house === 'roaming') renderRoamingPanel();
  else renderNowPlayingSonos(house);
  renderHistory();
  renderPodcasts();
  renderDiscovery();
  if (!document.getElementById('tab-playlists').hidden) renderPlaylists();
  updateCounts();
  if (data && data.generated_at) {
    document.getElementById('updated-label').textContent = 'Updated ' + fmtRelative(new Date(data.generated_at));
  }
}

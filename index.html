<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life History">
  <title>Life History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #3b82f6; color: #fff; }
    .tab-inactive { background: #1e2130; color: #94a3b8; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; }
    .progress-track { background: #2d3148; border-radius: 999px; height: 3px; }
    .progress-fill { background: #f97316; border-radius: 999px; height: 3px; }
    .stat-box { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; padding: 10px; text-align: center; }
    .sticky-header { position: sticky; top: 0; background: #0f1117; z-index: 10; padding-top: env(safe-area-inset-top); }
    .bottom-pad { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
    .item-row { display: flex; gap: 8px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid #1a1d2e; }
    .item-row:last-child { border-bottom: none; }
    .icon-wrap { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; margin-top: 1px; }
    .icon-music { background: #1e3a5f; }
    .icon-podcast { background: #3b1f0f; }
    .item-title { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.3; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 11px; color: #64748b; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 10px; color: #475569; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
    .filter-btn { border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .count-badge { font-size: 11px; opacity: 0.75; font-weight: 500; }
  </style>
</head>
<body>

<div class="sticky-header px-4 pb-2 pt-3">
  <div class="flex items-center justify-between mb-2">
    <div>
      <h1 class="text-lg font-bold text-white">Life History</h1>
      <p id="updated-at" class="text-xs text-slate-500 mt-0.5"></p>
    </div>
    <div id="load-indicator" class="spinner" style="display:none"></div>
  </div>
  <div class="flex gap-2 items-center">
    <button class="filter-btn tab-active" id="btn-all" onclick="setFilter('all')">All <span id="cnt-all" class="count-badge"></span></button>
    <button class="filter-btn tab-inactive" id="btn-music" onclick="setFilter('music')">🎵 Music <span id="cnt-music" class="count-badge"></span></button>
    <button class="filter-btn tab-inactive" id="btn-podcast" onclick="setFilter('podcast')">🎙 Podcasts <span id="cnt-podcast" class="count-badge"></span></button>
    <button id="sync-btn" onclick="syncNow()" style="margin-left:auto;background:#1e2130;border:1px solid #2d3148;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:#60a5fa;cursor:pointer;white-space:nowrap;transition:all 0.15s;">↻ Sync</button>
  </div>
</div>

<div class="px-4 bottom-pad">
  <div id="stats-row" class="grid grid-cols-2 gap-2 mb-3" style="display:none!important"></div>
  <div id="feed" class="card px-3">
    <div class="empty-state">
      <div class="spinner mx-auto mb-3"></div>
      <p class="text-sm">Loading your history…</p>
    </div>
  </div>
  <p class="text-center text-xs text-slate-600 mt-3">Updated automatically · <a href="https://tasklet.ai" class="text-slate-500 underline">Tasklet</a></p>
</div>

<script>
let allData = [];
let filter = 'all';

function setFilter(f) {
  filter = f;
  ['all','music','podcast'].forEach(k => {
    document.getElementById('btn-' + k).className = 'filter-btn ' + (k === f ? 'tab-active' : 'tab-inactive');
  });
  renderFeed();
  renderStats();
}

function updateCounts() {
  const music = allData.filter(i => i.type === 'music');
  const pods  = allData.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0);
  document.getElementById('cnt-all').textContent    = allData.length ? (music.length + pods.length) : '';
  document.getElementById('cnt-music').textContent   = music.length  ? music.length  : '';
  document.getElementById('cnt-podcast').textContent = pods.length   ? pods.length   : '';
}

function formatTime(isoStr) {
  const d   = new Date(isoStr);
  const now = new Date();
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  const dDate   = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((nowDate - dDate) / 86400000);

  if (diffDays === 0)  return 'Today · '     + timeStr;
  if (diffDays === 1)  return 'Yesterday · ' + timeStr;

  const dateStr = d.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
    year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
  });
  return dateStr + ' · ' + timeStr;
}

function fmtDuration(sec) {
  if (!sec) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function renderStats() {
  const music = allData.filter(i => i.type === 'music');
  const pods  = allData.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0);
  const items = filter === 'music' ? music : filter === 'podcast' ? pods : [...music, ...pods];
  const statsEl = document.getElementById('stats-row');
  if (allData.length === 0) { statsEl.style.display = 'none'; return; }
  statsEl.style.removeProperty('display');

  let boxes = [];
  if (filter !== 'podcast') boxes.push(`<div class="stat-box"><div class="text-2xl font-bold text-blue-400">${music.length}</div><div class="text-xs text-slate-500 mt-1">Tracks</div></div>`);
  if (filter !== 'music')   boxes.push(`<div class="stat-box"><div class="text-2xl font-bold text-orange-400">${pods.length}</div><div class="text-xs text-slate-500 mt-1">Episodes</div></div>`);
  if (filter === 'podcast' && pods.length > 0) {
    const totalMin = Math.round(pods.reduce((s,i) => s + (i.progress_seconds||i.duration_seconds||0), 0) / 60);
    boxes.push(`<div class="stat-box"><div class="text-2xl font-bold text-orange-400">${totalMin > 60 ? Math.round(totalMin/60)+'h' : totalMin+'m'}</div><div class="text-xs text-slate-500 mt-1">Listened</div></div>`);
  }
  if (items.length > 0) {
    const earliest = new Date(Math.min(...items.map(i => new Date(i.timestamp))));
    const label = earliest.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    boxes.push(`<div class="stat-box"><div class="text-sm font-bold text-slate-300">${label}</div><div class="text-xs text-slate-500 mt-1">Since</div></div>`);
  }
  statsEl.innerHTML = boxes.join('');
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = allData.filter(i => {
    if (i.type === 'podcast' && !(i.duration_seconds > 0)) return false;
    if (filter !== 'all' && i.type !== filter) return false;
    return true;
  });

  if (filtered.length === 0) {
    feed.innerHTML = `<div class="empty-state"><p class="text-2xl mb-2">🎧</p><p class="text-sm">No ${filter === 'all' ? '' : filter + ' '}history yet</p></div>`;
    return;
  }

  feed.innerHTML = filtered.map(item => {
    const ts = formatTime(item.timestamp);
    if (item.type === 'music') {
      return `
        <div class="item-row">
          <div class="icon-wrap icon-music">🎵</div>
          <div style="flex:1;min-width:0">
            <div class="item-title">${escHtml(item.title)}</div>
            <div class="item-sub">${escHtml(item.artist || '')}${item.album ? ' · ' + escHtml(item.album) : ''}</div>
            <div class="item-meta">${ts}</div>
          </div>
        </div>`;
    } else {
      const pct = item.duration_seconds > 0 ? Math.min(100, Math.round((item.progress_seconds||0) / item.duration_seconds * 100)) : 0;
      const dur = fmtDuration(item.duration_seconds);
      return `
        <div class="item-row">
          <div class="icon-wrap icon-podcast">🎙</div>
          <div style="flex:1;min-width:0">
            <div class="item-title">${escHtml(item.title)}</div>
            <div class="item-sub">${escHtml(item.show_name || '')}</div>
            ${dur ? `<div style="margin:3px 0 2px"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div>` : ''}
            <div class="item-meta">${dur ? `${pct}% · ${dur} · ` : ''}${ts}</div>
          </div>
        </div>`;
    }
  }).join('');
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadData() {
  document.getElementById('load-indicator').style.display = 'inline-block';
  try {
    const res  = await fetch('data.json?t=' + Date.now());
    const json = await res.json();
    allData = json.items || [];
    if (json.generated_at) {
      document.getElementById('updated-at').textContent = 'Updated ' + formatTime(json.generated_at);
    }
    updateCounts();
  } catch(e) {
    document.getElementById('feed').innerHTML = `<div class="empty-state"><p class="text-2xl mb-2">⚠️</p><p class="text-sm">Could not load data</p></div>`;
  } finally {
    document.getElementById('load-indicator').style.display = 'none';
  }
  renderStats();
  renderFeed();
}

loadData();

async function syncNow() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  try {
    await fetch('https://tasklet.ai/webhook/whe_cdwbsbbh3tf42hyg4f4d', { method: 'POST', mode: 'no-cors' });
    btn.textContent = '✓ Syncing…';
    btn.style.color = '#4ade80';
    setTimeout(async () => {
      await loadData();
      btn.textContent = '↻ Sync';
      btn.style.color = '#60a5fa';
      btn.style.opacity = '1';
      btn.disabled = false;
    }, 35000);
  } catch(e) {
    btn.textContent = '↻ Sync';
    btn.style.color = '#60a5fa';
    btn.style.opacity = '1';
    btn.disabled = false;
  }
}
</script>
</body>
</html>

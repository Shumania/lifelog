<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Listening Log">
<title>Listening Log</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #131829;
    --surface2: #1a2035;
    --border: #232940;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --tab-active: #4ade80;
    --tab-inactive: #8892a8;
    --playing: #4ade80;
    --spotify: #1db954;
    --qobuz: #4285f4;
    --radio: #f59e0b;
    --apple: #fc3c44;
    --caphill: #4ade80;
    --vashon: #60a5fa;
    --roaming: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  /* ========== TOP SECTION ========== */
  .top-section { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .top-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0; }
  .top-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .status-dots { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-dot.green { background: var(--accent); }
  .status-dot.yellow { background: #eab308; }
  .status-dot.red { background: #f87171; }

  .house-tabs { display: flex; gap: 0; padding: 10px 16px 0; }
  .house-tab {
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); border-bottom: none;
    border-radius: 8px 8px 0 0; background: transparent;
    color: var(--tab-inactive); transition: all 0.15s;
  }
  .house-tab.active { background: var(--surface2); color: var(--tab-active); border-color: var(--tab-active); border-bottom: 1px solid var(--surface2); }
  .house-tab:not(.active):hover { color: var(--text); background: var(--surface2); }

  .house-panel { background: var(--surface2); border-top: 1px solid var(--border); padding: 12px 16px 14px; }
  .house-panel[hidden] { display: none; }

  .now-playing {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: rgba(74, 222, 128, 0.06);
    border: 1px solid rgba(74, 222, 128, 0.15); border-radius: 10px;
    margin-bottom: 12px;
  }
  .np-indicator {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--playing); flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .np-info { flex: 1; min-width: 0; }
  .np-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
  .np-track { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-stale { background: rgba(255,255,255,0.03); border-color: var(--border); }
  .np-stale .np-indicator { background: #6b7280; animation: none; }
  .np-stale .np-label { color: var(--text-dim); }

  .controls-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ctrl-btn:hover { background: var(--surface2); border-color: var(--text-dim); }
  .ctrl-btn:active { transform: scale(0.95); }
  .volume-group { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .vol-label { font-size: 11px; color: var(--text-dim); min-width: 28px; text-align: center; }

  .room-selector { display: flex; flex-wrap: wrap; gap: 6px; }
  .room-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .room-chip.active { background: rgba(74,222,128,0.12); color: var(--accent); border-color: var(--accent); }
  .room-chip.playing::after { content: ' 🔊'; font-size: 10px; }
  .room-chip:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

  .device-list { display: flex; flex-direction: column; gap: 6px; }
  .device-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .device-item.active { border-color: var(--spotify); background: rgba(29,185,84,0.08); }
  .device-item:active { transform: scale(0.98); }
  .device-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .device-item.active .device-dot { background: var(--spotify); }
  .device-name { flex: 1; }
  .device-type { font-size: 11px; color: var(--text-dim); }

  .spotify-connect-btn {
    display: block; width: 100%; padding: 12px; border-radius: 10px;
    background: var(--spotify); color: #fff; font-size: 14px; font-weight: 700;
    border: none; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .spotify-connect-btn:active { opacity: 0.8; }
  .spotify-disconnect-btn {
    font-size: 11px; color: #f87171; background: none; border: none;
    cursor: pointer; padding: 4px 0; margin-top: 8px;
  }

  /* ========== BOTTOM SECTION ========== */
  .bottom-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .content-tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 0 16px; flex-shrink: 0;
  }
  .content-tab {
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--tab-inactive); border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .content-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .content-tab:hover:not(.active) { color: var(--text); }

  .sub-tabs {
    display: flex; gap: 4px; padding: 6px 16px; align-items: center;
    background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
    justify-content: flex-end;
  }
  .sub-tab {
    padding: 0; font-size: 12px; font-weight: 400;
    cursor: pointer; color: var(--text-dim);
    background: transparent; transition: color 0.15s; opacity: 0.5;
  }
  .sub-tab.active { color: var(--text); opacity: 1; font-weight: 500; }
  .sub-tab:hover:not(.active) { color: var(--text); opacity: 0.7; }
  .sub-tab .count { font-weight: 400; opacity: 0.5; margin-left: 2px; font-size: 11px; }
  .sub-tab-sep { color: var(--text-dim); opacity: 0.3; font-size: 12px; padding: 0 2px; }

  .content-panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content-panel[hidden] { display: none; }

  /* History items */
  .history-list { padding: 4px 0; }
  .history-item {
    display: flex; align-items: flex-start; gap: 0;
    padding: 6px 10px 6px 0;
    border-bottom: 1px solid rgba(35, 41, 64, 0.6);
  }
  .history-item:active { background: var(--surface2); }

  .hi-time-col { width: 50px; flex-shrink: 0; text-align: right; padding: 3px 8px 0 6px; }
  .hi-time { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .hi-info { flex: 1; min-width: 0; padding-left: 4px; }
  .hi-line1 {
    display: flex; align-items: baseline; gap: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 13px; line-height: 1.4;
  }
  .hi-track { font-weight: 600; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; }
  .hi-sep { color: var(--border); margin: 0 5px; flex-shrink: 0; }
  .hi-album { color: #7b88a8; font-style: italic; flex-shrink: 2; overflow: hidden; text-overflow: ellipsis; }
  .hi-artist { color: var(--text-dim); flex-shrink: 3; overflow: hidden; text-overflow: ellipsis; }

  .hi-line2 { display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 11px; }
  .hi-location {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600;
    padding: 1px 7px; border-radius: 8px; flex-shrink: 0;
  }
  .hi-location.caphill { color: var(--caphill); background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.15); }
  .hi-location.vashon { color: var(--vashon); background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.15); }
  .hi-location.roaming { color: var(--roaming); background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.15); }
  .hi-rooms { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-source-badge {
    font-size: 9px; color: var(--text-dim); opacity: 0.7;
    padding: 0 4px; border-radius: 4px; background: rgba(255,255,255,0.04); flex-shrink: 0;
  }
  .hi-actions { display: flex; gap: 2px; flex-shrink: 0; padding-top: 1px; }
  .action-btn {
    width: 26px; height: 26px; border-radius: 7px; border: none;
    background: transparent; color: var(--accent); font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: background 0.1s;
  }
  .action-btn:hover { background: var(--surface2); }
  .action-btn.explore { color: var(--accent2); }
  .action-btn.exploring { animation: pulse 1s infinite; }

  .day-header {
    padding: 10px 16px 6px; font-size: 12px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
    background: var(--bg); position: sticky; top: 0; z-index: 5;
  }

  .history-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .sync-btn {
    font-size: 12px; padding: 6px 14px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .sync-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .updated-label { font-size: 11px; color: var(--text-dim); }

  /* Podcasts */
  .podcast-item {
    display: flex; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid rgba(35, 41, 64, 0.6);
  }
  .podcast-icon {
    width: 44px; height: 44px; border-radius: 8px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .podcast-info { flex: 1; min-width: 0; }
  .podcast-show { font-size: 11px; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .podcast-title { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .podcast-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .podcast-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .podcast-progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; }

  /* ========== DISCOVERY ========== */
  .discovery-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .discovery-stat { padding: 4px 0 8px; font-size: 12px; color: var(--text-dim); }
  .discovery-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.15s;
  }
  .discovery-card:hover { border-color: var(--text-dim); }
  .disc-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .disc-artist-badge {
    font-size: 15px; font-weight: 700; color: var(--accent);
    white-space: nowrap; flex-shrink: 0; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
  }
  .disc-hinfo { flex: 1; min-width: 0; }
  .disc-title { font-size: 15px; font-weight: 600; }
  .disc-meta { font-size: 12px; color: var(--text-dim); }
  .disc-expand { margin-left: auto; color: var(--text-dim); font-size: 14px; transition: transform 0.2s; }

  .disc-body { padding: 0 16px 14px; display: none; }
  .discovery-card.open .disc-body { display: block; }
  .discovery-card.open .disc-expand { transform: rotate(90deg); }

  .disc-source-track {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 10px;
    background: rgba(30,215,96,0.08); border-radius: 8px; border: 1px solid rgba(30,215,96,0.15);
  }
  .disc-source-icon { font-size: 14px; flex-shrink: 0; }
  .disc-source-info { flex: 1; min-width: 0; }
  .disc-source-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); display: block; }
  .disc-source-title { font-size: 13px; font-weight: 500; color: var(--text); }

  .disc-narrative { font-size: 13px; color: var(--text-dim); line-height: 1.55; margin-bottom: 12px; }
  .disc-narrative strong { color: var(--text); font-weight: 600; }
  .disc-narrative em { font-style: italic; }

  .suggestion-section-label {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 0 4px; border-top: 1px solid var(--border); margin-top: 4px;
  }
  .suggestion-section-label:first-of-type { margin-top: 0; border-top: none; }

  .suggestion-item {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 0; border-top: 1px solid rgba(35,41,64,0.5);
  }
  .suggestion-info { flex: 1; min-width: 0; }
  .suggestion-title { font-size: 13px; font-weight: 500; }
  .suggestion-detail { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-top: 2px; }

  .sugg-actions { display: flex; gap: 2px; flex-shrink: 0; margin-left: auto; }
  .sugg-btn {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px;
    cursor: pointer; border: none; transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sugg-btn:active { opacity: 0.7; }
  .sugg-btn-play { background: #2563eb; color: #fff; }
  .sugg-btn-queue { background: #374151; color: #93c5fd; border: 1px solid #4b5563; }

  /* Empty/loading states */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 50%; transform: translateX(-50%);
    background: rgba(26,58,26,0.95); border: 1px solid var(--accent);
    color: var(--accent); border-radius: 10px; padding: 10px 20px;
    font-size: 14px; font-weight: 600; z-index: 100;
    transition: opacity 0.4s; white-space: nowrap; pointer-events: none;
  }
  .toast.error { background: rgba(58,26,26,0.95); border-color: #f87171; color: #f87171; }

  /* Sonos hint card */
  .sonos-hint {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
  }
  .sonos-hint a { color: var(--accent2); text-decoration: none; }
  .sonos-hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast" style="display:none;opacity:0;"></div>

<!-- ==================== TOP SECTION ==================== -->
<div class="top-section">
  <div class="top-header">
    <h1>🎵 Listening Log</h1>
    <div class="status-dots" id="status-bar">
      <span class="spinner" id="load-spinner" style="display:none"></span>
    </div>
  </div>
  <div class="house-tabs">
    <div class="house-tab active" data-house="caphill" onclick="setHouse('caphill')">🏠 Cap Hill</div>
    <div class="house-tab" data-house="vashon" onclick="setHouse('vashon')">🏝 Vashon</div>
    <div class="house-tab" data-house="roaming" onclick="setHouse('roaming')">📱 Roaming</div>
  </div>

  <!-- Cap Hill panel -->
  <div class="house-panel" id="panel-caphill">
    <div class="now-playing" id="np-caphill">
      <div class="np-indicator"></div>
      <div class="np-info">
        <div class="np-label">Loading...</div>
        <div class="np-track">—</div>
        <div class="np-artist">—</div>
      </div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="sendCmd('prev')">⏮</button>
      <button class="ctrl-btn" onclick="sendCmd('pause')">⏸</button>
      <button class="ctrl-btn" onclick="sendCmd('play')">▶️</button>
      <button class="ctrl-btn" onclick="sendCmd('next')">⏭</button>
      <div class="volume-group">
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_down')">−</button>
        <span class="vol-label" id="vol-label-caphill">Vol</span>
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_up')">+</button>
      </div>
    </div>
    <div class="room-selector" id="rooms-caphill"></div>
  </div>

  <!-- Vashon panel -->
  <div class="house-panel" id="panel-vashon" hidden>
    <div class="now-playing np-stale" id="np-vashon">
      <div class="np-indicator"></div>
      <div class="np-info">
        <div class="np-label">Loading...</div>
        <div class="np-track">—</div>
        <div class="np-artist">—</div>
      </div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="sendCmd('prev')">⏮</button>
      <button class="ctrl-btn" onclick="sendCmd('pause')">⏸</button>
      <button class="ctrl-btn" onclick="sendCmd('play')">▶️</button>
      <button class="ctrl-btn" onclick="sendCmd('next')">⏭</button>
      <div class="volume-group">
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_down')">−</button>
        <span class="vol-label" id="vol-label-vashon">Vol</span>
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_up')">+</button>
      </div>
    </div>
    <div class="room-selector" id="rooms-vashon"></div>
  </div>

  <!-- Roaming panel -->
  <div class="house-panel" id="panel-roaming" hidden>
    <div class="now-playing np-stale" id="np-roaming">
      <div class="np-indicator" style="background:var(--spotify);"></div>
      <div class="np-info">
        <div class="np-label" style="color:var(--spotify);">Spotify</div>
        <div class="np-track">—</div>
        <div class="np-artist">—</div>
      </div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="sendCmd('prev')">⏮</button>
      <button class="ctrl-btn" onclick="sendCmd('pause')">⏸</button>
      <button class="ctrl-btn" onclick="sendCmd('play')">▶️</button>
      <button class="ctrl-btn" onclick="sendCmd('next')">⏭</button>
      <div class="volume-group">
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_down')">−</button>
        <span class="vol-label" id="vol-label-roaming">Vol</span>
        <button class="ctrl-btn" style="width:36px;height:36px;font-size:18px;" onclick="sendCmd('volume_up')">+</button>
      </div>
    </div>
    <div id="roaming-devices"></div>
  </div>
</div>

<!-- ==================== BOTTOM SECTION ==================== -->
<div class="bottom-section">
  <div class="content-tabs">
    <div class="content-tab active" data-tab="history" onclick="setContentTab('history')">History</div>
    <div class="content-tab" data-tab="discovery" onclick="setContentTab('discovery')">Discovery</div>
  </div>

  <div id="tab-history">
    <div class="sub-tabs">
      <div class="sub-tab active" data-subtab="music" onclick="setSubTab('music')">Music <span class="count" id="cnt-music"></span></div>
      <span class="sub-tab-sep">·</span>
      <div class="sub-tab" data-subtab="podcasts" onclick="setSubTab('podcasts')">Podcasts <span class="count" id="cnt-podcasts"></span></div>
    </div>
    <div class="history-toolbar">
      <span class="updated-label" id="updated-label">Loading...</span>
      <button class="sync-btn" id="sync-btn" onclick="syncNow()">↻ Sync Spotify</button>
    </div>
    <div class="content-panel" id="subtab-music">
      <div class="history-list" id="music-list">
        <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px;font-size:13px;">Loading history...</p></div>
      </div>
    </div>
    <div class="content-panel" id="subtab-podcasts" hidden>
      <div class="history-list" id="podcast-list">
        <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px;font-size:13px;">Loading podcasts...</p></div>
      </div>
    </div>
  </div>

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtTime(iso) {
  const d = new Date(iso);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'p' : 'a';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ampm;
}

function fmtAge(ms) {
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  return Math.floor(hr / 24) + 'd ago';
}

function fmtRelative(d) {
  const diff = Date.now() - d.getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return sec < 5 ? 'just now' : sec + 's ago';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ' + (min % 60) + 'm ago';
  return Math.floor(hr / 24) + 'd ago';
}

function fmtMs(ms) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
  return m + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

function dayLabel(iso) {
  const d = new Date(iso);
  const now = new Date();
  const dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((nowDate - dDate) / 86400000);
  const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
  const monthDay = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff === 0) return 'Today · ' + dayName + ' ' + monthDay;
  if (diff === 1) return 'Yesterday · ' + dayName + ' ' + monthDay;
  return dayName + ' ' + monthDay;
}

function dayKey(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 400); }, 2500);
}

// ══════════════════════════════════════════════════════════════════════════════
// SPOTIFY PKCE AUTH (self-contained — no controller.html needed)
// ══════════════════════════════════════════════════════════════════════════════
function generateRandomString(len) {
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const values = crypto.getRandomValues(new Uint8Array(len));
  return values.reduce((acc, x) => acc + possible[x % possible.length], '');
}
async function sha256(plain) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
}
function base64urlEncode(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function spotifyAuth() {
  const verifier = generateRandomString(64);
  const challenge = base64urlEncode(await sha256(verifier));
  localStorage.setItem('spotify_pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: SP_CLIENT_ID,
    response_type: 'code',
    redirect_uri: SP_REDIRECT,
    scope: 'user-modify-playback-state user-read-playback-state user-read-recently-played streaming',
    code_challenge_method: 'S256',
    code_challenge: challenge,
    state: 'roaming_auth'
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function handleSpotifyCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code || state !== 'roaming_auth') return false;

  const verifier = localStorage.getItem('spotify_pkce_verifier');
  if (!verifier) return false;

  try {
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SP_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: SP_REDIRECT,
        code_verifier: verifier
      })
    });
    const d = await r.json();
    if (d.access_token) {
      localStorage.setItem('spotify_access_token', d.access_token);
      localStorage.setItem('spotify_refresh_token', d.refresh_token);
      localStorage.setItem('spotify_token_expiry', String(Date.now() + d.expires_in * 1000));
      localStorage.removeItem('spotify_pkce_verifier');
      history.replaceState({}, '', window.location.pathname);
      setHouse('roaming');
      showToast('Spotify connected!');
      return true;
    }
  } catch(e) { console.error('Spotify auth error:', e); }
  return false;
}

function hasSpotifyAuth() { return !!localStorage.getItem('spotify_refresh_token'); }

async function getSpotifyToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) {
    const rt = localStorage.getItem('spotify_refresh_token');
    if (!rt) return null;
    try {
      const r = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({ client_id: SP_CLIENT_ID, grant_type: 'refresh_token', refresh_token: rt })
      });
      const d = await r.json();
      if (d.access_token) {
        localStorage.setItem('spotify_access_token', d.access_token);
        if (d.refresh_token) localStorage.setItem('spotify_refresh_token', d.refresh_token);
        localStorage.setItem('spotify_token_expiry', String(Date.now() + d.expires_in * 1000));
      } else return null;
    } catch(e) { return null; }
  }
  return localStorage.getItem('spotify_access_token');
}

async function spotifyApi(method, path, body) {
  const token = await getSpotifyToken();
  if (!token) return null;
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token } };
  if (body !== undefined && body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch('https://api.spotify.com/v1' + path, opts);
  if (r.status === 401) {
    localStorage.removeItem('spotify_token_expiry');
    const retry = await getSpotifyToken();
    if (retry) return spotifyApi(method, path, body);
    return null;
  }
  if (r.status === 204 || r.status === 202) return {};
  if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error?.message || 'HTTP ' + r.status); }
  const text = await r.text();
  return text ? JSON.parse(text) : {};
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOM SELECTION (Sonos)
// ══════════════════════════════════════════════════════════════════════════════
function inferActiveRooms(h) {
  h = h || house;
  // From data rooms_playing (per-client metadata)
  if (data && data.client_status) {
    for (const c of data.client_status) {
      if (c.house !== h || !c.sonos_commander) continue;
      try {
        const meta = typeof c.metadata === 'string' ? JSON.parse(c.metadata) : c.metadata;
        if (meta && Array.isArray(meta.rooms_playing) && meta.rooms_playing.length > 0) return [...meta.rooms_playing];
      } catch(e) {}
    }
  }
  // From recent history
  if (allItems.length > 0) {
    const cutoff = Date.now() - 120 * 60000;
    for (const item of allItems) {
      if (item.house !== h) continue;
      const ts = new Date(item.timestamp).getTime();
      if (ts < cutoff) break;
      if (Array.isArray(item.rooms) && item.rooms.length > 0) return [...item.rooms];
      if (item.room) return [item.room];
    }
  }
  return [];
}

function renderRooms(h) {
  h = h || house;
  const container = document.getElementById('rooms-' + h);
  if (!container) return;
  const all = ROOMS_LIST[h] || [];
  const sel = selectedRooms[h] || [];
  const liveRooms = inferActiveRooms(h);
  // Auto-set rooms if user hasn't manually selected
  if (!_userManualRoomSelect[h] && liveRooms.length > 0) {
    selectedRooms[h] = [...liveRooms];
    localStorage.setItem('ll_rooms_' + h, JSON.stringify(selectedRooms[h]));
  }
  const curSel = selectedRooms[h] || [];
  container.innerHTML = all.map(room => {
    const isActive = curSel.includes(room);
    const isPlaying = liveRooms.includes(room);
    return `<div class="room-chip${isActive ? ' active' : ''}${isPlaying ? ' playing' : ''}" onclick="toggleRoom('${esc(h)}','${esc(room.replace(/'/g,"\\'"))}')">${esc(room)}</div>`;
  }).join('');
}

function toggleRoom(h, room) {
  _userManualRoomSelect[h] = true;
  const sel = selectedRooms[h] || [];
  const idx = sel.indexOf(room);
  const adding = idx < 0;
  if (adding) sel.push(room); else sel.splice(idx, 1);
  selectedRooms[h] = sel;
  localStorage.setItem('ll_rooms_' + h, JSON.stringify(sel));
  renderRooms(h);

  // Live group/ungroup: if Sonos is actively playing, send command immediately
  if (h === 'roaming' || !_roomsPlaying || _roomsPlaying.length === 0) return;
  // Find a room that's currently playing to use as coordinator
  const coordinator = _roomsPlaying[0];
  if (adding) {
    postNtfy({ action: 'group', source: coordinator, add: [room], target_client_id: commanderId, t_requested: new Date().toISOString() });
    showToast(`Adding ${room} to group`);
  } else {
    postNtfy({ action: 'ungroup', room: room, target_client_id: commanderId, t_requested: new Date().toISOString() });
    showToast(`Removing ${room} from group`);
  }
}

function updateCommander() {
  if (house === 'roaming' || !data || !data.client_status) { commanderId = null; return; }
  const cmdr = data.client_status.find(c => c.house === house && c.sonos_commander);
  commanderId = cmdr ? cmdr.client_id : null;
}

// ══════════════════════════════════════════════════════════════════════════════
// TRANSPORT CONTROLS
// ══════════════════════════════════════════════════════════════════════════════
const SONOS_MAP = { play: 'resume', prev: 'previous' };

async function sendCmd(action) {
  if (house === 'roaming') { await spotifyCmd(action); return; }
  const sonosAction = SONOS_MAP[action] || action;
  const rooms = (selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms();
  if (!rooms.length) { showToast('No rooms selected', true); return; }
  const payload = { action: sonosAction, rooms, target_client_id: commanderId, t_requested: new Date().toISOString() };
  await postNtfy(payload);
}

async function postNtfy(payload) {
  const topic = NTFY[house];
  if (!topic) { showToast('No ntfy topic for ' + house, true); return; }
  if (!payload.t_requested) payload.t_requested = new Date().toISOString();
  try {
    const r = await fetch(topic, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    showToast('✓ Command sent');
  } catch(e) { showToast('✗ Failed: ' + e.message, true); }
}

// Spotify transport
async function _ensureDeviceAwake() {
  if (!spotifySelectedDeviceId) return;
  const cached = _deviceCache[spotifySelectedDeviceId];
  if (cached && cached.stale) {
    showToast('Waking device...');
    try { await spotifyApi('PUT', '/me/player', { device_ids: [spotifySelectedDeviceId], play: false }); } catch(e) {}
    await new Promise(r => setTimeout(r, 500));
  }
}

async function spotifyCmd(action) {
  if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
  await _ensureDeviceAwake();
  const dp = spotifySelectedDeviceId ? '?device_id=' + spotifySelectedDeviceId : '';
  try {
    switch(action) {
      case 'play': await spotifyApi('PUT', '/me/player/play' + dp); break;
      case 'pause': await spotifyApi('PUT', '/me/player/pause' + dp); break;
      case 'next': await spotifyApi('POST', '/me/player/next' + dp); break;
      case 'prev': await spotifyApi('POST', '/me/player/previous' + dp); break;
      case 'volume_up': case 'volume_down': {
        const cur = spotifyDevices.find(d => d.is_active)?.volume_percent || 50;
        const vol = Math.max(0, Math.min(100, cur + (action === 'volume_up' ? 10 : -10)));
        await spotifyApi('PUT', '/me/player/volume?volume_percent=' + vol + (spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : ''));
        document.getElementById('vol-label-roaming').textContent = vol + '%';
        break;
      }
    }
    showToast('✓ ' + action);
    setTimeout(fetchSpotifyNowPlaying, 500);
  } catch(e) { showToast('✗ ' + e.message, true); }
}

// ══════════════════════════════════════════════════════════════════════════════
// SPOTIFY DEVICES & NOW PLAYING (Roaming)
// ══════════════════════════════════════════════════════════════════════════════
const PHONE_TYPES = new Set(['Smartphone', 'Tablet']);
function deviceIcon(type) {
  return { Computer:'💻', Smartphone:'📱', Speaker:'🔊', TV:'📺', AVR:'🎛️', Tablet:'📱', Automobile:'🚗' }[type] || '🎵';
}

async function fetchSpotifyDevices() {
  try {
    const d = await spotifyApi('GET', '/me/player/devices');
    if (!d || !d.devices) return;
    const now = Date.now();
    const liveIds = new Set();
    for (const dev of d.devices) {
      liveIds.add(dev.id);
      _deviceCache[dev.id] = { device: dev, lastSeen: now, stale: false };
      if (PHONE_TYPES.has(dev.type)) {
        _lastKnownPhone = { device: {...dev}, lastSeen: now };
        try { localStorage.setItem('ll_last_phone', JSON.stringify(_lastKnownPhone)); } catch(e) {}
      }
    }
    for (const [id, entry] of Object.entries(_deviceCache)) {
      if (!liveIds.has(id)) {
        entry.stale = true;
        if (!PHONE_TYPES.has(entry.device.type) && now - entry.lastSeen > 120000) delete _deviceCache[id];
      }
    }
    if (_lastKnownPhone && !_deviceCache[_lastKnownPhone.device.id]) {
      _deviceCache[_lastKnownPhone.device.id] = { device: _lastKnownPhone.device, lastSeen: _lastKnownPhone.lastSeen, stale: true };
    }
    spotifyDevices = Object.values(_deviceCache).sort((a,b) => a.stale === b.stale ? 0 : a.stale ? 1 : -1).map(e => ({...e.device, _stale: e.stale}));
    const active = spotifyDevices.find(x => x.is_active && !x._stale);
    if (active) { spotifySelectedDeviceId = active.id; localStorage.setItem('ll_spotify_device', active.id); }
    else if (!spotifySelectedDeviceId || !spotifyDevices.find(x => x.id === spotifySelectedDeviceId)) {
      spotifySelectedDeviceId = spotifyDevices[0]?.id || null;
    }
    if (house === 'roaming') renderSpotifyDevices();
  } catch(e) {}
}

async function fetchSpotifyNowPlaying() {
  try {
    const d = await spotifyApi('GET', '/me/player?additional_types=track,episode');
    if (!d || !d.item) { spotifyNowPlaying = null; }
    else {
      spotifyNowPlaying = {
        title: d.item.name,
        artist: d.item.type === 'track' ? (d.item.artists||[]).map(a=>a.name).join(', ') : (d.item.show?.name||''),
        album: d.item.type === 'track' ? (d.item.album?.name||'') : '',
        device: d.device?.name || '',
        progress_ms: d.progress_ms || 0, duration_ms: d.item.duration_ms || 0,
        is_playing: d.is_playing, uri: d.item.uri
      };
      if (d.device?.id) { spotifySelectedDeviceId = d.device.id; localStorage.setItem('ll_spotify_device', d.device.id); }
    }
  } catch(e) { spotifyNowPlaying = null; }
  if (house === 'roaming') renderNowPlayingRoaming();
}

function startSpotifyPolling() {
  stopSpotifyPolling();
  if (!hasSpotifyAuth()) return;
  fetchSpotifyDevices(); fetchSpotifyNowPlaying();
  let burst = 0;
  const bt = setInterval(() => { if (++burst >= 3) { clearInterval(bt); return; } fetchSpotifyDevices(); }, 2000);
  _spotifyDevicePollTimer = setInterval(fetchSpotifyDevices, 15000);
  _spotifyNpPollTimer = setInterval(fetchSpotifyNowPlaying, 5000);
}
function stopSpotifyPolling() {
  if (_spotifyDevicePollTimer) { clearInterval(_spotifyDevicePollTimer); _spotifyDevicePollTimer = null; }
  if (_spotifyNpPollTimer) { clearInterval(_spotifyNpPollTimer); _spotifyNpPollTimer = null; }
}

function renderSpotifyDevices() {
  const el = document.getElementById('roaming-devices');
  if (!el) return;
  if (!hasSpotifyAuth()) {
    el.innerHTML = '<button class="spotify-connect-btn" onclick="spotifyAuth()">🎵 Connect with Spotify</button><p style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center;">Authenticates directly with Spotify</p>';
    return;
  }
  let html = '<div class="device-list">';
  if (spotifyDevices.length === 0) {
    html += '<p style="font-size:12px;color:var(--text-dim);padding:8px 0;">No devices found. Open Spotify on a device.</p>';
  } else {
    html += spotifyDevices.map(d => {
      const sel = d.id === spotifySelectedDeviceId;
      const stale = d._stale;
      return `<div class="device-item${sel ? ' active' : ''}" onclick="selectSpotifyDevice('${d.id}')" style="${stale?'opacity:0.5':''}">
        <div class="device-dot"></div>
        <div class="device-name">${esc(d.name)}${d.is_active && !stale ? ' <span style="color:var(--accent);font-size:10px;">● active</span>':''}${stale?' <span style="font-size:10px;">💤</span>':''}</div>
        <div class="device-type">${deviceIcon(d.type)} ${d.volume_percent != null ? d.volume_percent + '%' : ''}</div>
      </div>`;
    }).join('');
  }
  html += '</div>';
  html += '<button class="spotify-disconnect-btn" onclick="disconnectSpotify()">Disconnect Spotify</button>';
  el.innerHTML = html;
}

function selectSpotifyDevice(id) {
  spotifySelectedDeviceId = id;
  localStorage.setItem('ll_spotify_device', id);
  renderSpotifyDevices();
}

function disconnectSpotify() {
  ['spotify_access_token','spotify_refresh_token','spotify_token_expiry','spotify_pkce_verifier'].forEach(k => localStorage.removeItem(k));
  spotifyDevices = []; spotifySelectedDeviceId = null; spotifyNowPlaying = null;
  stopSpotifyPolling();
  renderRoamingPanel();
  showToast('Spotify disconnected');
}

function renderRoamingPanel() {
  renderNowPlayingRoaming();
  renderSpotifyDevices();
}

// ══════════════════════════════════════════════════════════════════════════════
// NOW PLAYING
// ══════════════════════════════════════════════════════════════════════════════
function getRepeatBadge() {
  // Check _playModes for any active repeat mode
  for (const [room, mode] of Object.entries(_playModes)) {
    if (mode === 'REPEAT_ONE' || mode === 'SHUFFLE_REPEAT_ONE') return '🔂';
    if (mode === 'REPEAT_ALL' || mode === 'SHUFFLE') return '🔁';
  }
  return '';
}

function renderNowPlayingSonos(h) {
  const el = document.getElementById('np-' + h);
  if (!el) return;
  const sse = _sseNowPlaying[h];
  const isLive = sse && (Date.now() - sse.ts) < 600000;

  // Find latest history item for this house
  let latestItem = null;
  if (allItems.length > 0) {
    latestItem = allItems.find(i => i.house === h && i.type === 'music');
  }

  let title = '—', artist = '—', label = 'No recent activity', isPlaying = false;
  let rooms = '';

  // Check published now_playing from data.json (bridge between SSE and history)
  const dataNp = data && data.now_playing && data.now_playing.house === h ? data.now_playing : null;
  const dataNpAge = dataNp ? Date.now() - new Date(dataNp.timestamp || dataNp.ts || 0).getTime() : Infinity;

  // Map service codes to display names
  function svcLabel(svc) {
    if (!svc) return '';
    const m = { 'sonos_spotify':'Spotify', 'sonos_apple_music':'Apple Music', 'sonos_qobuz':'Qobuz',
      'sonos_kcrw':'KCRW', 'sonos_kexp':'KEXP', 'spotify':'Spotify' };
    return m[svc] || svc.replace('sonos_','');
  }
  let svc = '';

  if (isLive) {
    title = sse.title || '—';
    artist = [sse.artist, sse.album].filter(Boolean).join(' · ');
    label = 'Now Playing';
    isPlaying = true;
    rooms = [...new Set(sse.rooms || [])].join(', ');
    svc = svcLabel(sse.service);
  } else if (dataNp && dataNpAge < 30 * 60000) {
    title = dataNp.title || '—';
    artist = [dataNp.artist, dataNp.album].filter(Boolean).join(' · ');
    if (dataNpAge < 5 * 60000) { label = 'Now Playing'; isPlaying = true; }
    else { label = 'Played ' + fmtAge(dataNpAge); }
    rooms = [...new Set(Array.isArray(dataNp.rooms) ? dataNp.rooms : (dataNp.room ? [dataNp.room] : []))].join(', ');
    svc = svcLabel(dataNp.service || dataNp.source);
  } else if (latestItem) {
    title = latestItem.title || '—';
    artist = [latestItem.artist, latestItem.album].filter(Boolean).join(' · ');
    const age = Date.now() - new Date(latestItem.timestamp).getTime();
    if (age < 30 * 60000) { label = 'Played ' + fmtAge(age); isPlaying = false; }
    else { label = 'Last played · ' + fmtAge(age); isPlaying = false; }
    rooms = [...new Set(Array.isArray(latestItem.rooms) ? latestItem.rooms : (latestItem.room ? [latestItem.room] : []))].join(', ');
    svc = svcLabel(latestItem.source);
  }

  const repeatBadge = isPlaying ? getRepeatBadge() : '';
  el.className = 'now-playing' + (isPlaying ? '' : ' np-stale');
  el.innerHTML = `
    <div class="np-indicator"></div>
    <div class="np-info">
      <div class="np-label">${esc(label)}${rooms ? ' · ' + esc(rooms) : ''}${svc ? ' · ' + esc(svc) : ''}${repeatBadge ? ' · ' + repeatBadge : ''}</div>
      <div class="np-track">${esc(title)}</div>
      <div class="np-artist">${esc(artist)}</div>
    </div>`;
}

  if (spotifyNowPlaying && spotifyNowPlaying.is_playing) {

        <div style="height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;"><div style="height:100%;background:var(--spotify);border-radius:2px;width:${pct}%"></div></div>

    el.className = 'now-playing np-stale';
    el.innerHTML = `
      <div class="np-indicator" style="background:var(--spotify);animation:none;"></div>
      <div class="np-info">
        <div class="np-label" style="color:#eab308;">⏸ Paused · ${esc(spotifyNowPlaying.device)}</div>

        <div class="np-artist">${esc(spotifyNowPlaying.artist)}</div>

        <div style="font-size:12px;color:var(--accent2);">🔊 Sonos is playing in ${esc([...new Set(_sseNowPlayingGlobal.rooms||[])].join(', '))}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${esc(_sseNowPlayingGlobal.title)} — ${esc(_sseNowPlayingGlobal.artist)}</div>
        <a href="#" onclick="setHouse('${_sseNowPlayingGlobal.house}');return false" style="font-size:11px;color:var(--accent2);display:inline-block;margin-top:3px;">Switch to ${esc(sonosHouse)} →</a>

    el.innerHTML = `

      <div class="np-info">
        <div class="np-label" style="color:var(--text-dim);">Spotify · Idle</div>
        <div class="np-track" style="color:var(--text-dim);">Nothing playing</div>
        <div class="np-artist">${hint}</div>
      </div>`;
  }
}

// STATUS BAR

function renderStatusBar() {
  const bar = document.getElementById('status-bar');
  if (!data || !data.client_status) { bar.innerHTML = ''; return; }
  const now = Date.now();
  const spinner = document.getElementById('load-spinner');
  let html = spinner ? spinner.outerHTML : '';
  html += data.client_status.map(c => {
    const age = c.last_seen ? Math.round((now - new Date(c.last_seen).getTime()) / 60000) : null;
    const cls = age === null ? 'red' : age < 10 ? 'green' : age < 30 ? 'yellow' : 'red';
    const label = c.client_id.replace('sonos_vashon','Vashon').replace('sonos_caphill','Cap Hill').replace('backup_','💾 ');
    return `<span style="white-space:nowrap"><span class="status-dot ${cls}"></span> ${esc(label)}</span>`;
  }).join('');
  bar.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════════════════════════════════
function mergeItems(head, archive) {
  if (!archive.length) return head;
  const keys = new Set(head.map(i => (i.timestamp||'') + '|' + (i.title||'').toLowerCase()));
  return [...head, ...archive.filter(i => !keys.has((i.timestamp||'') + '|' + (i.title||'').toLowerCase()))];
}

async function loadData(loadArchive) {
  const spinner = document.getElementById('load-spinner');
  if (spinner) spinner.style.display = 'inline-block';
  try {
    const r = await fetch(DATA_HEAD_URL + '?t=' + Date.now());
    data = await r.json();
    const headItems = data.items || [];
    allItems = mergeItems(headItems, archiveItems);
    renderAll();
  } catch(e) {
    document.getElementById('music-list').innerHTML = '<div class="empty-state">⚠️ Could not load data</div>';
  }
  if (spinner) spinner.style.display = 'none';

  if (loadArchive || !archiveLoaded) {
    try {
      const r2 = await fetch(DATA_FULL_URL + '?t=' + Date.now());
      const full = await r2.json();
      archiveItems = full.items || [];
      archiveLoaded = true;
      const headItems = data ? (data.items || []) : [];
      allItems = mergeItems(headItems, archiveItems);
      renderHistory();
      updateCounts();
    } catch(e) {}
  }
}

function renderAll() {
  renderStatusBar();
  updateCommander();
  // Seed _roomsPlaying from data
  _roomsPlaying = inferActiveRooms(house) || [];
  renderRooms(house);
  if (house === 'roaming') renderRoamingPanel();
  else renderNowPlayingSonos(house);
  renderHistory();
  renderPodcasts();
  renderDiscovery();
  updateCounts();
  if (data && data.generated_at) {
    document.getElementById('updated-label').textContent = 'Updated ' + fmtRelative(new Date(data.generated_at));
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// HISTORY RENDERING
// ══════════════════════════════════════════════════════════════════════════════
function getLocation(item) {
  const src = item.source || '';
  if (item.house === 'vashon') return { cls: 'vashon', label: '🏝 Vashon' };
  if (item.house === 'caphill') return { cls: 'caphill', label: '🏠 Cap Hill' };
  if (src === 'spotify' || src === 'spotify_teenbloods') return { cls: 'roaming', label: '📱 Roaming' };
  if (src.startsWith('sonos_')) return { cls: 'caphill', label: '🏠 Cap Hill' };
  return { cls: 'roaming', label: '📱 Roaming' };
}

function getSourceBadge(item) {
  const src = item.source || '';
  if (src.includes('spotify')) return 'Spotify';
  if (src.includes('apple')) return 'Apple Music';
  if (src.includes('qobuz')) return 'Qobuz';
  if (src.includes('kcrw')) return 'KCRW';
  if (src.includes('kexp')) return 'KEXP';
  if (src.includes('tunein') || src.includes('radio')) return 'Radio';
  return '';
}

function renderHistory() {
  const el = document.getElementById('music-list');
  const music = allItems.filter(i => i.type === 'music');
  if (music.length === 0) { el.innerHTML = '<div class="empty-state">🎧 No music history yet</div>'; return; }

  let html = '', lastDay = '';
  for (const item of music) {
    const dk = dayKey(item.timestamp);
    if (dk !== lastDay) {
      lastDay = dk;
      html += `<div class="day-header">${esc(dayLabel(item.timestamp))}</div>`;
    }
    const loc = getLocation(item);
    const badge = getSourceBadge(item);
    const rooms = Array.isArray(item.rooms) ? item.rooms.join(', ') : (item.room || '');
    // CRITICAL: encodeURIComponent does NOT encode single quotes — they break onclick='...' attributes.
    // Any track with an apostrophe (e.g. "School's Out") would silently fail without this .replace().
    const playData = encodeURIComponent(JSON.stringify({uri:item.uri||'',sonos_uri:item.sonos_uri||'',title:item.title,artist:item.artist||'',service:item.service||''})).replace(/'/g,'%27');
    const exploreData = encodeURIComponent(JSON.stringify({title:item.title,artist:item.artist,album:item.album,source:item.source,uri:item.uri||''})).replace(/'/g,'%27');

    html += `<div class="history-item">
      <div class="hi-time-col"><div class="hi-time">${fmtTime(item.timestamp)}</div></div>
      <div class="hi-info">
        <div class="hi-line1">
          <span class="hi-track">${esc(item.title)}</span>
          ${item.album ? '<span class="hi-sep">·</span><span class="hi-album">' + esc(item.album) + '</span>' : ''}
          ${item.artist ? '<span class="hi-sep">·</span><span class="hi-artist">' + esc(item.artist) + '</span>' : ''}
        </div>
        <div class="hi-line2">
          <span class="hi-location ${loc.cls}">${loc.label}</span>
          ${rooms ? '<span class="hi-rooms">' + esc(rooms) + '</span>' : ''}
          ${badge ? '<span class="hi-source-badge">' + esc(badge) + '</span>' : ''}
        </div>
      </div>
      <div class="hi-actions">
        <button class="action-btn" onclick="directPlay('play','${playData}')" title="Play">▶</button>
        <button class="action-btn" onclick="directPlay('queue','${playData}')" title="Queue">+</button>
        <button class="action-btn explore" onclick="exploreArtist(this,'${exploreData}')" title="Explore">🔍</button>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderPodcasts() {
  const el = document.getElementById('podcast-list');
  const pods = allItems.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0);
  if (pods.length === 0) { el.innerHTML = '<div class="empty-state">🎙 No podcasts yet</div>'; return; }

  let html = '', lastDay = '';
  for (const item of pods) {
    const dk = dayKey(item.timestamp);
    if (dk !== lastDay) {
      lastDay = dk;
      html += `<div class="day-header">${esc(dayLabel(item.timestamp))}</div>`;
    }
    const dur = item.duration_seconds ? Math.round(item.duration_seconds / 60) + ' min' : '';
    const pct = (item.progress_seconds && item.duration_seconds) ? Math.round(item.progress_seconds / item.duration_seconds * 100) : (item.percent_complete || 0);
    html += `<div class="podcast-item">
      <div class="podcast-icon">🎙</div>
      <div class="podcast-info">
        ${item.show_name ? '<div class="podcast-show">' + esc(item.show_name) + '</div>' : ''}
        <div class="podcast-title">${esc(item.title)}</div>
        <div class="podcast-meta">${fmtTime(item.timestamp)}${dur ? ' · ' + dur : ''}</div>
        ${pct > 0 ? '<div class="podcast-progress"><div class="podcast-progress-fill" style="width:' + pct + '%"></div></div>' : ''}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function updateCounts() {
  const music = allItems.filter(i => i.type === 'music').length;
  const pods = allItems.filter(i => i.type === 'podcast' && (i.duration_seconds || 0) > 0).length;
  document.getElementById('cnt-music').textContent = music || '';
  document.getElementById('cnt-podcasts').textContent = pods || '';
}

// ══════════════════════════════════════════════════════════════════════════════
// DISCOVERY LOG RENDERING
// ══════════════════════════════════════════════════════════════════════════════
function renderDiscovery() {
  const el = document.getElementById('discovery-list');
  if (!data || !data.play_commands || data.play_commands.length === 0) {
    el.innerHTML = '<div class="empty-state">🔍 No discoveries yet</div>';
    return;
  }
  const cmds = data.play_commands;
  // Stat line
  const lastDate = new Date(cmds[0].timestamp);
  const statLine = `${cmds.length} artists explored · last on ${lastDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} at ${fmtTime(cmds[0].timestamp)}`;
  let html = `<div class="discovery-stat">${esc(statLine)}</div>`;

  for (let i = 0; i < cmds.length; i++) {
    const cmd = cmds[i];
    const isOpen = i < 3;
    const d = new Date(cmd.timestamp);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    // Separate source_track from regular suggestions
    const allSuggs = cmd.suggestions || [];
    const sourceTrack = allSuggs.find(s => s.type === 'source_track');
    const regularSuggs = allSuggs.filter(s => s.type !== 'source_track');
    const suggCount = regularSuggs.length;

    // Use source track label for "from" text instead of "Exploring: Artist"
    const fromText = sourceTrack ? sourceTrack.label : cmd.title;

    html += `<div class="discovery-card${isOpen ? ' open' : ''}" id="disc-${i}">`;
    html += `<div class="disc-header" onclick="document.getElementById('disc-${i}').classList.toggle('open')">`;
    html += `<div class="disc-artist-badge">${esc(cmd.artist || cmd.title)}</div>`;
    html += `<div class="disc-hinfo">`;
    html += `<div class="disc-meta">from ${esc(fromText)} · ${dateStr}${suggCount ? ' · ' + suggCount + ' suggestions' : ''}</div>`;
    html += `</div><div class="disc-expand">›</div></div>`;

    // Body
    html += '<div class="disc-body">';

    // Source track — the launch point
    if (sourceTrack) {
      const stUri = (sourceTrack.uri || '').replace(/'/g, "\\'");
      const stLbl = (sourceTrack.label || '').replace(/'/g, "\\'");
      html += `<div class="disc-source-track">
        <div class="disc-source-icon">🎵</div>
        <div class="disc-source-info">
          <span class="disc-source-label">Started from</span>
          <span class="disc-source-title">${esc(sourceTrack.label)}</span>
        </div>
        <div class="sugg-actions">
          ${sourceTrack.uri ? `<button class="sugg-btn sugg-btn-play" onclick="playDiscovery('play','${stUri}','${stLbl}')">▶</button>
          <button class="sugg-btn sugg-btn-queue" onclick="playDiscovery('queue','${stUri}','${stLbl}')">+</button>` : ''}
        </div>
      </div>`;
    }

    if (cmd.narrative) {
      html += `<div class="disc-narrative">${formatNarrative(cmd.narrative)}</div>`;
    }

    if (regularSuggs.length > 0) {
      let currentSection = '';
      for (const s of regularSuggs) {
        // Detect section from label prefix
        const section = s.label && s.label.startsWith('🎛') ? 'Related Artists' :
                        s.label && s.label.startsWith('🤝') ? 'Related Artists' :
                        s.label && s.label.startsWith('📻') ? 'Related Artists' :
                        'By ' + esc(cmd.artist || cmd.title);
        if (section !== currentSection) {
          currentSection = section;
          html += `<div class="suggestion-section-label">${section}</div>`;
        }
        const uri = (s.uri || '').replace(/'/g, "\\'");
        const lbl = (s.label || '').replace(/'/g, "\\'");
        html += `<div class="suggestion-item">
          <div class="suggestion-info">
            <div class="suggestion-title">${esc(s.label)}</div>
            ${s.note ? '<div class="suggestion-detail">' + esc(s.note) + '</div>' : ''}
          </div>
          <div class="sugg-actions">
            <button class="sugg-btn sugg-btn-play" onclick="playDiscovery('play','${uri}','${lbl}')">▶</button>
            <button class="sugg-btn sugg-btn-queue" onclick="playDiscovery('queue','${uri}','${lbl}')">+</button>
          </div>
        </div>`;
      }
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function formatNarrative(text) {
  // Bold **text** and italic *text*
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ══════════════════════════════════════════════════════════════════════════════
// DIRECT PLAY / QUEUE / EXPLORE
// ══════════════════════════════════════════════════════════════════════════════
async function directPlay(action, encodedData) {
  const info = JSON.parse(decodeURIComponent(encodedData));
  let uri = info.uri;

  // --- SONOS PATH (Cap Hill / Vashon) ---
  if (house !== 'roaming') {
    const rooms = (selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms();
    if (!rooms.length) { showToast('No rooms selected', true); return; }

    // [DESIGN NOTE] play_next handles ALL services (Spotify, Qobuz, Apple Music).
    // Service-side: Spotify URIs use ShareLinkPlugin, raw Sonos URIs use add_uri_to_queue.
    // Queue is preserved in all cases — play_uri (destructive) is no longer used from UI.
    // Priority: sonos_uri > spotify URI > Spotify search fallback.
    const playUri = info.sonos_uri || uri;
    if (!playUri) {
      // No URI at all — try Spotify search as last resort
      const token = await getSpotifyToken();
      if (!token) { showToast('Open Controller to connect Spotify', true); return; }
      showToast('Searching...');
      try {
        const q = [info.artist, info.title].filter(Boolean).join(' ');
        const r = await spotifyApi('GET', '/search?type=track&limit=1&q=' + encodeURIComponent(q));
        uri = r?.tracks?.items?.[0]?.uri;
        if (!uri) { showToast('Not found on Spotify', true); return; }
      } catch(e) { showToast('Search failed', true); return; }
    }
    const finalUri = playUri || uri;
    const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_next';
    await postNtfy({ action: ntfyAction, uri: finalUri, title: info.title || '', rooms, target_client_id: commanderId });
    showToast('✓ ' + (action === 'queue' ? 'Queued' : 'Playing') + ': ' + (info.title || '') + ' → ' + rooms.join(', '));
    return;
  }

  // --- ROAMING PATH (Spotify Connect) ---
  // For Roaming, need a Spotify URI — search if we don't have one
  if (!uri) {
    const token = await getSpotifyToken();
    if (!token) { showToast('Open Controller to connect Spotify', true); return; }
    showToast('Searching...');
    try {
      const q = [info.artist, info.title].filter(Boolean).join(' ');
      const r = await spotifyApi('GET', '/search?type=track&limit=1&q=' + encodeURIComponent(q));
      uri = r?.tracks?.items?.[0]?.uri;
      if (!uri) { showToast('Not found on Spotify', true); return; }
    } catch(e) { showToast('Search failed', true); return; }
  }
  if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
  const dp = spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : '';
  try {
    if (action === 'queue') {
      await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
      showToast('✓ Queued: ' + (info.title || ''));
    } else {
      await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
      await new Promise(r => setTimeout(r, 300));
      await spotifyApi('POST', '/me/player/next');
      showToast('✓ Playing: ' + (info.title || ''));
    }
    setTimeout(fetchSpotifyNowPlaying, 1000);
  } catch(e) { showToast('✗ ' + e.message, true); }
}

async function playDiscovery(action, uri, label) {
  if (!uri) { showToast('No URI', true); return; }

  if (house === 'roaming') {
    if (!hasSpotifyAuth()) { showToast('Connect Spotify first', true); return; }
    try {
      if (action === 'queue' && uri.includes(':track:')) {
        const dp = spotifySelectedDeviceId ? '&device_id=' + spotifySelectedDeviceId : '';
        await spotifyApi('POST', '/me/player/queue?uri=' + encodeURIComponent(uri) + dp);
        showToast('✓ Queued: ' + label);
      } else {
        const dpQ = spotifySelectedDeviceId ? '?device_id=' + spotifySelectedDeviceId : '';
        const body = uri.includes(':track:') ? { uris: [uri] } : { context_uri: uri };
        await spotifyApi('PUT', '/me/player/play' + dpQ, body);
        showToast('✓ Playing: ' + label);
      }
      setTimeout(fetchSpotifyNowPlaying, 1000);
    } catch(e) { showToast('✗ ' + e.message, true); }
    return;
  }

  // Sonos
  const rooms = (selectedRooms[house] || []).length > 0 ? selectedRooms[house] : inferActiveRooms();
  if (!rooms.length) { showToast('No rooms selected', true); return; }
  const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_spotify_uri';
  await postNtfy({ action: ntfyAction, uri, rooms, target_client_id: commanderId });
  showToast('✓ ' + label + ' → ' + rooms.join(', '));
}

async function exploreArtist(btn, encodedData) {
  const trackData = JSON.parse(decodeURIComponent(encodedData));
  btn.classList.add('exploring');
  btn.textContent = '⏳';
  try {
    await fetch(EXPLORE_WEBHOOK, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(trackData)
    });
    btn.textContent = '✓'; btn.classList.remove('exploring');
    setTimeout(() => { btn.textContent = '🔍'; }, 3000);
  } catch(e) {
    btn.textContent = '✗'; btn.classList.remove('exploring');
    setTimeout(() => { btn.textContent = '🔍'; }, 3000);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SYNC
// ══════════════════════════════════════════════════════════════════════════════
async function syncNow() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Syncing...'; btn.disabled = true; btn.style.opacity = '0.6';
  try {
    await fetch(SYNC_WEBHOOK, { method: 'POST', mode: 'no-cors' });
    btn.textContent = '✓ Syncing...'; btn.style.color = 'var(--accent)';
    setTimeout(async () => {
      await loadData(true);
      btn.textContent = '↻ Sync Spotify'; btn.style.color = ''; btn.style.opacity = '1'; btn.disabled = false;
    }, 35000);
  } catch(e) {
    btn.textContent = '↻ Sync Spotify'; btn.style.color = ''; btn.style.opacity = '1'; btn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
function setContentTab(tab) {
  document.querySelectorAll('.content-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-history').hidden = tab !== 'history';
  document.getElementById('tab-discovery').hidden = tab !== 'discovery';
}

function setSubTab(sub) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('active', t.dataset.subtab === sub));
  document.getElementById('subtab-music').hidden = sub !== 'music';
  document.getElementById('subtab-podcasts').hidden = sub !== 'podcasts';
}

// ══════════════════════════════════════════════════════════════════════════════
// SSE (Real-time from ntfy)
// ══════════════════════════════════════════════════════════════════════════════
function connectSSE() {
  if (_sseSource) { try { _sseSource.close(); } catch(e) {} }
  _sseSource = new EventSource(NTFY_UI_SSE + '?since=5m');
  _sseLastMsg = Date.now();
  _sseSource.addEventListener('message', (e) => {
    _sseLastMsg = Date.now();
    try {
      const outer = JSON.parse(e.data);
      if (!outer.message) return;
      const msg = JSON.parse(outer.message);
      // Infer house from msg.house OR ntfy topic name
      let sseHouse = msg.house || null;
      if (!sseHouse && outer.topic) {
        if (outer.topic.includes('caphill')) sseHouse = 'caphill';
        else if (outer.topic.includes('vashon')) sseHouse = 'vashon';
      }

      // Helper: retire a track from Now Playing into history list
      function retireTrackToHistory(track, h) {
        if (!track || !track.title || allItems.length === 0) return;
        const endedItem = {
          type: 'music', title: track.title, artist: track.artist||'', album: track.album||'',
          source: track.service ? 'sonos_' + track.service.replace('sonos_','') : 'sonos',
          timestamp: new Date().toISOString(),
          domain: (track.rooms||[]).join(', '), house: h||house,
          uri: track.uri||'', sonos_uri: track.uri||'', _fromSSE: true
        };
        // Dedup: don't prepend if top item is same track within last 2 min
        const top = allItems[0];
        if (!(top && top.title === endedItem.title && top.artist === endedItem.artist &&
              Math.abs(new Date(top.timestamp) - new Date(endedItem.timestamp)) < 120000)) {
          allItems.unshift(endedItem);
          renderHistory();
        }
      }

      // v1.70 bundled SSE: messages have "events" array (new) or "event" string (old)
      const events = msg.events || (msg.event ? [msg.event] : []);

      // --- Handle now_playing ---
      if (events.includes('now_playing')) {
        if (_trackEndedTimer) { clearTimeout(_trackEndedTimer); _trackEndedTimer = null; }
        if (sseHouse && _sseNowPlaying[sseHouse] && !_sseNowPlaying[sseHouse]._fromStatus) {
          retireTrackToHistory(_sseNowPlaying[sseHouse], sseHouse);
        }
        _sseNowPlayingGlobal = { title: msg.title, artist: msg.artist, album: msg.album, rooms: [...new Set(msg.rooms||[])], house: sseHouse, service: msg.service||'', uri: msg.uri||'', ts: Date.now() };
        if (sseHouse) {
          _sseNowPlaying[sseHouse] = { title: msg.title, artist: msg.artist, album: msg.album, rooms: [...new Set(msg.rooms||[])], service: msg.service||'', uri: msg.uri||'', ts: Date.now() };
          if (sseHouse === house) {
            renderNowPlayingSonos(house);
            if (msg.rooms && msg.rooms.length > 0 && !_userManualRoomSelect[house]) {
              selectedRooms[house] = [...msg.rooms];
              localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms[house]));
              renderRooms(house);
            }
          }
        }
        if (house === 'roaming') renderNowPlayingRoaming();
      }

      // --- Handle stopped ---
      if (events.includes('stopped') || events.includes('track_ended')) {
        if (sseHouse && _sseNowPlaying[sseHouse] && !_sseNowPlaying[sseHouse]._fromStatus) {
          retireTrackToHistory(_sseNowPlaying[sseHouse], sseHouse);
        }
        if (_trackEndedTimer) clearTimeout(_trackEndedTimer);
        _trackEndedTimer = setTimeout(() => {
          _trackEndedTimer = null;
          _sseNowPlayingGlobal = null;
          if (sseHouse) { delete _sseNowPlaying[sseHouse]; if (sseHouse === house) renderNowPlayingSonos(house); }
          if (house === 'roaming') renderNowPlayingRoaming();
        }, 3000);
      }

      // --- Always process state fields (every bundled message is a full snapshot) ---
      if (msg.play_modes !== undefined) _playModes = msg.play_modes;
      if (sseHouse && msg.rooms_playing) {
        if (sseHouse === house) {
          _roomsPlaying = [...msg.rooms_playing];
          if (!_userManualRoomSelect[house] && msg.rooms_playing.length > 0) {
            selectedRooms[house] = [...msg.rooms_playing];
            localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms[house]));
            renderRooms(house);
          }
        }
      }

      // --- Opportunistic now-playing from now_playing_tracks (status/snapshot) ---
      if (msg.now_playing_tracks && msg.now_playing_tracks.length > 0 && !events.includes('now_playing')) {
        const t = msg.now_playing_tracks[0];
        const h = sseHouse || house;
        if (!_sseNowPlaying[h]) {
          _sseNowPlaying[h] = { title: t.title||'', artist: t.artist||'', album: t.album||'',
            rooms: [...new Set(msg.now_playing_tracks.map(x=>x.rooms||[]).flat())], uri: t.uri||'', ts: Date.now(), _fromStatus: true };
          if (h === house) renderNowPlayingSonos(house);
        }
        if (!_sseNowPlayingGlobal) {
          _sseNowPlayingGlobal = { ..._sseNowPlaying[h], house: h };
          if (house === 'roaming') renderNowPlayingRoaming();
        }
      }

      // --- Update status dot ---
      if (msg.client_id && data && data.client_status) {
        const c = data.client_status.find(s => s.client_id === msg.client_id);
        if (c) { c.last_seen = new Date().toISOString(); if (msg.version) c.version = msg.version; }
        renderStatusBar();
      }
    } catch(err) {}
  });
}

// SSE watchdog + reconnect
setInterval(() => { if (Date.now() - _sseLastMsg > 120000) connectSSE(); }, 30000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    connectSSE();
    loadData(false);  // v1.65: refresh data-head.json on page foreground (mobile Safari kills setInterval)
    if (house === 'roaming' && hasSpotifyAuth()) { fetchSpotifyDevices(); fetchSpotifyNowPlaying(); }
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// DEEP LINK HANDLER (from controller.html)
// ══════════════════════════════════════════════════════════════════════════════
function handleDeepLink() {
  const p = new URLSearchParams(location.search);
  const action = p.get('action');
  const uri = p.get('uri');
  const label = p.get('label') || '';
  if (!action || !uri) return;
  const dlHouse = p.get('house');
  if (dlHouse && dlHouse !== house) setHouse(dlHouse);
  history.replaceState({}, '', location.pathname);

  // Auto-execute
  setTimeout(async () => {
    if (house === 'roaming') {
      if (action === 'queue') await playDiscovery('queue', uri, label);
      else await playDiscovery('play', uri, label);
    } else {
      const rooms = (selectedRooms[house]||[]).length > 0 ? selectedRooms[house] : inferActiveRooms();
      if (!rooms.length) { showToast('No rooms', true); return; }
      const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_spotify_uri';
      await postNtfy({ action: ntfyAction, uri, rooms, target_client_id: commanderId });
      showToast('✓ ' + decodeURIComponent(label) + ' → ' + rooms.join(', '));
    }
  }, 500);
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
(async () => {
  // Handle Spotify OAuth callback FIRST (before anything else)
  const didAuth = await handleSpotifyCallback();
  setHouse(house);
  connectSSE();
  await loadData(true);
  if (!didAuth) handleDeepLink();
  // Auto-refresh head every 60s
  setInterval(() => loadData(false), 60000);
})();

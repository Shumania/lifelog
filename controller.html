<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sonos Control">
  <title>Sonos Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; }
    .sticky-header { position: sticky; top: 0; background: #0f1117; z-index: 10; padding-top: env(safe-area-inset-top); }
    .bottom-pad { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
    .dot-green  { background: #4ade80; }
    .dot-yellow { background: #facc15; }
    .dot-red    { background: #f87171; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary { background: #3b82f6; color: #fff; border-radius: 10px; padding: 10px 20px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: none; }
    .btn-primary:active { background: #2563eb; }
    .btn-secondary { background: #1e2130; border: 1px solid #2d3148; color: #94a3b8; border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:active { background: #252840; }
    .btn-danger { background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5; border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-icon { background: #1e2130; border: 1px solid #2d3148; border-radius: 10px; padding: 10px 14px; font-size: 18px; cursor: pointer; transition: all 0.15s; }
    .btn-icon:active { background: #252840; }
    .room-chip { display: inline-flex; align-items: center; gap: 4px; background: #1e3a5f; border: 1px solid #2a4a7f; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #93c5fd; }
    .now-playing-bar { background: linear-gradient(135deg, #1a2a4a, #1a1d2e); border: 1px solid #2a3a5a; border-radius: 12px; }
    .discovery-entry { background: #1e2130; border: 1px solid #2d3148; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .discovery-title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
    .discovery-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .discovery-narrative { font-size: 12.5px; color: #94a3b8; line-height: 1.5; margin-top: 8px; }
    .discovery-suggestions-header { font-size: 11px; font-weight: 600; color: #7c8baa; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 6px; }
    .suggestion-item { background: #1a2235; border: 1px solid #2d3148; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
    .suggestion-play { display: flex; align-items: center; justify-content: space-between; }
    .suggestion-label { font-size: 13px; font-weight: 600; color: #93c5fd; cursor: pointer; }
    .suggestion-label:active { color: #bfdbfe; }
    .suggestion-note { font-size: 11.5px; color: #7c8baa; line-height: 1.4; margin-top: 4px; }
    .suggestion-chip { display: inline-block; background: #1a2a4a; border: 1px solid #2a4a7f; border-radius: 16px; padding: 3px 10px; font-size: 11px; color: #93c5fd; margin: 3px 3px 0 0; text-decoration: none; cursor: pointer; transition: all 0.15s; }
    .suggestion-chip:active { background: #2a3a6a; }
    .action-banner { background: linear-gradient(135deg, #1a3a1a, #1a1d2e); border: 1px solid #2a5a2a; border-radius: 12px; animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .vol-btn { background: #1e2130; border: 1px solid #2d3148; border-radius: 8px; padding: 8px 18px; font-size: 16px; font-weight: 700; cursor: pointer; color: #94a3b8; transition: all 0.15s; }
    .vol-btn:active { background: #252840; }
    select { background: #1e2130; border: 1px solid #2d3148; color: #e2e8f0; border-radius: 8px; padding: 6px 10px; font-size: 14px; }
    .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 50%; transform: translateX(-50%); background: #1a3a1a; border: 1px solid #4ade80; color: #4ade80; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; z-index: 100; transition: opacity 0.4s; white-space: nowrap; }
    .toast.error { background: #3a1a1a; border-color: #f87171; color: #f87171; }
    .house-toggle { display: flex; gap: 2px; background: #1e2130; border-radius: 10px; padding: 3px; }
    .house-btn { border-radius: 8px; padding: 5px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; color: #64748b; background: transparent; }
    .house-btn.active { background: #3b82f6; color: #fff; }
    .progress-bar { background: #2d3148; border-radius: 3px; height: 3px; overflow: hidden; }
    .progress-fill { background: #3b82f6; height: 100%; transition: width 0.5s; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Toast notification -->
<div id="toast" class="toast" style="display:none;opacity:0;"></div>

<div class="sticky-header px-4 pb-3 pt-3">
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-lg font-bold text-white">🔊 Sonos</h1>
      <p id="status-line" class="text-xs text-slate-500 mt-0.5">Loading…</p>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="loadData(true)" class="text-xs text-slate-500 hover:text-slate-300 px-2 py-1 rounded border border-slate-700" title="Refresh">🔄</button>
      <a href="index.html" class="text-xs text-slate-400 underline font-medium">📖 Life History</a>
      <div id="load-indicator" class="spinner" style="display:none"></div>
    </div>
  </div>

  <!-- House toggle -->
  <div class="house-toggle mb-3" id="house-toggle">
    <button class="house-btn active" id="btn-caphill" onclick="setHouse('caphill')">🏠 Cap Hill</button>
    <button class="house-btn" id="btn-vashon" onclick="setHouse('vashon')">🏝️ Vashon</button>
  </div>
</div>

<div class="px-4 bottom-pad space-y-3">

  <!-- Deep link action banner (hidden by default) -->
  <div id="action-banner" class="action-banner p-4" style="display:none">
    <div class="flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p class="text-xs text-green-400 font-semibold mb-1" id="banner-action-label">▶ Add to queue</p>
        <p class="text-sm font-bold text-white truncate" id="banner-label">Track name</p>
        <p class="text-xs text-slate-400 mt-1">Sending to: <span id="banner-rooms" class="text-blue-300"></span></p>
      </div>
      <div class="flex flex-col gap-2">
        <button class="btn-primary text-sm px-4 py-2" id="banner-go-btn" onclick="executeBannerAction()">Send ✓</button>
        <button class="btn-secondary text-xs px-3 py-1" onclick="dismissBanner()">Cancel</button>
      </div>
    </div>
    <div id="banner-countdown" class="text-xs text-slate-500 mt-2"></div>
  </div>

  <!-- Now playing -->
  <div class="now-playing-bar p-4">
    <p class="text-xs text-blue-300 font-semibold mb-2" id="now-playing-label">NOW PLAYING</p>
    <div id="now-playing-content">
      <p class="text-sm text-slate-500">Nothing playing recently</p>
    </div>
    <div id="active-rooms" class="flex flex-wrap gap-1 mt-2"></div>
  </div>

  <!-- Transport controls -->
  <div class="card p-4">
    <p class="text-xs text-slate-500 font-semibold mb-3 uppercase tracking-wide">Controls</p>
    <div class="flex gap-2 justify-center mb-3">
      <button class="btn-icon" onclick="sendCmd('prev')" title="Previous">⏮</button>
      <button class="btn-icon" onclick="sendCmd('pause')" title="Pause/Play">⏸</button>
      <button class="btn-icon" onclick="sendCmd('play')" title="Play">▶️</button>
      <button class="btn-icon" onclick="sendCmd('next')" title="Skip">⏭</button>
    </div>
    <div class="flex items-center gap-2 justify-center">
      <button class="vol-btn" onclick="sendCmd('volume_down')">－</button>
      <span class="text-xs text-slate-500 w-16 text-center" id="vol-label">Volume</span>
      <button class="vol-btn" onclick="sendCmd('volume_up')">＋</button>
    </div>
  </div>

  <!-- Room selector -->
  <div class="card p-4">
    <p class="text-xs text-slate-500 font-semibold mb-2 uppercase tracking-wide">Target Rooms</p>
    <p class="text-xs text-slate-600 mb-3" id="rooms-inferred-label">Auto-detected from recent play history</p>
    <div id="room-checkboxes" class="space-y-1"></div>
    <button class="btn-secondary text-xs mt-3 w-full" onclick="resetRooms()">↺ Reset to active rooms</button>
  </div>

  <!-- Machine status -->
  <div class="card p-4">
    <p class="text-xs text-slate-500 font-semibold mb-2 uppercase tracking-wide">Service Status</p>
    <div id="machine-status" class="space-y-1 text-xs text-slate-400">Loading…</div>
  </div>

  <!-- Discovery Log -->
  <div class="card p-4">
    <p class="text-xs text-slate-500 font-semibold mb-2 uppercase tracking-wide">🎵 Discovery Log</p>
    <p class="text-xs text-slate-600 mb-3">Plays from Tasklet with recommendations to explore</p>
    <div id="discovery-log" class="space-y-0">Loading…</div>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const NTFY = {
  caphill: 'https://ntfy.sh/lifelog-cmd-caphill-4x8m',
  vashon:  'https://ntfy.sh/lifelog-cmd-vashon-9k3p'
};
const DATA_URL = 'https://shumania.github.io/lifelog/data.json';
const ROOMS = {
  caphill: ['Backyard','Basement Study','Dining Room','Kitchen','Living Room','Master Bathroom','Master Bedroom','Media Room','Study Computer Playbar'],
  vashon:  ['Garage Living Room','Main Living Room Maury','Main Kitchen Green Move 2','Main Upstairs Bathroom White Roams','Main Upstairs Master Bedroom','Shed Arc','Shed Boombox','Main Lower Deck','Sauna Porch','Main Upstairs Second Bedroom','Media Room']
};
const INFER_WINDOW_MIN = 120;
const POLL_INTERVAL_MS = 30000;

// ── State ────────────────────────────────────────────────────────────────────
let house = localStorage.getItem('ll_house') || 'caphill';
let selectedRooms = JSON.parse(localStorage.getItem('ll_rooms_' + house) || '[]');
let commanderId = null;
let bannerAction = null;
let bannerCountdownTimer = null;
let data = null;
let lastETag = null;
let optimisticNowPlaying = null;    // {label, room, ts} — set after sending a command
let optimisticActiveRooms = null;   // {rooms: [...], ts} — set after play command fires
let postCommandRefreshTimer = null;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  renderHouseToggle();
  await loadData(true);
  handleDeepLink();
  setInterval(() => loadData(false), POLL_INTERVAL_MS);
});

// force=true skips ETag check and always re-renders
async function loadData(force = false) {
  document.getElementById('load-indicator').style.display = 'inline-block';
  try {
    const headers = {};
    if (!force && lastETag) headers['If-None-Match'] = lastETag;
    if (force) {
      headers['Cache-Control'] = 'no-cache';
      headers['Pragma'] = 'no-cache';
    }

    const fetchOptions = force ? { headers, cache: 'no-store' } : { headers };
    const r = await fetch(DATA_URL + '?t=' + Date.now(), fetchOptions);

    if (r.status === 304) {
      // Not modified — update label but skip re-render
      document.getElementById('status-line').textContent =
        'Updated ' + fmtRelative(new Date(data.generated_at || Date.now())) + ' · no change';
      document.getElementById('load-indicator').style.display = 'none';
      return;
    }

    const etag = r.headers.get('ETag');
    if (etag) lastETag = etag;

    data = await r.json();
    renderNowPlaying();
    renderMachineStatus();
    inferAndRenderRooms();
    renderDiscoveryLog();
    document.getElementById('status-line').textContent =
      'Updated ' + fmtRelative(new Date(data.generated_at || Date.now()));
  } catch(e) {
    document.getElementById('status-line').textContent = 'Failed to load data';
  }
  document.getElementById('load-indicator').style.display = 'none';
}

// Schedule a refresh N ms from now, cancelling any pending one
function scheduleRefresh(ms) {
  if (postCommandRefreshTimer) clearTimeout(postCommandRefreshTimer);
  postCommandRefreshTimer = setTimeout(() => loadData(true), ms);
}

// ── House ─────────────────────────────────────────────────────────────────────
function setHouse(h) {
  house = h;
  localStorage.setItem('ll_house', h);
  selectedRooms = JSON.parse(localStorage.getItem('ll_rooms_' + house) || '[]');
  renderHouseToggle();
  inferAndRenderRooms();
  renderMachineStatus();
  updateCommander();
}

function renderHouseToggle() {
  ['caphill','vashon'].forEach(h => {
    document.getElementById('btn-' + h).className = 'house-btn' + (h === house ? ' active' : '');
  });
}

// ── Commander ─────────────────────────────────────────────────────────────────
function updateCommander() {
  if (!data || !data.client_status) return;
  const cmdr = data.client_status.find(c => c.house === house && c.sonos_commander);
  commanderId = cmdr ? cmdr.client_id : null;
}

// ── Room inference ────────────────────────────────────────────────────────────
function inferActiveRooms() {
  const cutoff = Date.now() - INFER_WINDOW_MIN * 60 * 1000;
  const rooms = new Set();

  // 1. Server-side now_playing rooms (persisted across sessions, highest priority)
  const serverNpForRooms = data && data.now_playing;
  if (serverNpForRooms && Array.isArray(serverNpForRooms.rooms)) {
    const npTs = new Date(serverNpForRooms.played_at).getTime();
    if (npTs > cutoff) {
      for (const r of serverNpForRooms.rooms) rooms.add(r);
    }
  }

  // 2. Optimistic rooms from play command sent in this browser session (within 2h)
  if (optimisticActiveRooms && optimisticActiveRooms.ts > cutoff) {
    for (const r of optimisticActiveRooms.rooms) rooms.add(r);
  }

  if (data && data.items) {
    for (const item of data.items) {
      if (!item.room || !item.house) continue;
      if (item.house !== house) continue;
      const ts = new Date(item.timestamp).getTime();
      if (ts < cutoff) break;
      rooms.add(item.room);
    }
  }
  return [...rooms];
}

function inferAndRenderRooms() {
  const inferred = inferActiveRooms();
  if (selectedRooms.length === 0 && inferred.length > 0) {
    selectedRooms = inferred;
  }
  renderRoomCheckboxes();
  updateCommander();
}

function resetRooms() {
  const inferred = inferActiveRooms();
  selectedRooms = inferred.length > 0 ? inferred : [];
  localStorage.removeItem('ll_rooms_' + house);
  renderRoomCheckboxes();
  showToast('Rooms reset to active');
}

function renderRoomCheckboxes() {
  const container = document.getElementById('room-checkboxes');
  const all = ROOMS[house] || [];
  const inferred = inferActiveRooms();
  container.innerHTML = all.map(room => {
    const checked = selectedRooms.includes(room);
    const isActive = inferred.includes(room);
    return `<label class="flex items-center gap-2 cursor-pointer py-0.5">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleRoom('${room.replace(/'/g,"\\'")}', this.checked)"
        class="w-4 h-4 rounded accent-blue-500">
      <span class="text-sm ${isActive ? 'text-blue-300 font-semibold' : 'text-slate-400'}">${room}${isActive ? ' 🔊' : ''}</span>
    </label>`;
  }).join('');

  const label = inferred.length > 0
    ? `Active last 2h: ${inferred.join(', ')}`
    : 'No recent play activity detected';
  document.getElementById('rooms-inferred-label').textContent = label;
}

function toggleRoom(room, checked) {
  if (checked) { if (!selectedRooms.includes(room)) selectedRooms.push(room); }
  else { selectedRooms = selectedRooms.filter(r => r !== room); }
  localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms));
}

// ── Now playing ───────────────────────────────────────────────────────────────
function renderNowPlaying() {
  if (!data || !data.items) return;
  const sonosItems = data.items.filter(i => i.house === house && i.room);
  const latest = sonosItems[0];
  const npEl = document.getElementById('now-playing-content');
  const roomsEl = document.getElementById('active-rooms');
  const labelEl = document.getElementById('now-playing-label');

  // Priority: 1) optimisticNowPlaying (client-side, from this session's play command)
  //           2) data.now_playing (server-side, persisted across sessions)
  //           3) latest sonosItem from history
  const latestTs = latest ? new Date(latest.timestamp).getTime() : 0;
  const serverNp = data && data.now_playing;
  const serverNpTs = serverNp ? new Date(serverNp.played_at).getTime() : 0;
  const optTs = optimisticNowPlaying ? optimisticNowPlaying.ts : 0;

  const useOptimistic = optTs > latestTs && optTs > serverNpTs;
  const useServerNp = !useOptimistic && serverNp && serverNpTs > latestTs;

  let item = null;
  if (useOptimistic) {
    item = {
      title: optimisticNowPlaying.label,
      artist: optimisticNowPlaying.artist || '',
      album: '',
      timestamp: new Date(optimisticNowPlaying.ts).toISOString(),
      room: optimisticNowPlaying.room
    };
  } else if (useServerNp) {
    item = {
      title: serverNp.title || serverNp.label || '',
      artist: serverNp.artist || '',
      album: serverNp.type === 'album' ? serverNp.title : '',
      timestamp: serverNp.played_at,
      room: Array.isArray(serverNp.rooms) ? serverNp.rooms.join(' · ') : (serverNp.rooms || '')
    };
  } else {
    item = latest;
  }

  if (!item) {
    npEl.innerHTML = '<p class="text-sm text-slate-500">Nothing playing recently</p>';
    roomsEl.innerHTML = '';
    labelEl.textContent = 'NOW PLAYING';
    labelEl.className = 'text-xs text-blue-300 font-semibold mb-2';
    return;
  }

  const minAgo = Math.floor((Date.now() - new Date(item.timestamp).getTime()) / 60000);

  if (useOptimistic || useServerNp) {
    labelEl.textContent = '▶ NOW PLAYING';
    labelEl.className = 'text-xs text-green-400 font-semibold mb-2';
  } else if (minAgo < 15) {
    labelEl.textContent = 'NOW PLAYING';
    labelEl.className = 'text-xs text-green-400 font-semibold mb-2';
  } else if (minAgo < 120) {
    labelEl.textContent = 'RECENTLY PLAYED · ' + fmtRelative(new Date(item.timestamp));
    labelEl.className = 'text-xs text-blue-300 font-semibold mb-2';
  } else {
    labelEl.textContent = 'LAST PLAYED · ' + fmtRelative(new Date(item.timestamp));
    labelEl.className = 'text-xs text-slate-500 font-semibold mb-2';
  }

  npEl.innerHTML = `
    <p class="text-base font-bold text-white leading-tight">${esc(item.title)}</p>
    <p class="text-sm text-slate-300">${esc(item.artist || '')}</p>
    <p class="text-xs text-slate-500 mt-0.5">${esc(item.album || '')}${item.album && item.room ? ' · ' : ''}${esc(item.room || '')} · ${fmtRelative(new Date(item.timestamp))}</p>
  `;

  const inferred = inferActiveRooms();
  const displayRooms = useOptimistic && item.room ? [item.room] : inferred;
  roomsEl.innerHTML = displayRooms.map(r =>
    `<span class="room-chip">🔊 ${esc(r)}</span>`
  ).join('');
}

// ── Machine status ─────────────────────────────────────────────────────────────
function renderMachineStatus() {
  if (!data || !data.client_status) return;
  const el = document.getElementById('machine-status');
  const clients = data.client_status.filter(c => c.house === house);
  if (!clients.length) { el.textContent = 'No clients seen for this house'; return; }
  el.innerHTML = clients.map(c => {
    const minAgo = Math.floor((Date.now() - new Date(c.last_seen).getTime()) / 60000);
    const dot = minAgo < 10 ? 'dot-green' : minAgo < 30 ? 'dot-yellow' : 'dot-red';
    const cmdrBadge = c.sonos_commander ? ' <span style="color:#60a5fa">★ commander</span>' : '';
    return `<div class="flex items-center gap-1">
      <span class="status-dot ${dot}"></span>
      <span>${esc(c.client_id)}</span>${cmdrBadge}
      <span class="text-slate-600 ml-1">${minAgo}m ago</span>
    </div>`;
  }).join('');
}

// ── Transport commands ────────────────────────────────────────────────────────
async function sendCmd(action, extra = {}) {
  const rooms = selectedRooms.length > 0 ? selectedRooms : inferActiveRooms();
  if (!rooms.length) { showToast('No rooms selected', true); return; }

  const payload = { action, rooms, target_client_id: commanderId, ...extra };
  await postNtfy(payload);

  // Track optimistic active rooms for any play-type command
  if (['play', 'play_spotify_uri', 'add_to_queue', 'queue_next'].includes(action)) {
    optimisticActiveRooms = { rooms: [...rooms], ts: Date.now() };
    renderRoomCheckboxes();
  }

  // Refresh after transport commands — next track may appear in history
  if (['next', 'prev', 'play', 'play_spotify_uri', 'add_to_queue'].includes(action)) {
    scheduleRefresh(10000);
  }
}

// ── Deep link handler ─────────────────────────────────────────────────────────
function handleDeepLink() {
  const p = new URLSearchParams(window.location.search);
  const action = p.get('action');
  const uri    = p.get('uri');
  const label  = p.get('label') || uri || '';
  const dlHouse = p.get('house');
  const dlRoom  = p.get('room');

  if (!action || !uri) return;

  if (dlHouse && dlHouse !== house) setHouse(dlHouse);

  if (dlRoom) {
    selectedRooms = [dlRoom];
    localStorage.setItem('ll_rooms_' + house, JSON.stringify(selectedRooms));
    renderRoomCheckboxes();
  }

  const rooms = selectedRooms.length > 0 ? selectedRooms : inferActiveRooms();
  const actionLabels = { queue: '▶ Add to queue', play: '▶ Play now', play_album: '▶ Play album' };

  bannerAction = { action, uri, label };

  document.getElementById('banner-action-label').textContent = actionLabels[action] || '▶ ' + action;
  document.getElementById('banner-label').textContent = decodeURIComponent(label);
  document.getElementById('banner-rooms').textContent = rooms.length ? rooms.join(', ') : 'No rooms selected';
  document.getElementById('action-banner').style.display = 'block';

  // Instant-fire: show banner briefly for visual feedback, then execute
  document.getElementById('banner-countdown').textContent = 'Sending…';
  bannerCountdownTimer = setTimeout(() => executeBannerAction(), 400);
}

async function executeBannerAction() {
  if (!bannerAction) return;
  const { action, uri, label } = bannerAction;  // Save BEFORE dismiss clears it
  clearTimeout(bannerCountdownTimer);
  dismissBanner();

  const rooms = selectedRooms.length > 0 ? selectedRooms : inferActiveRooms();
  if (!rooms.length) { showToast('No rooms selected', true); return; }
  const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_spotify_uri';

  await postNtfy({ action: ntfyAction, uri, rooms, target_client_id: commanderId });

  // Optimistic now-playing + active rooms
  optimisticNowPlaying = {
    label: decodeURIComponent(label),
    room: rooms[0] || null,
    ts: Date.now()
  };
  optimisticActiveRooms = { rooms: [...rooms], ts: Date.now() };
  renderNowPlaying();
  renderRoomCheckboxes();

  // Refresh after 10s to catch ack / history flush
  scheduleRefresh(10000);

  showToast(`✓ ${decodeURIComponent(label)} sent to ${rooms.length} room${rooms.length > 1 ? 's' : ''}`);
}

function dismissBanner() {
  clearTimeout(bannerCountdownTimer);
  document.getElementById('action-banner').style.display = 'none';
  bannerAction = null;
  history.replaceState({}, '', window.location.pathname);
}

// ── ntfy POST ─────────────────────────────────────────────────────────────────
async function postNtfy(payload) {
  const topic = NTFY[house];
  try {
    const r = await fetch(topic, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    showToast('✓ Command sent');
  } catch(e) {
    showToast('✗ Failed: ' + e.message, true);
  }
}

// ── Discovery Log ────────────────────────────────────────────────────────────
function renderDiscoveryLog() {
  const el = document.getElementById('discovery-log');
  if (!data || !data.play_commands || data.play_commands.length === 0) {
    el.innerHTML = '<p class="text-xs text-slate-600">No plays yet</p>';
    return;
  }
  const cmds = data.play_commands;
  let html = '';
  for (const cmd of cmds) {
    const d = new Date(cmd.timestamp);
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const roomStr = cmd.room ? ` · 🔊 ${esc(cmd.room)}` : '';

    html += '<div class="discovery-entry">';
    html += `<div class="discovery-title">▶ ${esc(cmd.title)}</div>`;
    html += `<div class="discovery-meta">${esc(cmd.artist || '')}${cmd.album && cmd.album !== cmd.title ? ' · ' + esc(cmd.album) : ''}${roomStr} · ${dateStr} ${timeStr}</div>`;

    // Narrative
    if (cmd.narrative) {
      html += `<div class="discovery-narrative">${esc(cmd.narrative)}</div>`;
    }

    // Rich suggestions with notes
    if (cmd.suggestions && cmd.suggestions.length > 0) {
      html += '<div class="discovery-suggestions-header">Where to go next</div>';
      for (const s of cmd.suggestions) {
        const uri = (s.uri || '').replace(/'/g, "\\'");
        const lbl = (s.label || '').replace(/'/g, "\\'");
        html += '<div class="suggestion-item">';
        const act = s.action || 'play';
        html += `<div class="suggestion-play"><a class="suggestion-label" onclick="playFromDiscovery('${act}','${uri}','${lbl}');return false;" href="#">▶ ${esc(s.label)}</a></div>`;
        if (s.note) {
          html += `<div class="suggestion-note">${esc(s.note)}</div>`;
        }
        html += '</div>';
      }
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

// ── Discovery Log play ───────────────────────────────────────────────────────
async function playFromDiscovery(action, uri, label) {
  const rooms = selectedRooms.length > 0 ? selectedRooms : inferActiveRooms();
  if (!rooms.length) { showToast('No rooms selected', true); return; }
  const ntfyAction = action === 'queue' ? 'add_to_queue' : 'play_spotify_uri';
  const cmd = { action: ntfyAction, uri, rooms, target_client_id: commanderId };
  if (uri.includes(':playlist:') && action !== 'queue') cmd.shuffle = true;
  await postNtfy(cmd);
  optimisticNowPlaying = { label, room: rooms[0] || null, ts: Date.now() };
  optimisticActiveRooms = { rooms: [...rooms], ts: Date.now() };
  renderNowPlaying();
  renderRoomCheckboxes();
  scheduleRefresh(10000);
  showToast(`✓ ${label} → ${rooms.join(', ')}`);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtRelative(d) {
  const diff = Date.now() - d.getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  return d.toLocaleDateString();
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => { t.style.display = 'none'; }, 400); }, 2500);
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Playlists — Listening Log</title>
<style>
html, body { height: 100%; }
/* Lifelog dark theme recreation */
:root {
  --bg: #0a0e1a;
  --surface: #131829;
  --surface2: #1a2035;
  --border: #232940;
  --text: #e2e8f0;
  --text-dim: #8892a8;
  --accent: #4ade80;
  --accent2: #60a5fa;
  --spotify: #1db954;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Tab bar */
.content-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
}
.content-tab {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.content-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}
.content-tab:hover:not(.active) { color: var(--text); }

/* Controls bar */
.playlist-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.playlist-search {
  flex: 1;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  outline: none;
  min-width: 0;
}
.playlist-search:focus { border-color: var(--accent); }
.playlist-search::placeholder { color: var(--text-dim); }

.sort-select {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  outline: none;
}

.playlist-stat {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* Playlist list */
.playlist-list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  flex: 1;
}

/* Playlist card */
.playlist-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.playlist-card:hover { border-color: var(--text-dim); }
.playlist-card.open { border-color: rgba(74, 222, 128, 0.3); }

.pc-header {
  display: flex !important;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
  min-height: 72px;
}
.pc-art {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface);
}
.pc-art-placeholder {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 20px;
  flex-shrink: 0;
}
.pc-info {
  flex: 1;
  min-width: 0;
}
.pc-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pc-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.pc-owner-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(96, 165, 250, 0.1);
  color: var(--accent2);
  border: 1px solid rgba(96, 165, 250, 0.2);
  margin-left: 4px;
}

.pc-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.pc-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--accent);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.pc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.pc-btn:active { transform: scale(0.92); }
.pc-btn.queue { color: var(--accent2); }
.pc-btn.queue:hover { border-color: var(--accent2); }

.pc-expand {
  color: var(--text-dim);
  font-size: 14px;
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-left: 4px;
}
.playlist-card.open .pc-expand { transform: rotate(90deg); color: var(--accent); }

/* Track list */
.pc-body {
  display: none;
  border-top: 1px solid var(--border);
}
.playlist-card.open .pc-body { display: block; }

.track-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  font-size: 13px;
  border-bottom: 1px solid rgba(35, 41, 64, 0.5);
  transition: background 0.1s;
}
.track-row:hover { background: rgba(255, 255, 255, 0.02); }
.track-row:last-child { border-bottom: none; }

.tr-num {
  width: 24px;
  text-align: right;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.6;
  flex-shrink: 0;
}
.tr-art {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}
.tr-info {
  flex: 1;
  min-width: 0;
}
.tr-name {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tr-detail {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tr-duration {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.tr-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.tr-btn {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--accent);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.tr-btn:hover { background: var(--surface2); }
.tr-btn.queue { color: var(--accent2); }

/* Owner group headers */
.owner-group-header {
  padding: 10px 16px 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Design options panel */
.design-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.design-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.design-option {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.design-toggle {
  padding: 3px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.design-toggle.active {
  background: rgba(74, 222, 128, 0.12);
  color: var(--accent);
  border-color: var(--accent);
}
.design-toggle:hover:not(.active) {
  border-color: var(--text-dim);
  color: var(--text);
}

/* Loading */
.track-loading {
  padding: 16px;
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
}

/* Empty search state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}

/* Scrollable container */
.tab-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

@keyframes spin { to { transform: rotate(360deg); } }
img.pc-art, img.tr-art { display: inline-block !important; max-width: none !important; }
img.pc-art { width: 48px !important; height: 48px !important; min-width: 48px; min-height: 48px; }
img.tr-art { width: 32px !important; height: 32px !important; min-width: 32px; min-height: 32px; }
</style>
</head>

const TRACK_DIR = "playlist_tracks";

let state = {
  query: "",
  sortKey: "alpha",
  expandMode: "accordion",
  groupByOwner: false,
  openIds: new Set(),
  trackCache: {},
  trackLoading: new Set(),
  trackError: new Set()
};

function $(sel, ctx) { return (ctx||document).querySelector(sel); }
function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "className") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  kids.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function fmtDur(ms) {
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return m + ":" + String(s).padStart(2,"0");
}

async function loadTracks(id) {
  state.trackLoading.add(id);
  state.trackError.delete(id);
  render();
  try {
    const r = await fetch(TRACK_DIR + "/" + id + ".json");
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    data.sort((a,b) => a.position - b.position);
    state.trackCache[id] = data;
  } catch(e) {
    state.trackError.add(id);
  }
  state.trackLoading.delete(id);
  render();
}

function toggleCard(id) {
  if (state.openIds.has(id)) {
    state.openIds.delete(id);
  } else {
    if (state.expandMode === "accordion") state.openIds.clear();
    state.openIds.add(id);
    if (!state.trackCache[id] && !state.trackLoading.has(id)) loadTracks(id);
  }
  render();
}

function buildTrackRow(t, i) {
  const artEl = t.album_image_url
    ? h("img", { src: t.album_image_url, className: "tr-art", alt: "" })
    : h("div", { style: { width:"32px",height:"32px",borderRadius:"4px",background:"var(--surface)",flexShrink:"0" } });
  return h("div", { className: "track-row" },
    h("span", { className: "tr-num" }, String(t.position+1)),
    artEl,
    h("div", { className: "tr-info" },
      h("div", { className: "tr-name" }, t.track_name),
      h("div", { className: "tr-detail" }, t.artists.map(a=>a.name).join(", ") + " · " + t.album_name)
    ),
    h("span", { className: "tr-duration" }, fmtDur(t.duration_ms)),
    h("div", { className: "tr-actions" },
      h("button", { className: "tr-btn", title: "Play" }, "▶"),
      h("button", { className: "tr-btn queue", title: "Queue" }, "+")
    )
  );
}

function buildCard(p) {
  const isOpen = state.openIds.has(p.id);
  const isShared = p.owner && p.owner !== "Andrew Shuman";

  const imgEl = p.image_url
    ? h("img", { src: p.image_url, className: "pc-art", alt: "",
        style: { width:"48px",height:"48px",minWidth:"48px",minHeight:"48px" } })
    : h("div", { className: "pc-art-placeholder",
        style: { width:"48px",height:"48px",minWidth:"48px",minHeight:"48px" } }, "♫");

  const metaKids = [p.tracks_total + " tracks"];
  if (isShared) {
    metaKids.push(h("span", { className: "pc-owner-badge" }, p.owner));
  }

  const header = h("div", { className: "pc-header", onClick: () => toggleCard(p.id) },
    imgEl,
    h("div", { className: "pc-info" },
      h("div", { className: "pc-name" }, p.name),
      h("div", { className: "pc-meta" }, ...metaKids)
    ),
    h("div", { className: "pc-actions" },
      h("button", { className: "pc-btn", title: "Play", onClick: e => e.stopPropagation() }, "▶"),
      h("button", { className: "pc-btn queue", title: "Queue", onClick: e => e.stopPropagation() }, "+")
    ),
    h("span", { className: "pc-expand" }, "›")
  );

  let bodyContent;
  if (state.trackLoading.has(p.id)) {
    const spinner = h("span", { style: { display:"inline-block",width:"14px",height:"14px",border:"2px solid #60a5fa",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite" } });
    bodyContent = h("div", { className: "track-loading" }, spinner, " Loading tracks…");
  } else if (state.trackError.has(p.id)) {
    bodyContent = h("div", { className: "track-loading", style: { cursor:"pointer" }, onClick: () => loadTracks(p.id) },
      h("span", { style: { opacity:"0.6" } }, "Failed to load tracks — "),
      h("span", { style: { color:"var(--accent2)",textDecoration:"underline" } }, "tap to retry")
    );
  } else if (state.trackCache[p.id]) {
    bodyContent = h("div", {}, ...state.trackCache[p.id].map((t,i) => buildTrackRow(t,i)));
  } else {
    bodyContent = h("div", {});
  }

  const body = h("div", { className: "pc-body" }, bodyContent);
  const card = h("div", { className: "playlist-card" + (isOpen ? " open" : "") }, header, body);
  return card;
}

function render() {
  const app = $("#app");
  app.innerHTML = "";

  // Tab bar
  const tabs = h("div", { className: "content-tabs" },
    h("div", { className: "content-tab", style: { opacity: "0.4" } }, "History"),
    h("div", { className: "content-tab", style: { opacity: "0.4" } }, "Discovery"),
    h("div", { className: "content-tab active" }, "Playlists")
  );

  // Design options
  function dBtn(label, active, onClick) {
    return h("button", { className: "design-toggle" + (active ? " active" : ""), onClick }, label);
  }
  const designPanel = h("div", { className: "design-panel" },
    h("span", { className: "design-label" }, "🎨 Design Options"),
    h("div", { className: "design-option" },
      h("span", {}, "Expand:"),
      dBtn("Accordion", state.expandMode==="accordion", () => { state.expandMode="accordion"; render(); }),
      dBtn("Multi-open", state.expandMode==="multi", () => { state.expandMode="multi"; render(); })
    ),
    h("div", { className: "design-option" },
      h("span", {}, "Group:"),
      dBtn("Flat", !state.groupByOwner, () => { state.groupByOwner=false; render(); }),
      dBtn("By owner", state.groupByOwner, () => { state.groupByOwner=true; render(); })
    ),
    h("div", { className: "design-option" },
      h("span", {}, "Sort:"),
      dBtn("A–Z", state.sortKey==="alpha", () => { state.sortKey="alpha"; render(); }),
      dBtn("Most tracks", state.sortKey==="tracks-desc", () => { state.sortKey="tracks-desc"; render(); }),
      dBtn("Fewest", state.sortKey==="tracks-asc", () => { state.sortKey="tracks-asc"; render(); })
    )
  );

  // Search / sort controls
  const searchInput = h("input", {
    type: "search", className: "playlist-search", placeholder: "Search playlists…",
    value: state.query,
    onInput: (e) => { state.query = e.target.value; render(); }
  });
  const sortSelect = h("select", {
    className: "sort-select", value: state.sortKey,
    onChange: (e) => { state.sortKey = e.target.value; render(); }
  },
    h("option", { value: "alpha" }, "A–Z"),
    h("option", { value: "tracks-desc" }, "Most tracks"),
    h("option", { value: "tracks-asc" }, "Fewest tracks"),
    h("option", { value: "owner" }, "By owner")
  );
  sortSelect.value = state.sortKey;

  // Filter & sort
  const q = state.query.toLowerCase();
  let filtered = PLAYLISTS.filter(p => p.name.toLowerCase().includes(q) || (p.owner && p.owner.toLowerCase().includes(q)));
  filtered.sort((a,b) => {
    if (state.sortKey==="alpha") return a.name.localeCompare(b.name);
    if (state.sortKey==="tracks-desc") return b.tracks_total - a.tracks_total;
    if (state.sortKey==="tracks-asc") return a.tracks_total - b.tracks_total;
    if (state.sortKey==="owner") return a.owner.localeCompare(b.owner) || a.name.localeCompare(b.name);
    return 0;
  });

  const totalTracks = PLAYLISTS.reduce((s,p) => s + p.tracks_total, 0);
  const statSpan = h("span", { className: "playlist-stat" },
    filtered.length + "/" + PLAYLISTS.length + " · " + totalTracks.toLocaleString() + " tracks"
  );

  const controls = h("div", { className: "playlist-controls" }, searchInput, sortSelect, statSpan);

  // Group
  const groups = [];
  if (state.groupByOwner) {
    const byOwner = new Map();
    filtered.forEach(p => {
      const owner = p.owner || "Unknown";
      if (!byOwner.has(owner)) byOwner.set(owner, []);
      byOwner.get(owner).push(p);
    });
    const andrewKey = "Andrew Shuman";
    if (byOwner.has(andrewKey)) {
      groups.push({ header: "Your Playlists (" + byOwner.get(andrewKey).length + ")", playlists: byOwner.get(andrewKey) });
      byOwner.delete(andrewKey);
    }
    const otherKeys = [...byOwner.keys()].sort();
    if (otherKeys.length > 0) {
      const shared = [];
      otherKeys.forEach(k => shared.push(...byOwner.get(k)));
      groups.push({ header: "Shared / Followed (" + shared.length + ")", playlists: shared });
    }
  } else {
    groups.push({ playlists: filtered });
  }

  // Build list
  const listKids = [];
  if (PLAYLISTS.length === 0) {
    listKids.push(h("div", { className: "empty-state" }, "Loading playlists…"));
  } else if (filtered.length === 0) {
    listKids.push(h("div", { className: "empty-state" }, "No matching playlists"));
  } else {
    groups.forEach(g => {
      if (g.header) listKids.push(h("div", { className: "owner-group-header" }, g.header));
      g.playlists.forEach(p => listKids.push(buildCard(p)));
    });
  }

  const list = h("div", { className: "playlist-list" }, ...listKids);
  const tabContent = h("div", { className: "tab-content" }, list);

  app.appendChild(tabs);
  app.appendChild(designPanel);
  app.appendChild(controls);
  app.appendChild(tabContent);

  // Restore search focus & cursor position
  const newInput = $(".playlist-search");
  if (newInput && state.query) {
    newInput.focus();
    newInput.setSelectionRange(state.query.length, state.query.length);
  }
}

render();
</script>
</body>
</html>
